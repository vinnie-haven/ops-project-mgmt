const PROJECTS = PROJECTS_RAW.map((p, i) => {
  const target = (p.state === 'MA' ? STAGE_TARGETS_MA : STAGE_TARGETS_CA)[p.stage] ?? null;
  const utilityOverride = p.utility === 'PG&E' && p.stage === 'interconnection' ? 45 : null;
  const effectiveTarget = utilityOverride ?? target;
  const daysOverdue = effectiveTarget ? Math.max(0, p.daysInStage - effectiveTarget) : 0;
  const slaStatus = p.stage === 'completed' ? 'completed'
    : daysOverdue > 0 ? 'breached'
    : effectiveTarget && p.daysInStage >= effectiveTarget * 0.8 ? 'approaching'
    : 'ok';

  let risk = 0;
  if (p.stage !== 'completed') {
    if (slaStatus === 'breached') risk += 30 + Math.min(40, daysOverdue * 2);
    else if (slaStatus === 'approaching') risk += 15;
    if (!p.nextAction) risk += 25;
    if (p.nextActionDueInDays !== null && p.nextActionDueInDays < 0) risk += 15 + Math.min(20, -p.nextActionDueInDays * 3);
    if (p.lastTouchedDaysAgo >= IDLE_DANGER) risk += 20;
    else if (p.lastTouchedDaysAgo >= IDLE_WARNING) risk += 10;
    if (p.priority === 'urgent') risk += 10;
    if (p.priority === 'high') risk += 5;
  }
  risk = Math.min(100, risk);
  const riskLevel = risk >= 50 ? 'high' : risk >= 25 ? 'medium' : 'low';

  const attentionReasons = [];
  if (p.stage !== 'completed') {
    if (slaStatus === 'breached') attentionReasons.push(`${daysOverdue}d past SLA`);
    if (!p.nextAction) attentionReasons.push('No next action set');
    if (p.nextActionDueInDays !== null && p.nextActionDueInDays < 0) attentionReasons.push(`Next action ${-p.nextActionDueInDays}d overdue`);
    if (p.nextActionDueInDays === 0) attentionReasons.push('Next action due today');
    if (p.lastTouchedDaysAgo >= IDLE_DANGER) attentionReasons.push(`Idle ${p.lastTouchedDaysAgo}d`);
    else if (p.lastTouchedDaysAgo >= IDLE_WARNING) attentionReasons.push(`Quiet ${p.lastTouchedDaysAgo}d`);
  }

  return {
    ...p,
    id: `p${i+1}`,
    projectNumber: `HVN-2026-${String(i+1).padStart(4, '0')}`,
    daysOverdue, effectiveTarget, slaStatus,
    risk, riskLevel, attentionReasons,
    systemType: p.battery && p.solar ? 'Solar + Battery' : p.solar ? 'Solar only' : 'Battery only',
    kickoffAgo: Math.floor(Math.random() * 45) + p.daysInStage + 5
  };

function buildEmails(p) {
  const threads = [];
  const coord = p.coord;
  const coordEmail = `${coord.toLowerCase().replace(/\s/g,'.')}@havenenergy.com`;
  const customerEmail = `${p.name.toLowerCase().replace(/[^a-z]/g,'.')}@gmail.com`;
  const installerEmail = p.installer ? `ops@${p.installer.toLowerCase().replace(/[^a-z]/g,'')}.com` : null;

  threads.push({
    id: `${p.id}-e1`, direction: 'outbound', from: `${coord} <${coordEmail}>`, to: `${p.name} <${customerEmail}>`,
    daysAgo: p.kickoffAgo,
    subject: `Welcome to Haven — your ${p.systemType.toLowerCase()} install at ${p.city}`,
    body: `Hi ${p.name.split(' ')[0]},\n\nGreat to have you onboard. I'm ${coord}, your install coordinator at Haven. We'll be managing your ${p.solar} kW ${p.battery ? `solar + ${p.battery} kWh battery` : 'solar'} project from kickoff through interconnection with ${p.utility}.\n\nFirst step is a site survey. Typical timelines for ${p.state} projects run 8-14 weeks.\n\nBest,\n${coord}`
  });
  threads.push({
    id: `${p.id}-e2`, direction: 'inbound', from: `${p.name} <${customerEmail}>`, to: `${coord} <${coordEmail}>`,
    daysAgo: p.kickoffAgo - 1,
    subject: `Re: Welcome to Haven`,
    body: `Thanks ${coord.split(' ')[0]}! Excited to get started. Mornings work best for the site survey.`
  });
  threads.push({
    id: `${p.id}-e3`, direction: 'outbound', from: `${coord} <${coordEmail}>`, to: `${p.name} <${customerEmail}>`,
    daysAgo: p.kickoffAgo - 2,
    subject: `Site survey scheduled — ${p.surveyor}`,
    body: `Hi ${p.name.split(' ')[0]},\n\nYour site survey is scheduled with ${p.surveyor} for next Tuesday, 8:30-10:30am.\n\n${coord.split(' ')[0]}`
  });
  if (['permitting','scheduling','installation','inspection','interconnection','rebate','completed'].includes(p.stage)) {
    threads.push({
      id: `${p.id}-e4`, direction: 'inbound', from: `${p.ahj} <permits@${p.ahj.toLowerCase().replace(/[^a-z]/g,'')}.gov>`, to: `Haven Permitting <permits@havenenergy.com>`,
      daysAgo: Math.max(1, p.daysInStage + 3),
      subject: `${p.ahj}: Permit application received — ${p.projectNumber}`,
      body: `Confirmation from ${p.ahj}: permit application received. Expected review window ${p.state === 'CA' ? '2-3 weeks' : '4-5 weeks'}.`
    });
  }
  if (p.slaStatus === 'breached' && p.stage === 'permitting') {
    threads.push({
      id: `${p.id}-e5`, direction: 'outbound', from: `${coord} <${coordEmail}>`, to: `${p.ahj} <permits@${p.ahj.toLowerCase().replace(/[^a-z]/g,'')}.gov>`,
      daysAgo: 3,
      subject: `Status check: Permit for ${p.name}`,
      body: `Hi team,\n\nFollowing up on the permit submitted for ${p.name}. We're now ${p.daysInStage} days in, past typical review timelines. Any update on plan reviewer assignment?\n\n${coord}`
    });
    threads.push({
      id: `${p.id}-e6`, direction: 'inbound', from: `${p.ahj} <permits@${p.ahj.toLowerCase().replace(/[^a-z]/g,'')}.gov>`, to: `${coord} <${coordEmail}>`,
      daysAgo: 2,
      subject: `Re: Status check`,
      body: `${coord.split(' ')[0]}, plan reviewer assigned today. First-round comments by end of week.`
    });
  }
  if (p.installer && ['scheduling','installation','inspection','interconnection','completed'].includes(p.stage)) {
    threads.push({
      id: `${p.id}-e7`, direction: 'outbound', from: `${coord} <${coordEmail}>`, to: `${p.installer} <${installerEmail}>`,
      daysAgo: Math.max(1, p.daysInStage + 1),
      subject: `Install assignment — ${p.name} (${p.city})`,
      body: `Assigning the ${p.name} install to you. ${p.solar} kW solar, ${p.battery ? `${p.battery} kWh battery` : 'no battery'}, ${p.utility} territory. Target install window: next 2 weeks.`
    });
    threads.push({
      id: `${p.id}-e8`, direction: 'inbound', from: `${p.installer} <${installerEmail}>`, to: `${coord} <${coordEmail}>`,
      daysAgo: Math.max(0, p.daysInStage),
      subject: `Re: Install assignment`,
      body: `Got it. Crew lead Jorge. We can hit this ${p.stage === 'installation' || p.stage === 'completed' ? 'this week' : 'next week'}.`
    });
  }
  return threads.sort((a, b) => b.daysAgo - a.daysAgo);
}

function setMode(mode) {
  viewMode = mode;
  document.querySelectorAll('.view-toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  document.getElementById('coordSelector').style.display = mode === 'installer' ? 'none' : 'block';
  if (mode === 'installer') {
    currentView = 'jobs';
  } else {
    currentView = 'pipeline';
  }
  renderNav();
  render();
  closeModal();
}

function render() {
  main.innerHTML = '';
  if (viewMode === 'internal') {
    if (currentView === 'home') renderHome();
    else if (currentView === 'pipeline') renderPipeline();
    else if (currentView === 'projects') renderProjects();
    else if (currentView === 'tasks') renderTasks(false);
    else if (currentView === 'inbox') renderInbox(false);
    else if (currentView === 'photos') renderPhotos(false);
    else if (currentView === 'leadership') renderLeadership();
  } else {
    if (currentView === 'jobs') renderInstallerJobs();
    else if (currentView === 'tasks') renderTasks(true);
    else if (currentView === 'inbox') renderInbox(true);
    else if (currentView === 'photos') renderPhotos(true);
  }
  main.scrollTop = 0;
}

function renderHome() {
  const visible = visibleProjects().filter(p => p.stage !== 'completed');
  const isLeadership = currentCoord === '__all__';
  const displayName = isLeadership ? 'Leadership' : currentCoord.split(' ')[0];

  // Attention queue: everything that needs looking at, sorted by risk score
  const attention = visible.filter(p => p.riskLevel !== 'low').sort((a, b) => b.risk - a.risk);

  // Waiting-on counts (small widget)
  const waitingOnCounts = {};
  visible.forEach(p => { waitingOnCounts[p.waitingOn] = (waitingOnCounts[p.waitingOn] || 0) + 1; });

  // One primary reason per project — the most important thing to see
  function primaryReason(p) {
    if (p.slaStatus === 'breached') return { text: `${p.daysOverdue}d past SLA`, tone: 'danger' };
    if (!p.nextAction) return { text: 'No next action', tone: 'danger' };
    if (p.nextActionDueInDays !== null && p.nextActionDueInDays < 0) return { text: `Action ${-p.nextActionDueInDays}d late`, tone: 'warn' };
    if (p.lastTouchedDaysAgo >= IDLE_DANGER) return { text: `Idle ${p.lastTouchedDaysAgo}d`, tone: 'warn' };
    if (p.nextActionDueInDays === 0) return { text: 'Action due today', tone: 'warn' };
    if (p.lastTouchedDaysAgo >= IDLE_WARNING) return { text: `Quiet ${p.lastTouchedDaysAgo}d`, tone: 'neutral' };
    return { text: 'Approaching SLA', tone: 'neutral' };
  }

  const attentionRow = (p) => {
    const reason = primaryReason(p);
    const toneClass = reason.tone === 'danger' ? 'text-haven-danger' : reason.tone === 'warn' ? 'text-haven-warn' : 'text-haven-muted';
    return `
      <div class="cursor-pointer hover:bg-haven-bg px-4 py-3 border-b border-haven-border flex items-center gap-4" data-project-id="${p.id}">
        <span class="risk-dot ${p.riskLevel}"></span>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <span class="font-medium truncate">${p.name}</span>
            <span class="text-xs text-haven-muted">· ${STAGE_LABELS[p.stage]}</span>
          </div>
          <div class="text-xs text-haven-muted mt-0.5 truncate">
            ${p.nextAction || '<span class="italic text-haven-danger">No next action set</span>'}
          </div>
        </div>
        <div class="text-right shrink-0">
          <div class="text-sm font-medium ${toneClass}">${reason.text}</div>
          ${isLeadership ? `<div class="text-xs text-haven-muted mt-0.5">${getCoord(p).split(' ')[0]}</div>` : ''}
        </div>
      </div>
    `;
  };

  main.innerHTML = `
    <div class="p-6 max-w-4xl">
      <div class="mb-5">
        <h1 class="font-serif text-2xl font-bold text-haven-forest">
          ${isLeadership ? 'Leadership home' : `Good morning, ${displayName}`}
        </h1>
        <p class="text-sm text-haven-muted mt-1">
          ${visible.length} active · ${attention.length === 0 ? 'nothing flagged' : `${attention.length} need${attention.length === 1 ? 's' : ''} attention`}
        </p>
      </div>

      <div class="card p-0 overflow-hidden mb-5">
        <div class="px-4 py-3 border-b border-haven-border flex items-center justify-between">
          <h2 class="font-serif font-bold text-haven-forest">Needs attention</h2>
          <span class="text-xs text-haven-muted">Sorted by risk</span>
        </div>
        ${attention.length === 0
          ? '<div class="px-4 py-8 text-center text-sm text-haven-muted">All projects have next actions and recent activity.</div>'
          : attention.map(attentionRow).join('')}
      </div>

      <div class="grid grid-cols-2 gap-5">
        <div class="card">
          <h3 class="font-serif font-bold text-haven-forest mb-3 text-sm">What's blocking</h3>
          <div class="space-y-2 text-sm">
            ${['ahj', 'utility', 'customer', 'installer', 'internal'].filter(k => waitingOnCounts[k]).map(key => `
              <div class="flex items-center justify-between">
                <span class="text-haven-muted">${WAITING_ON_LABELS[key]}</span>
                <span class="font-medium">${waitingOnCounts[key]}</span>
              </div>
            `).join('') || '<div class="text-haven-muted">No blockers</div>'}
          </div>
        </div>

        ${isLeadership ? renderCoordLoadMini() : `
          <div class="card">
            <h3 class="font-serif font-bold text-haven-forest mb-3 text-sm">My pipeline</h3>
            <div class="space-y-2 text-sm">
              ${STAGE_ORDER.filter(s => visible.filter(p => p.stage === s).length > 0).map(s => `
                <div class="flex items-center justify-between">
                  <span class="text-haven-muted">${STAGE_LABELS[s]}</span>
                  <span class="font-medium">${visible.filter(p => p.stage === s).length}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `}
      </div>
    </div>
  `;
  attachProjectHandlers();
}

function renderCoordLoadMini() {
  const loads = COORDINATORS.map(c => {
    const their = PROJECTS.filter(p => p.stage !== 'completed' && getCoord(p) === c);
    const atRisk = their.filter(p => p.riskLevel === 'high').length;
    return { coord: c, count: their.length, atRisk };
  });
  return `
    <div class="card">
      <h3 class="font-serif font-bold text-haven-forest mb-3 text-sm">Coordinator load</h3>
      <div class="space-y-2 text-sm">
        ${loads.map(l => `
          <div class="flex items-center justify-between cursor-pointer hover:text-haven-forest" onclick="switchToCoord('${l.coord}')">
            <span class="text-haven-muted">${l.coord.split(' ')[0]}</span>
            <span class="flex items-center gap-2">
              ${l.atRisk > 0 ? `<span class="badge badge-danger">${l.atRisk}</span>` : ''}
              <span class="font-medium">${l.count}</span>
            </span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

        <div>
          <h1 class="font-serif text-2xl font-bold text-haven-forest">Install Pipeline</h1>
          <p class="text-sm text-haven-muted mt-1">${coordLabel} · ${active.length} active</p>
        </div>
        <div class="flex gap-3">
          ${statCard('Active', active.length, 'neutral')}
          ${statCard('At Risk', atRisk, atRisk > 0 ? 'warn' : undefined)}
          ${statCard('Past SLA', overdue, overdue > 0 ? 'danger' : undefined)}
        </div>
      </div>
      <div class="overflow-x-auto pb-4">
        <div class="grid gap-3 min-w-[1400px]" style="grid-template-columns: repeat(8, minmax(0, 1fr));">

            <div class="flex flex-col min-h-[60vh]">
              <div class="flex items-center justify-between px-2 pb-2 border-b-2 border-haven-forest mb-2">
                <div class="font-serif font-bold text-sm text-haven-forest">${STAGE_LABELS[stage]}</div>
                <div class="text-xs text-haven-muted">${byStage[stage].length}</div>
              </div>
              <div class="space-y-2 flex-1">
                ${byStage[stage].length === 0 ? '<div class="text-xs text-haven-muted text-center py-6 border border-dashed border-haven-border rounded-md">None</div>' : byStage[stage].sort((a,b)=>b.risk - a.risk).map(p => pipelineCard(p)).join('')}
              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>
  `;

}

function pipelineCard(p) {
  const borderClass = p.slaStatus === 'breached' ? 'border-l-4 border-l-haven-danger' : p.slaStatus === 'approaching' ? 'border-l-4 border-l-haven-warn' : !p.nextAction ? 'border-l-4 border-l-haven-warn' : '';
  const coord = getCoord(p);
  const showCoord = currentCoord === '__all__';

  // One primary reason line
  let reason = '';
  if (p.slaStatus === 'breached') reason = `<span class="text-haven-danger font-medium">${p.daysOverdue}d past SLA</span>`;
  else if (!p.nextAction) reason = `<span class="text-haven-warn font-medium">No next action</span>`;
  else if (p.nextActionDueInDays !== null && p.nextActionDueInDays < 0) reason = `<span class="text-haven-warn font-medium">Action ${-p.nextActionDueInDays}d late</span>`;
  else if (p.lastTouchedDaysAgo >= IDLE_DANGER) reason = `<span class="text-haven-warn">Idle ${p.lastTouchedDaysAgo}d</span>`;

  return `
    <div data-project-id="${p.id}" class="card hover-lift cursor-pointer p-3 ${borderClass}">
      <div class="flex items-start justify-between gap-1">
        <div class="font-medium text-sm truncate min-w-0">${p.name}</div>
        ${showCoord ? avatar(coord, 18) : ''}
      </div>
      <div class="text-xs text-haven-muted truncate mt-0.5">${p.city}, ${p.state}</div>
      ${reason ? `<div class="text-xs mt-2">${reason}</div>` : ''}
      ${p.nextAction ? `<div class="text-[11px] text-haven-muted mt-2 pt-2 border-t border-haven-border truncate">${p.nextAction}</div>` : ''}
    </div>`;
}

function renderInstallerJobs() {
  const myActive = visibleProjects().filter(p => p.stage !== 'completed');
  const myCompleted = visibleProjects().filter(p => p.stage === 'completed');

  // Prioritize: installation today, urgent, then scheduling, then everything else
  function sortKey(p) {
    if (p.stage === 'installation') return 0;
    if (p.priority === 'urgent') return 1;
    if (p.stage === 'scheduling') return 2;
    return 3;
  }
  const sorted = [...myActive].sort((a, b) => sortKey(a) - sortKey(b));

  // One-line status per job
  function status(p) {
    if (p.stage === 'installation') return { text: 'On site', tone: 'danger' };
    if (p.stage === 'scheduling') return { text: 'Schedule install', tone: 'warn' };
    if (p.priority === 'urgent') return { text: 'Urgent', tone: 'danger' };
    return { text: STAGE_LABELS[p.stage], tone: 'neutral' };
  }

  const jobRow = (p) => {
    const s = status(p);
    const toneClass = s.tone === 'danger' ? 'text-haven-danger' : s.tone === 'warn' ? 'text-haven-warn' : 'text-haven-muted';
    return `
      <div class="cursor-pointer hover:bg-haven-bg px-4 py-3 border-b border-haven-border flex items-center gap-4" data-project-id="${p.id}">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <span class="font-medium truncate">${p.name}</span>
            <span class="text-xs text-haven-muted">· ${p.city}, ${p.state}</span>
          </div>
          <div class="text-xs text-haven-muted mt-0.5 truncate">${p.solar} kW${p.battery ? ` + ${p.battery} kWh` : ''} · ${p.utility} · Coord: ${p.coord.split(' ')[0]}</div>
        </div>
        <div class="text-right shrink-0">
          <div class="text-sm font-medium ${toneClass}">${s.text}</div>
        </div>
      </div>
    `;
  };

  main.innerHTML = `
    <div class="p-6 max-w-4xl">
      <div class="mb-5">
        <h1 class="font-serif text-2xl font-bold text-haven-forest">My Jobs</h1>
        <p class="text-sm text-haven-muted mt-1">${CURRENT_INSTALLER} · ${myActive.length} active${myCompleted.length ? `, ${myCompleted.length} completed` : ''}</p>
      </div>

      <div class="card p-0 overflow-hidden mb-5">
        <div class="px-4 py-3 border-b border-haven-border">
          <h2 class="font-serif font-bold text-haven-forest">Active jobs</h2>
        </div>
        ${sorted.length === 0 ? '<div class="px-4 py-8 text-center text-sm text-haven-muted">No active jobs.</div>' : sorted.map(jobRow).join('')}
      </div>

      ${myCompleted.length > 0 ? `
        <div class="card p-0 overflow-hidden">
          <div class="px-4 py-3 border-b border-haven-border">
            <h2 class="font-serif font-bold text-haven-muted text-sm uppercase tracking-wide">Recently completed</h2>
          </div>
          ${myCompleted.map(p => `
            <div class="cursor-pointer hover:bg-haven-bg px-4 py-3 border-b border-haven-border flex items-center gap-4" data-project-id="${p.id}">
              <div class="flex-1 min-w-0">
                <div class="font-medium truncate">${p.name}</div>
                <div class="text-xs text-haven-muted mt-0.5 truncate">${p.city}, ${p.state} · ${p.solar} kW${p.battery ? ` + ${p.battery} kWh` : ''}</div>
              </div>
              <div class="text-xs text-haven-muted shrink-0">Completed</div>
            </div>
          `).join('')}
        </div>
      ` : ''}
    </div>
  `;
  attachProjectHandlers();
}

function renderTasks(installerOnly) {
  const visible = visibleProjects();
  const visibleIds = new Set(visible.map(p => p.id));
  let tasks = TASKS.filter(t => visibleIds.has(t.projectId));
  if (installerOnly) tasks = tasks.filter(t => t.ownerType === 'installer');
  else tasks = tasks.filter(t => t.ownerType === 'internal');

  const sorted = [...tasks].sort((a, b) => a.dueInDays - b.dueInDays);
  const rows = sorted.map(t => {
    const proj = PROJECTS.find(p => p.id === t.projectId);
    const overdue = t.dueInDays < 0;
    const dueText = t.dueInDays < 0 ? `${-t.dueInDays}d ago` : t.dueInDays === 0 ? 'today' : `in ${t.dueInDays}d`;
    const priorityBadge = t.priority === 'urgent' ? '<span class="badge badge-danger">urgent</span>' : t.priority === 'high' ? '<span class="badge badge-warn">high</span>' : '<span class="badge badge-neutral">normal</span>';
    const statusBadge = t.status === 'done' ? '<span class="badge badge-ok">done</span>' : '';
    return `
      <tr class="border-b border-haven-border hover:bg-haven-bg cursor-pointer" data-project-id="${proj.id}">
        <td class="px-4 py-2.5">
          <div class="font-medium ${t.status === 'done' ? 'line-through text-haven-muted' : ''}">${t.title}</div>
          <div class="text-xs text-haven-muted mt-0.5">${STAGE_LABELS[t.stage]}</div>
        </td>
        <td class="px-4 py-2.5"><span class="text-haven-forest">${proj.name}</span></td>
        ${installerOnly ? '' : `<td class="px-4 py-2.5">${avatar(proj.coord, 20)} <span class="text-xs ml-1 align-middle">${proj.coord.split(' ')[0]}</span></td>`}
        <td class="px-4 py-2.5 ${overdue && t.status !== 'done' ? 'text-haven-danger font-medium' : 'text-haven-muted'}">${dueText}</td>
        <td class="px-4 py-2.5">${statusBadge || priorityBadge}</td>
      </tr>`;
  }).join('');

  const overdueCount = sorted.filter(t => t.dueInDays < 0 && t.status !== 'done').length;
  const dueTodayCount = sorted.filter(t => t.dueInDays === 0 && t.status !== 'done').length;

  main.innerHTML = `
    <div class="p-6 max-w-6xl">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 class="font-serif text-2xl font-bold text-haven-forest">${installerOnly ? 'My Tasks' : 'Tasks'}</h1>
          <p class="text-sm text-haven-muted mt-1">${installerOnly ? `Work assigned to ${CURRENT_INSTALLER}` : (currentCoord === '__all__' ? 'All coordinators' : currentCoord)} · ${sorted.length} total</p>
        </div>
        <button class="btn btn-primary">+ New task</button>
      </div>
      <div class="flex gap-3 mb-5">
        <div class="card px-4 py-2"><div class="text-xs text-haven-muted uppercase">Overdue</div><div class="font-serif font-bold text-lg text-haven-danger">${overdueCount}</div></div>
        <div class="card px-4 py-2"><div class="text-xs text-haven-muted uppercase">Due Today</div><div class="font-serif font-bold text-lg">${dueTodayCount}</div></div>
        <div class="card px-4 py-2"><div class="text-xs text-haven-muted uppercase">Upcoming</div><div class="font-serif font-bold text-lg">${Math.max(0, sorted.length - overdueCount - dueTodayCount)}</div></div>
      </div>
      <div class="card p-0 overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-haven-bg border-b border-haven-border">
            <tr class="text-left text-xs text-haven-muted uppercase tracking-wide">
              <th class="px-4 py-2.5">Task</th><th class="px-4 py-2.5">Project</th>${installerOnly ? '' : '<th class="px-4 py-2.5">Coord</th>'}<th class="px-4 py-2.5">Due</th><th class="px-4 py-2.5">Status</th>
            </tr>
          </thead>
          <tbody>${rows || `<tr><td colspan="${installerOnly ? 4 : 5}" class="px-4 py-8 text-center text-haven-muted">No tasks</td></tr>`}</tbody>
        </table>
      </div>
    </div>
  `;
  attachProjectHandlers();
}

function renderLeadership() {
  const active = PROJECTS.filter(p => p.stage !== 'completed');
  const completed = PROJECTS.filter(p => p.stage === 'completed');
  const overdue = active.filter(p => p.slaStatus === 'breached');
  const avgCycle = completed.length ? Math.round(completed.reduce((a, p) => a + (p.cycleDays || 0), 0) / completed.length) : 0;
  const atRisk = active.filter(p => p.riskLevel === 'high');
  const noAction = active.filter(p => !p.nextAction);
  const idle = active.filter(p => p.lastTouchedDaysAgo >= IDLE_DANGER);

  const byState = {}; active.forEach(p => { byState[p.state] = (byState[p.state] || 0) + 1; });
  const maxState = Math.max(...Object.values(byState));
  const byStage = {}; STAGE_ORDER.forEach(s => byStage[s] = active.filter(p => p.stage === s).length);
  const maxStage = Math.max(...Object.values(byStage));
  const byInstaller = {}; active.forEach(p => { const i = getInstaller(p) || 'Unassigned'; byInstaller[i] = (byInstaller[i] || 0) + 1; });
  const byCoord = {}; active.forEach(p => { const c = getCoord(p); byCoord[c] = (byCoord[c] || 0) + 1; });

  const stageAvgs = [
    { stage: 'site_survey', avg: 6, n: 4 }, { stage: 'design', avg: 8, n: 4 },
    { stage: 'permitting', avg: 24, n: 4 }, { stage: 'scheduling', avg: 4, n: 4 },
    { stage: 'installation', avg: 2, n: 4 }, { stage: 'inspection', avg: 9, n: 4 },
    { stage: 'interconnection', avg: 27, n: 4 }, { stage: 'rebate', avg: 12, n: 3 },
  ];

  const stat = (label, value, tone) => `
    <div class="card">
      <div class="text-xs text-haven-muted uppercase tracking-wide">${label}</div>
      <div class="font-serif font-bold text-2xl mt-1 ${tone === 'danger' ? 'text-haven-danger' : tone === 'ok' ? 'text-haven-ok' : 'text-haven-forest'}">${value}</div>
    </div>`;

  main.innerHTML = `
    <div class="p-6 max-w-6xl">
      <div class="mb-6">
        <h1 class="font-serif text-2xl font-bold text-haven-forest">Leadership Metrics</h1>
        <p class="text-sm text-haven-muted mt-1">Throughput, cycle time, and slippage risk</p>
      </div>
      <div class="grid grid-cols-4 gap-4 mb-6">
        ${stat('Active', active.length)}
        ${stat('At Risk', atRisk.length, atRisk.length > 0 ? 'danger' : 'ok')}
        ${stat('Past SLA', overdue.length, overdue.length > 0 ? 'danger' : undefined)}
        ${stat('Avg Cycle', avgCycle + 'd')}
      </div>
      <div class="grid grid-cols-3 gap-4 mb-6">
        ${stat('No next action', noAction.length, noAction.length > 0 ? 'danger' : 'ok')}
        ${stat(`Idle > ${IDLE_DANGER}d`, idle.length, idle.length > 0 ? 'danger' : 'ok')}
        ${stat('Completed (demo)', completed.length, 'ok')}
      </div>
      <div class="card mb-6">
        <h2 class="font-serif font-bold text-haven-forest mb-4">Coordinator load &amp; health</h2>
        <table class="w-full text-sm">
          <thead><tr class="text-left text-xs text-haven-muted uppercase"><th class="pb-2">Coordinator</th><th class="pb-2">Active</th><th class="pb-2">At risk</th><th class="pb-2">Past SLA</th><th class="pb-2">No next action</th><th class="pb-2">Idle</th></tr></thead>
          <tbody>
            ${COORDINATORS.map(c => {
              const their = active.filter(p => getCoord(p) === c);
              const theirRisk = their.filter(p => p.riskLevel === 'high').length;
              const theirBreach = their.filter(p => p.slaStatus === 'breached').length;
              const theirNoAction = their.filter(p => !p.nextAction).length;
              const theirIdle = their.filter(p => p.lastTouchedDaysAgo >= IDLE_DANGER).length;
              return `<tr class="border-t border-haven-border cursor-pointer hover:bg-haven-bg" onclick="switchToCoord('${c}')">
                <td class="py-2">${avatar(c, 20)} <span class="ml-2 align-middle">${c}</span></td>
                <td class="py-2 font-medium">${their.length}</td>
                <td class="py-2 ${theirRisk > 0 ? 'text-haven-danger font-medium' : 'text-haven-muted'}">${theirRisk}</td>
                <td class="py-2 ${theirBreach > 0 ? 'text-haven-danger font-medium' : 'text-haven-muted'}">${theirBreach}</td>
                <td class="py-2 ${theirNoAction > 0 ? 'text-haven-warn font-medium' : 'text-haven-muted'}">${theirNoAction}</td>
                <td class="py-2 ${theirIdle > 0 ? 'text-haven-warn font-medium' : 'text-haven-muted'}">${theirIdle}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
      <div class="grid grid-cols-2 gap-6 mb-6">
        <div class="card">
          <h2 class="font-serif font-bold text-haven-forest mb-4">Pipeline distribution</h2>
          ${STAGE_ORDER.map(s => `
            <div class="flex items-center gap-3 mb-2">
              <div class="w-32 text-xs">${STAGE_LABELS[s]}</div>
              <div class="flex-1 bg-haven-border rounded-full h-5 overflow-hidden">
                <div class="bg-haven-forest h-full" style="width: ${(byStage[s] / maxStage) * 100}%"></div>
              </div>
              <div class="w-8 text-sm text-right text-haven-muted">${byStage[s]}</div>
            </div>`).join('')}
        </div>
        <div class="card">
          <h2 class="font-serif font-bold text-haven-forest mb-4">Active by state</h2>
          ${Object.entries(byState).sort((a,b)=>b[1]-a[1]).map(([state, count]) => `
            <div class="flex items-center gap-3 mb-2">
              <div class="w-10 text-sm font-medium">${state}</div>
              <div class="flex-1 bg-haven-border rounded-full h-5 overflow-hidden">
                <div class="bg-haven-lime h-full" style="width: ${(count / maxState) * 100}%"></div>
              </div>
              <div class="w-10 text-sm text-right text-haven-muted">${count}</div>
            </div>`).join('')}
        </div>
      </div>
      <div class="card mb-6">
        <h2 class="font-serif font-bold text-haven-forest mb-4">Avg time per stage (completed — demo)</h2>
        <table class="w-full text-sm">
          <thead><tr class="text-left text-xs text-haven-muted uppercase"><th class="pb-2">Stage</th><th class="pb-2">Avg</th><th class="pb-2">SLA</th><th class="pb-2">vs Target</th></tr></thead>
          <tbody>
            ${stageAvgs.map(s => {
              const target = STAGE_TARGETS_CA[s.stage];
              const diff = s.avg - target;
              const diffLabel = diff > 0 ? `<span class="text-haven-danger">+${diff}d</span>` : diff < 0 ? `<span class="text-haven-ok">${diff}d</span>` : `<span class="text-haven-muted">on target</span>`;
              return `<tr class="border-t border-haven-border"><td class="py-2">${STAGE_LABELS[s.stage]}</td><td class="py-2 font-medium">${s.avg}d</td><td class="py-2 text-haven-muted">${target}d</td><td class="py-2">${diffLabel}</td></tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// ============================================================
// PROJECT MODAL
// ============================================================
function openProjectModal(projectId) {
  const p = PROJECTS.find(pr => pr.id === projectId);
  if (!p) return;

  const projectTasks = TASKS.filter(t => t.projectId === p.id && (viewMode === 'internal' ? t.ownerType === 'internal' : t.ownerType === 'installer'));
  const projectPhotos = PHOTOS.filter(ph => ph.projectId === p.id);
  const currentStageIdx = p.stage === 'completed' ? STAGE_ORDER.length : STAGE_ORDER.indexOf(p.stage);
  const inst = getInstaller(p);
  const coord = getCoord(p);
  const emails = buildEmails(p);

  const slaBadge = p.stage === 'completed' ? '<div class="badge badge-ok mt-1">completed</div>'
    : p.slaStatus === 'breached' ? `<div class="badge badge-danger mt-1">${p.daysOverdue}d overdue</div>`
    : p.slaStatus === 'approaching' ? `<div class="badge badge-warn mt-1">${p.daysInStage}/${p.effectiveTarget}d</div>`
    : p.effectiveTarget ? `<div class="badge badge-ok mt-1">${p.daysInStage}/${p.effectiveTarget}d</div>` : '';

  // Health block — the anti-slippage brain of the modal
  const healthBlock = viewMode === 'internal' && p.stage !== 'completed' ? `
    <div class="card mb-5 ${p.riskLevel === 'high' ? 'border-l-4 border-l-haven-danger' : p.riskLevel === 'medium' ? 'border-l-4 border-l-haven-warn' : 'border-l-4 border-l-haven-ok'}">
      <div class="flex items-start justify-between mb-3">
        <div>
          <h3 class="font-serif font-bold text-haven-forest">Project Health</h3>
          <div class="text-xs text-haven-muted mt-0.5">Risk score: <span class="font-medium text-haven-ink">${p.risk}/100</span> · ${p.riskLevel}</div>
        </div>
        ${p.attentionReasons.length > 0 ? `<div class="flex flex-wrap gap-1 justify-end max-w-sm">${p.attentionReasons.map(r => `<span class="badge badge-attention">${r}</span>`).join('')}</div>` : '<span class="badge badge-ok">On track</span>'}
      </div>

      <div class="grid grid-cols-3 gap-4 text-sm">
        <div>
          <div class="text-xs text-haven-muted uppercase tracking-wide mb-1">Next action</div>
          ${p.nextAction ? `
            <div class="font-medium">${p.nextAction}</div>
            <div class="text-xs text-haven-muted mt-0.5">
              ${p.nextActionOwner} · ${p.nextActionDueInDays < 0 ? `<span class="text-haven-danger font-medium">${-p.nextActionDueInDays}d overdue</span>` : p.nextActionDueInDays === 0 ? '<span class="text-haven-warn font-medium">Due today</span>' : `due in ${p.nextActionDueInDays}d`}
            </div>` : `<div class="text-haven-danger font-medium">— not set —</div><button class="btn btn-secondary text-xs mt-1">Set next action</button>`}
        </div>
        <div>
          <div class="text-xs text-haven-muted uppercase tracking-wide mb-1">Waiting on</div>
          <div class="font-medium">${WAITING_ON_LABELS[p.waitingOn]}</div>
          <div class="text-xs text-haven-muted mt-0.5">${p.waitingOn === 'nothing' ? 'No external blocker' : p.waitingOn === 'ahj' ? p.ahj : p.waitingOn === 'utility' ? p.utility : p.waitingOn === 'installer' ? (inst || 'Unassigned') : p.waitingOn === 'customer' ? 'Customer response' : 'Haven team'}</div>
        </div>
        <div>
          <div class="text-xs text-haven-muted uppercase tracking-wide mb-1">Last activity</div>
          <div class="font-medium ${p.lastTouchedDaysAgo >= IDLE_DANGER ? 'text-haven-warn' : ''}">${p.lastTouchedDaysAgo === 0 ? 'Today' : `${p.lastTouchedDaysAgo}d ago`}</div>
          <div class="text-xs text-haven-muted mt-0.5">${p.lastTouchedDaysAgo >= IDLE_DANGER ? 'Idle — may be slipping' : p.lastTouchedDaysAgo >= IDLE_WARNING ? 'Quiet' : 'Recent activity'}</div>
        </div>
      </div>
    </div>
  ` : '';

  const coordAssignmentBlock = viewMode === 'internal' ? `
    <div class="card mb-5">
      <h3 class="font-serif font-bold text-haven-forest mb-3">Assignments</h3>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-xs text-haven-muted uppercase tracking-wide block mb-1">Install coordinator</label>
          <div class="flex items-center gap-2">
            <select id="coordAssignSelect" class="flex-1 px-3 py-2 border border-haven-border rounded-md text-sm bg-white">
              ${COORDINATORS.map(c => `<option value="${c}" ${coord === c ? 'selected' : ''}>${c}</option>`).join('')}
            </select>
            <button class="btn btn-primary text-sm" onclick="saveCoordAssignment('${p.id}')">Save</button>
          </div>
        </div>
        <div>
          <label class="text-xs text-haven-muted uppercase tracking-wide block mb-1">Installer (subcontractor)</label>
          <div class="flex items-center gap-2">
            <select id="installerSelect" class="flex-1 px-3 py-2 border border-haven-border rounded-md text-sm bg-white">
              <option value="">— Unassigned —</option>
              ${INSTALLERS.map(i => `<option value="${i}" ${inst === i ? 'selected' : ''}>${i}</option>`).join('')}
            </select>
            <button class="btn btn-primary text-sm" onclick="saveAssignment('${p.id}')">Save</button>
          </div>
        </div>
      </div>
    </div>
  ` : '';

  const installerAckBlock = viewMode === 'installer' ? `
    <div class="card mb-5" style="background: rgba(197, 232, 74, 0.1); border-color: rgba(1, 51, 0, 0.2);">
      <div class="flex items-center justify-between">
        <div>
          <h3 class="font-serif font-bold text-haven-forest mb-1">Assigned to ${CURRENT_INSTALLER}</h3>
          <div class="text-sm text-haven-muted">Coordinator: ${coord} · Handed off ${p.kickoffAgo}d ago</div>
        </div>
        <div class="flex gap-2">
          <button class="btn btn-secondary text-sm">Request change</button>
          <button class="btn btn-primary text-sm">Message coordinator</button>
        </div>
      </div>
    </div>
  ` : '';

  document.getElementById('projectModalContent').innerHTML = `
    <div class="sticky top-0 bg-haven-bg px-6 py-4 border-b border-haven-border flex items-center justify-between z-10">
      <div class="flex items-center gap-3">
        ${viewMode === 'internal' ? `<span class="risk-dot ${p.riskLevel || 'low'}"></span>` : ''}
        <div>
          <div class="text-xs text-haven-muted">${p.projectNumber}</div>
          <h2 class="font-serif text-xl font-bold text-haven-forest">${p.name}</h2>
        </div>
      </div>
      <button onclick="closeModal()" class="text-haven-muted hover:text-haven-ink text-2xl leading-none">×</button>
    </div>
    <div class="p-6">
      <div class="flex items-start justify-between mb-5">
        <div class="text-sm text-haven-muted">${p.city}, ${p.state} ${p.zip}</div>
        <div class="text-right">
          <div class="text-xs text-haven-muted uppercase tracking-wide">Current Stage</div>
          <div class="font-serif font-bold text-lg text-haven-forest">${p.stage === 'completed' ? 'Completed' : STAGE_LABELS[p.stage]}</div>
          ${slaBadge}
        </div>
      </div>
      ${healthBlock}
      ${coordAssignmentBlock}
      ${installerAckBlock}

      <div class="card mb-5">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-serif font-bold text-haven-forest">Pipeline</h3>
          ${p.stage !== 'completed' && currentStageIdx < STAGE_ORDER.length - 1 && viewMode === 'internal' ? `<button class="btn btn-primary text-sm" onclick="alert('Advancing requires setting the next action for ${STAGE_LABELS[STAGE_ORDER[currentStageIdx + 1]]}')">Advance to ${STAGE_LABELS[STAGE_ORDER[currentStageIdx + 1]]} →</button>` : ''}
        </div>
        <div class="flex items-center overflow-x-auto pb-2">
          ${STAGE_ORDER.map((stage, i) => {
            const isCurrent = p.stage === stage;
            const isPast = currentStageIdx > i;
            const dotClass = isCurrent ? 'bg-haven-lime border-haven-forest' : isPast ? 'bg-haven-forest border-haven-forest' : 'bg-white border-haven-border';
            const textClass = isCurrent ? 'font-semibold text-haven-forest' : 'text-haven-muted';
            const lineClass = isPast ? 'bg-haven-forest' : 'bg-haven-border';
            return `
              <div class="flex items-center shrink-0">
                <div class="flex flex-col items-center min-w-[90px]">
                  <div class="w-6 h-6 rounded-full border-2 ${dotClass}"></div>
                  <div class="text-[11px] mt-1.5 text-center ${textClass}">${STAGE_LABELS[stage]}</div>
                </div>
                ${i < STAGE_ORDER.length - 1 ? `<div class="h-0.5 w-8 mx-1 ${lineClass}"></div>` : ''}
              </div>`;
          }).join('')}
        </div>
      </div>

      <div class="grid grid-cols-3 gap-5 mb-5">
        <div class="card">
          <h3 class="font-serif font-bold text-haven-forest mb-3">Project Details</h3>
          <dl class="space-y-2 text-sm">
            <div class="flex justify-between gap-3"><dt class="text-haven-muted">System</dt><dd>${p.systemType}</dd></div>
            ${p.solar ? `<div class="flex justify-between gap-3"><dt class="text-haven-muted">Solar</dt><dd>${p.solar} kW</dd></div>` : ''}
            ${p.battery ? `<div class="flex justify-between gap-3"><dt class="text-haven-muted">Battery</dt><dd>${p.battery} kWh</dd></div>` : ''}
            <div class="flex justify-between gap-3"><dt class="text-haven-muted">Utility</dt><dd>${p.utility}</dd></div>
            <div class="flex justify-between gap-3"><dt class="text-haven-muted">AHJ</dt><dd class="text-right">${p.ahj}</dd></div>
            <div class="flex justify-between gap-3"><dt class="text-haven-muted">Coordinator</dt><dd>${coord}</dd></div>
            <div class="flex justify-between gap-3"><dt class="text-haven-muted">Installer</dt><dd class="text-right ${!inst ? 'italic text-haven-muted' : ''}">${inst || 'Unassigned'}</dd></div>
            <div class="flex justify-between gap-3"><dt class="text-haven-muted">Surveyor</dt><dd class="text-right">${p.surveyor || '—'}</dd></div>
            <div class="flex justify-between gap-3"><dt class="text-haven-muted">Kickoff</dt><dd>${p.kickoffAgo}d ago</dd></div>
            <div class="flex justify-between gap-3"><dt class="text-haven-muted">HubSpot</dt><dd>Deal ${123000 + parseInt(p.id.substring(1))}</dd></div>
          </dl>
        </div>
        <div class="card">
          <div class="flex items-center justify-between mb-3">
            <h3 class="font-serif font-bold text-haven-forest">Tasks</h3>
            <span class="text-xs text-haven-muted">${projectTasks.length}</span>
          </div>
          ${projectTasks.length === 0 ? '<div class="text-sm text-haven-muted">No tasks.</div>' : `
            <ul class="space-y-2">
              ${projectTasks.map(t => `
                <li class="text-sm border border-haven-border rounded p-2">
                  <div class="flex items-start justify-between gap-2">
                    <div class="font-medium ${t.status === 'done' ? 'line-through text-haven-muted' : ''}">${t.title}</div>
                    ${t.priority === 'urgent' ? '<span class="badge badge-danger">urgent</span>' : t.priority === 'high' ? '<span class="badge badge-warn">high</span>' : ''}
                  </div>
                  <div class="text-xs text-haven-muted mt-1">${t.status === 'done' ? '✓ completed' : t.dueInDays < 0 ? `${-t.dueInDays}d overdue` : t.dueInDays === 0 ? 'due today' : `due in ${t.dueInDays}d`}</div>
                </li>`).join('')}
            </ul>`}
          <button class="btn btn-secondary text-xs mt-3 w-full justify-center">+ Add task</button>
        </div>
        <div class="card">
          <div class="flex items-center justify-between mb-3">
            <h3 class="font-serif font-bold text-haven-forest">Photos</h3>
            <span class="text-xs text-haven-muted">${projectPhotos.length}</span>
          </div>
          <div class="grid grid-cols-3 gap-1">
            ${projectPhotos.slice(0, 9).map(ph => `
              <div class="aspect-square ${ph.gradient} rounded relative">
                <div class="absolute bottom-0 left-0 right-0 text-[9px] text-white/90 bg-black/30 px-1 truncate">${ph.category.replace('_', ' ')}</div>
              </div>`).join('')}
          </div>
          <button class="btn btn-secondary text-xs mt-3 w-full justify-center">${viewMode === 'installer' ? 'Upload' : 'View all'}</button>
        </div>
      </div>

      <div class="card mb-5">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-serif font-bold text-haven-forest">Email Thread</h3>
          <div class="flex items-center gap-2">
            <span class="text-xs text-haven-muted">Synced from HubSpot · ${emails.length} messages</span>
            <button class="btn btn-accent text-xs">+ New email</button>
          </div>
        </div>
        <div class="space-y-2.5">
          ${emails.map(e => `
            <div class="email-bubble ${e.direction === 'outbound' ? 'outbound' : ''}">
              <div class="email-header">
                <div class="min-w-0 flex-1">
                  <div class="text-xs text-haven-muted">${e.direction === 'outbound' ? 'To: ' : 'From: '}<span class="text-haven-ink">${e.direction === 'outbound' ? e.to : e.from}</span></div>
                  <div class="text-sm font-medium mt-0.5 truncate">${e.subject}</div>
                </div>
                <span class="text-xs text-haven-muted shrink-0">${e.daysAgo === 0 ? 'today' : `${e.daysAgo}d ago`}</span>
              </div>
              <div class="text-sm text-haven-ink whitespace-pre-line mt-2 leading-relaxed">${e.body}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>
  `;
  document.getElementById('projectModal').classList.remove('hidden');
}

function saveAssignment(projectId) {
  const val = document.getElementById('installerSelect').value;
  assignedInstallers[projectId] = val || null;
  openProjectModal(projectId);
  render();
}
window.saveAssignment = saveAssignment;

function saveCoordAssignment(projectId) {
  const val = document.getElementById('coordAssignSelect').value;
  assignedCoords[projectId] = val;
  openProjectModal(projectId);
  renderCoordSelector();
  renderNav();
  render();
}
window.saveCoordAssignment = saveCoordAssignment;

function closeModal() {
  document.getElementById('projectModal').classList.add('hidden');
}
window.closeModal = closeModal;

function attachProjectHandlers() {
  document.querySelectorAll('[data-project-id]').forEach(el => {
    el.addEventListener('click', () => openProjectModal(el.dataset.projectId));
  });
}

document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

renderCoordSelector();
renderNav();
render();
</script>
</body>
</html>
