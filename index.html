  const utilityOverride = p.utility === 'PG&E' && p.stage === 'interconnection' ? 45 : null;
  const effectiveTarget = utilityOverride ?? target;
  const daysOverdue = effectiveTarget ? Math.max(0, p.daysInStage - effectiveTarget) : 0;
  const slaStatus = p.stage === 'completed' ? 'completed'
    : daysOverdue > 0 ? 'breached'
    : effectiveTarget && p.daysInStage >= effectiveTarget * 0.8 ? 'approaching'
    : 'ok';

  let risk = 0;
  if (p.stage !== 'completed') {
    if (slaStatus === 'breached') risk += 30 + Math.min(40, daysOverdue * 2);
    else if (slaStatus === 'approaching') risk += 15;
    if (!p.nextAction) risk += 25;
    if (p.nextActionDueInDays !== null && p.nextActionDueInDays < 0) risk += 15 + Math.min(20, -p.nextActionDueInDays * 3);
    if (p.lastTouchedDaysAgo >= IDLE_DANGER) risk += 20;
    else if (p.lastTouchedDaysAgo >= IDLE_WARNING) risk += 10;
    if (p.priority === 'urgent') risk += 10;
    if (p.priority === 'high') risk += 5;
  }
  risk = Math.min(100, risk);
  const riskLevel = risk >= 50 ? 'high' : risk >= 25 ? 'medium' : 'low';

  return {
    ...p,
    id: `p${i+1}`,
    projectNumber: `HVN-2026-${String(i+1).padStart(4, '0')}`,
    daysOverdue, effectiveTarget, slaStatus,

    const responseDaysAgo = isPast('permitting') ? sentDaysAgo - Math.floor(ahjStats.avg * (0.8 + Math.random() * 0.4)) : null;
    SUBMITTALS.push({
      id: `s${subSeq++}`,
      projectId: p.id,
      type: 'permit_app',
      recipient: p.ahj,
      recipientType: 'ahj',
      sentDaysAgo,
      expectedResponseInDays,
      responseDaysAgo,
      status: responseDaysAgo !== null ? 'responded' : (sentDaysAgo > expectedResponseInDays ? 'overdue' : 'pending'),
    });
  }

  // Resubmit for Oakland permitting project specifically
  if (p.id === 'p2') {
    SUBMITTALS.push({
      id: `s${subSeq++}`, projectId: p.id, type: 'permit_resubmit', recipient: p.ahj, recipientType: 'ahj',
      sentDaysAgo: 14, expectedResponseInDays: 14, responseDaysAgo: null, status: 'pending',
    });
  }

  // Interconnection for anything at or past that stage
  if (stageIdx >= STAGE_ORDER.indexOf('interconnection') || completed) {
    const sentDaysAgo = isCurrent('interconnection') ? p.daysInStage : 20 + Math.floor(Math.random() * 15);
    const uStats = EXTERNAL_PARTY_STATS[p.utility] || { avg: 30 };
    const responseDaysAgo = completed ? sentDaysAgo - Math.floor(uStats.avg * 0.9) : null;
    SUBMITTALS.push({
      id: `s${subSeq++}`,
      projectId: p.id,
      type: 'interconnection_app',
      recipient: p.utility,
      recipientType: 'utility',
      sentDaysAgo,
      expectedResponseInDays: uStats.avg,
      responseDaysAgo,
      status: responseDaysAgo !== null ? 'responded' : (sentDaysAgo > uStats.avg ? 'overdue' : 'pending'),
    });
  }

  // Inspection request for projects at inspection stage
  if (isCurrent('inspection') || isPast('inspection')) {
    const sentDaysAgo = isCurrent('inspection') ? p.daysInStage : 12 + Math.floor(Math.random() * 8);
    SUBMITTALS.push({
      id: `s${subSeq++}`, projectId: p.id, type: 'inspection_request', recipient: p.ahj, recipientType: 'ahj',
      sentDaysAgo, expectedResponseInDays: 7, responseDaysAgo: isPast('inspection') ? sentDaysAgo - 5 : null,
      status: isPast('inspection') ? 'responded' : (sentDaysAgo > 7 ? 'overdue' : 'pending'),
    });
  }

  // SGIP for rebate-stage projects
  if (isCurrent('rebate')) {
    SUBMITTALS.push({
      id: `s${subSeq++}`, projectId: p.id, type: 'sgip_rsse', recipient: 'SGIP PA (CSE)', recipientType: 'rebate',
      sentDaysAgo: Math.max(1, p.daysInStage - 2), expectedResponseInDays: 21, responseDaysAgo: null,
      status: 'pending',
    });
  }
});

// Seed blockers on ~25% of active projects, weighted toward at-risk projects and certain stages
(function seedBlockers() {
  let seed = 13417;
  const rand = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };

  // Blocker codes most relevant per stage
  const stageBlockerPool = {
    site_survey: ['customer_unresponsive', 'access_issue', 'survey_review_pending'],
    design: ['customer_design_rejected', 'design_queue', 'docs_missing', 'customer_unresponsive'],
    permitting: ['ahj_corrections_pending', 'ahj_review_stalled', 'ahj_fee_unpaid', 'hoa_letter_missing'],
    scheduling: ['installer_not_accepting', 'customer_unresponsive', 'equipment_backorder', 'financing_pending'],
    installation: ['installer_reschedule', 'equipment_backorder', 'access_issue'],
    inspection: ['inspection_failed', 'installer_photos_missing', 'ahj_review_stalled'],
    interconnection: ['utility_pto_delay', 'utility_clarification', 'interconnection_denied', 'meter_collar_needed'],
    rebate: ['docs_missing'],
  };

  PROJECTS.forEach(p => {
    if (p.stage === 'completed') return;

    // Probability of having a blocker — higher for at-risk and later-stage projects
    const baseP =
      p.riskLevel === 'high' ? 0.75 :
      p.riskLevel === 'medium' ? 0.35 :
      0.15;

    if (rand() > baseP) return;

    const pool = stageBlockerPool[p.stage] || [];
    if (pool.length === 0) return;

    // Usually 1 blocker, occasionally 2
    const count = rand() < 0.15 ? 2 : 1;
    const picked = new Set();
    for (let i = 0; i < count; i++) {
      const code = pool[Math.floor(rand() * pool.length)];
      if (picked.has(code)) continue;
      picked.add(code);

      // Age the blocker. Higher-risk projects have older blockers.
      let openedDaysAgo;
      if (p.riskLevel === 'high') {
        openedDaysAgo = 14 + Math.floor(rand() * 30); // 14-44 days
      } else if (p.riskLevel === 'medium') {
        openedDaysAgo = 5 + Math.floor(rand() * 15); // 5-20 days
      } else {
        openedDaysAgo = 1 + Math.floor(rand() * 6); // 1-7 days
      }

      const coordOptions = ['Shane Brennan', 'Danny Chen', 'Yaz Okonkwo', 'Tenacia Williams'];
      const openedBy = p.coord || coordOptions[Math.floor(rand() * coordOptions.length)];

      pushBlocker(p.id, code, openedDaysAgo, null, openedBy);
    }
  });
})();

// WORK ORDERS, PAYMENTS, INSTALLER PROJECT DATA, NOTES
// ============================================================
// A work order is Haven dispatching a project to an installer. Installer has 3 days to
// accept. If they decline or it expires, it rolls to the next installer in fallbackQueue.
// Once accepted, the project is "claimed" by that installer.

const WORK_ORDER_WINDOW_DAYS = 3;

// Haven's installer payout schedule (as of current pricing):
// - 1 battery install: $2,500 flat
// - 2 battery install: $3,000 flat
// - 0 battery or 3+ batteries: custom quote (returns null, triggers "Custom quote needed" flag)
// Payment: 50% on install completion, 50% on inspection pass.
// On top of base, the installer can submit adders (e.g. long trenching run, additional subpanel).
// Each adder is reviewed by Haven internal and approved or rejected before paid.
// Approved adders are paid with the inspection (final) payment.

function batteryCount(p) {
  // Standard Enphase IQ Battery 5P is ~5 kWh, Tesla Powerwall ~13.5, larger systems = multi-battery.
  // Use 13.5 kWh as the "1 battery" threshold for demo.
  if (!p.battery) return 0;
  if (p.battery <= 13.5) return 1;
  if (p.battery <= 20.5) return 2;
  return Math.ceil(p.battery / 13.5); // rough for 3+
}

function installerPayoutFor(p) {
  const bc = batteryCount(p);
  if (bc === 1) return 2500;
  if (bc === 2) return 3000;
  return null; // needs custom quote
}

function installerPayoutDisplay(p) {
  const v = installerPayoutFor(p);
  return v === null ? 'Custom quote' : dollarFmt(v);
}

// When we need a numeric amount for payment tracking (custom quotes default to 2500 in demo)
function installerPayoutAmount(p) {
  const v = installerPayoutFor(p);
  return v === null ? 2500 : v;
}

// Small helper mirroring the later dollar() but available during seeding
function dollarFmt(n) { return '$' + Math.round(n).toLocaleString(); }

const WORK_ORDERS = []; // array of work order objects
const INSTALLER_PROJECT_DATA = {}; // projectId -> { installConfirmedDate, installCompletedAt, inspectionConfirmedDate, inspectionResult, inspectionResultAt }
const PAYMENTS = {}; // projectId -> { amount, installPaid, installPaidAt, inspectionPaid, inspectionPaidAt }
const ADDERS = {}; // projectId -> [{ id, amount, description, submittedBy, submittedAt, status: 'pending'|'approved'|'rejected', reviewedBy, reviewedAt, reviewNote }]
const NOTES = {}; // projectId -> [{ id, author, role, body, createdAt }]

let adderSeq = 1;
function addAdder(projectId, amount, description, submittedBy) {
  if (!ADDERS[projectId]) ADDERS[projectId] = [];
  const a = {
    id: `ad${adderSeq++}`,
    projectId,
    amount: Math.round(Number(amount) || 0),
    description: description || '',
    submittedBy: submittedBy || 'Installer',
    submittedAt: Date.now(),
    status: 'pending',
    reviewedBy: null,
    reviewedAt: null,
    reviewNote: null,
  };
  ADDERS[projectId].push(a);
  return a;
}

function reviewAdder(adderId, decision, reviewNote) {
  for (const pid in ADDERS) {
    const a = ADDERS[pid].find(x => x.id === adderId);
    if (a) {
      a.status = decision; // 'approved' | 'rejected'
      a.reviewedBy = currentActor();
      a.reviewedAt = Date.now();
      a.reviewNote = reviewNote || null;
      return a;
    }
  }
  return null;
}

function approvedAddersTotal(projectId) {
  return (ADDERS[projectId] || [])
    .filter(a => a.status === 'approved')
    .reduce((sum, a) => sum + a.amount, 0);
}

function pendingAddersTotal(projectId) {
  return (ADDERS[projectId] || [])
    .filter(a => a.status === 'pending')
    .reduce((sum, a) => sum + a.amount, 0);
}

function pendingAddersCountAll() {
  let n = 0;
  for (const pid in ADDERS) n += ADDERS[pid].filter(a => a.status === 'pending').length;
  return n;
}

let woSeq = 1;
function makeWorkOrder(projectId, dispatchedTo, fallbackQueue, dispatchedDaysAgo, status, signedBy, acceptedDaysAgo, declinedReason) {
  const dispatchedAt = Date.now() - dispatchedDaysAgo * 86400000;
  const expiresAt = dispatchedAt + WORK_ORDER_WINDOW_DAYS * 86400000;
  return {
    id: `wo${woSeq++}`,
    projectId,
    dispatchedTo,
    fallbackQueue: fallbackQueue || [],
    dispatchedAt,
    expiresAt,
    status,
    signedBy: signedBy || null,
    acceptedAt: acceptedDaysAgo !== undefined ? Date.now() - acceptedDaysAgo * 86400000 : null,
    declinedReason: declinedReason || null,
  };
}

// REWORK SEED — projects that were sent back to a prior stage
// ============================================================
// Seed ~7% of active projects as rework, biased toward stages with common regression patterns:
// permitting (AHJ plan corrections), interconnection (utility requests revisions),
// installation (failed inspection triggers re-do), inspection (correction punch-list).
const REWORK_REASON_BY_STAGE = {
  permitting: [
    'AHJ requested revised structural calcs',
    'Plan reviewer flagged missing conduit sizing',
    'Correction notice: relabel MSP load calc',
    'Setback callout not on cover sheet',
  ],
  design: [
    'Customer requested panel layout change',
    'Revised post-install production estimate under target',
  ],
  installation: [
    'Install photos missing — crew recalled to site',
    'Wrong inverter serial logged, re-commission required',
    'Battery bracket installed per old spec, needs rework',
  ],
  inspection: [
    'Failed inspection: missing conduit strap',
    'Failed inspection: incorrect MSP labeling',
    'Inspector punch list: grounding correction',
  ],
  interconnection: [
    'Utility rejected PTO app — SLD revision required',
    'Net meter program form resubmission required',
  ],
  scheduling: [
    'Customer reschedule — re-coordinate installer crew',
  ],
  rebate: [
    'SGIP rejected: missing spec sheet attachment',
  ],
};
(function seedRework() {
  const eligibleStages = ['permitting', 'design', 'installation', 'inspection', 'interconnection', 'scheduling', 'rebate'];
  // Use a small deterministic picker from the project id hash so seeds are stable across reloads
  const hash = (s) => { let h = 0; for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0; return Math.abs(h); };
  PROJECTS.forEach(p => {
    if (p.stage === 'completed') return;
    if (!eligibleStages.includes(p.stage)) return;
    // ~7% overall, weighted higher for stages prone to regression
    const stageWeight = { permitting: 0.13, interconnection: 0.10, inspection: 0.10, installation: 0.06, design: 0.05, scheduling: 0.04, rebate: 0.09 };
    const prob = stageWeight[p.stage] || 0.05;
    const h = hash(p.id);
    if ((h % 1000) / 1000 >= prob) return;

    const pool = REWORK_REASON_BY_STAGE[p.stage] || [];
    if (pool.length === 0) return;

    const reasonIdx = h % pool.length;
    const reason = pool[reasonIdx];

    // Rework age: 1 to daysInStage, but capped so it feels realistic
    const reworkedDaysAgo = Math.max(1, Math.min(p.daysInStage || 3, 1 + (h % 21)));

    // Figure out "returned from" stage — typically the next stage, or later
    const stageIdx = STAGE_ORDER.indexOf(p.stage);
    const returnedFrom = STAGE_ORDER[Math.min(STAGE_ORDER.length - 1, stageIdx + 1 + (h % 2))] || STAGE_ORDER[stageIdx + 1] || p.stage;

    p.reworkCount = 1 + (h % 100 < 12 ? 1 : 0); // ~12% have been reworked twice
    p.reworkReason = reason;
    p.reworkFromStage = returnedFrom;
    p.reworkedDaysAgo = reworkedDaysAgo;
  });
})();

// Initialize stage-entered timestamps for existing projects so history shows relative durations
(function initStageHistory() {
  const now = Date.now();
  PROJECTS.forEach(p => {
    stageEnteredAt[p.id] = now - (p.daysInStage * 86400000);
    stageHistory[p.id] = [];
  });
})();

function currentActor() {
  // Who's making the change. Internal mode = the selected coordinator (or "Leadership" if __all__),
  // installer mode = the current installer contact.
  if (viewMode === 'installer') return CURRENT_INSTALLER;
  if (currentCoord === '__all__') return 'Leadership';
  return currentCoord;
}

function moveProjectStage(projectId, newStage, reason) {
  const p = PROJECTS.find(pr => pr.id === projectId);
  if (!p) return false;
  if (p.stage === newStage) return false;
  const now = Date.now();
  const enteredAt = stageEnteredAt[projectId] || now;
  const daysInPriorStage = Math.max(0, Math.round((now - enteredAt) / 86400000));
  stageHistory[projectId].push({
    from: p.stage,
    to: newStage,
    movedAt: now,
    movedBy: currentActor(),
    reason: reason || null,
    daysInPriorStage,
  });
  p.stage = newStage;
  p.daysInStage = 0;
  stageEnteredAt[projectId] = now;

  // Recompute SLA fields for the new stage
  const target = (p.state === 'MA' ? STAGE_TARGETS_MA : STAGE_TARGETS_CA)[newStage] ?? null;
  const utilityOverride = p.utility === 'PG&E' && newStage === 'interconnection' ? 45 : null;
  p.effectiveTarget = utilityOverride ?? target;
  p.daysOverdue = 0;
  p.slaStatus = newStage === 'completed' ? 'completed' : 'ok';

  // Auto-generate stage-entry tasks for the new stage (if it has a template and isn't completed)
  if (newStage !== 'completed' && STAGE_TEMPLATES[newStage]) {
    const existing = TASKS.filter(t => t.projectId === projectId && t.stage === newStage && t.autoGenerated);
    if (existing.length === 0) {
      STAGE_TEMPLATES[newStage].forEach(t => {
        const ownerType = (t.owner === 'installer' || t.owner === 'surveyor') ? 'installer' : 'internal';
        TASKS.push({
          id: `t${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
          projectId, title: t.title, priority: 'normal',
          dueInDays: t.offset, status: 'open', stage: newStage,
          ownerType, autoGenerated: true, fromTemplate: true,
        });
      });
    }
  }
  return true;
}

function getInstaller(p) { return assignedInstallers[p.id] !== undefined ? assignedInstallers[p.id] : p.installer; }
function getCoord(p) { return assignedCoords[p.id] !== undefined ? assignedCoords[p.id] : p.coord; }

function visibleProjects() {
  if (viewMode === 'installer') {
    // Installer sees projects where they have an accepted work order
    return PROJECTS.filter(p => {
      const wo = getWorkOrderForProject(p.id, CURRENT_INSTALLER);
      return wo && wo.status === 'accepted';
    });
  }
  if (currentCoord === '__all__') return PROJECTS;
  return PROJECTS.filter(p => getCoord(p) === currentCoord);
}

// Stage-scoped projects: visibleProjects filtered by the sidebar "Viewing stage" selector.
// Used by Projects, Tasks, and Blockers pages. Pipeline does NOT use this (it buckets by stage itself).
function stageScopedProjects() {
  const base = visibleProjects();
  if (currentStage === '__all__') return base;
  return base.filter(p => p.stage === currentStage);
}

// Which projects are "ready to advance"?
// Definition: at current stage for > 0 days, all auto-generated tasks for this stage are done, not already at end
function isReadyToAdvance(p) {
  if (p.stage === 'completed' || p.stage === 'rebate') return false;
  const stageTasks = TASKS.filter(t => t.projectId === p.id && t.stage === p.stage && t.autoGenerated);
  if (stageTasks.length === 0) return false;
  const openCount = stageTasks.filter(t => !completedTasks.has(t.id) && t.status !== 'done').length;
  return openCount === 0;
}

// Customer response overdue?
function customerSilenceDays(p) {
  if (p.waitingOn !== 'customer') return 0;
  return p.customerLastReplyDaysAgo || 0;
}

function getCoordAttentionCount(name) {
  return PROJECTS.filter(p =>
    p.stage !== 'completed' &&
    (name === '__all__' || getCoord(p) === name) &&
    p.riskLevel === 'high'
  ).length;
}

function getReadyToAdvanceCount(scope = 'current') {
  const list = scope === 'current' ? visibleProjects() : PROJECTS;
  return list.filter(p => isReadyToAdvance(p)).length;
}

function renderNav() {
  const nav = document.getElementById('nav');
  const items = viewMode === 'installer' ? NAV_INSTALLER : NAV_INTERNAL;
  nav.innerHTML = items.map(item => {
    if (item.group) return `<div class="nav-group-label">${item.group}</div>`;
    let countBadge = '';
    if (item.view === 'home' && viewMode === 'internal') {
      const cnt = getCoordAttentionCount(currentCoord);
      if (cnt > 0) countBadge = `<span class="count-badge">${cnt}</span>`;
    }
    if (item.view === 'workorders' && viewMode === 'installer') {
      const cnt = WORK_ORDERS.filter(w => w.dispatchedTo === CURRENT_INSTALLER && w.status === 'pending').length;
      if (cnt > 0) countBadge = `<span class="count-badge">${cnt}</span>`;
    }
    return `<div class="nav-link ${currentView === item.view ? 'active' : ''}" data-view="${item.view}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">${item.icon}</svg>
      <span>${item.label}</span>${countBadge}
    </div>`;
  }).join('');
  nav.querySelectorAll('.nav-link').forEach(el => {
    el.addEventListener('click', () => {
      currentView = el.dataset.view;
      pipelineFilter = 'all';
      pipelineDrilldownStage = null;
      pipelineDrilldownSubBucket = null;
      pipelineDrilldownFilters = { utility: null, installer: null, coord: null, sub_bucket: null };
      pipelineDrilldownOpenFilter = null;
      pipelineSearch = '';
      pipelineExpandedStages = new Set();
      runbookProjectId = null;
      jobsSearch = '';
      selectedTasks.clear();
      stuckDrilldownStatus = null;
      renderNav();
      render();
    });
  });
}

function renderStageSelector() {
  const sel = document.getElementById('stageSelect');
  // Build options: "All stages" + each pipeline stage + Completed
  const stageOptions = STAGE_ORDER.concat(['completed']);
  const opts = [
    `<option value="__all__">All stages</option>`,
    ...stageOptions.map(s => {
      const label = s === 'completed' ? 'Completed' : STAGE_LABELS[s];
      return `<option value="${s}" ${currentStage === s ? 'selected' : ''}>${label}</option>`;
    })
  ];
  sel.innerHTML = opts.join('');
  sel.value = currentStage;
  const context = document.getElementById('stageContext');
  if (currentStage === '__all__') {
    const active = PROJECTS.filter(p => p.stage !== 'completed').length;
    context.innerHTML = `<span class="text-haven-muted">${active} active across pipeline</span>`;
  } else if (currentStage === 'completed') {
    const count = PROJECTS.filter(p => p.stage === 'completed').length;
    context.innerHTML = `<span class="text-haven-muted">${count} completed</span>`;
  } else {
    const count = PROJECTS.filter(p => p.stage === currentStage).length;
    const atRisk = PROJECTS.filter(p => p.stage === currentStage && p.riskLevel === 'high').length;
    context.innerHTML = `<span class="text-haven-muted">${count} in stage${atRisk > 0 ? ` · <span class="text-haven-danger">${atRisk} at risk</span>` : ''}</span>`;
  }
}

// Backward-compat alias: some older code paths still call renderCoordSelector.
function renderCoordSelector() { renderStageSelector(); }

document.getElementById('toggleInternal').addEventListener('click', () => setMode('internal'));
document.getElementById('toggleInstaller').addEventListener('click', () => setMode('installer'));
document.getElementById('stageSelect').addEventListener('change', (e) => {
  currentStage = e.target.value;
  // Clear task selection since the visible set has changed
  selectedTasks.clear();
  renderStageSelector(); renderNav(); render();
});

function setMode(mode) {
  viewMode = mode;
  document.querySelectorAll('.view-toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  document.getElementById('stageSelector').style.display = mode === 'installer' ? 'none' : 'block';
  currentView = mode === 'installer' ? 'dashboard' : 'pipeline';
  pipelineFilter = 'all';
  renderNav(); render(); closeModal();
}

function render() {
  main.innerHTML = '';
  if (viewMode === 'internal') {
    if (currentView === 'pipeline') renderPipeline();
    else if (currentView === 'projects') renderProjects();
    else if (currentView === 'tasks') renderTasks(false);
    else if (currentView === 'blockers') renderBlockers();
    else if (currentView === 'rework') renderRework();
    else if (currentView === 'post_install') renderPostInstall();
    else if (currentView === 'schedule') renderSchedule();
    else if (currentView === 'metrics') renderMetrics();
    else if (currentView === 'stuck') renderStuck();
    else if (currentView === 'monthly_stats') renderMonthlyStats();
    else renderPipeline();
  } else {
    if (currentView === 'dashboard') renderInstallerDashboard();
    else if (currentView === 'workorders') renderWorkOrders();
    else if (currentView === 'jobs') renderInstallerJobs();
    else if (currentView === 'install_day') renderInstallDay();
    else if (currentView === 'payments') renderInstallerPayments();
    else if (currentView === 'tasks') renderTasks(true);
    else if (currentView === 'schedule') renderSchedule();
    else renderInstallerDashboard();
  }
  main.scrollTop = 0;
}


// ============================================================
// HOME — lean attention queue + response tracker + ready-to-advance
// ============================================================
function renderHome() {
  const visible = visibleProjects().filter(p => p.stage !== 'completed');
  const isLeadership = currentCoord === '__all__';
  const displayName = isLeadership ? 'Leadership' : currentCoord.split(' ')[0];

  const attention = visible.filter(p => p.riskLevel !== 'low').sort((a, b) => b.risk - a.risk);
  const readyToAdvance = visible.filter(p => isReadyToAdvance(p));
  const customerSilent = visible.filter(p => customerSilenceDays(p) >= CUSTOMER_SILENCE_WARNING);

  function primaryReason(p) {
    if (p.slaStatus === 'breached') return { text: `${p.daysOverdue}d past SLA`, tone: 'danger' };
    if (!p.nextAction) return { text: 'No next action', tone: 'danger' };
    if (p.nextActionDueInDays !== null && p.nextActionDueInDays < 0) return { text: `Action ${-p.nextActionDueInDays}d late`, tone: 'warn' };
    if (p.lastTouchedDaysAgo >= IDLE_DANGER) return { text: `Idle ${p.lastTouchedDaysAgo}d`, tone: 'warn' };
    if (p.nextActionDueInDays === 0) return { text: 'Action due today', tone: 'warn' };
    if (p.lastTouchedDaysAgo >= IDLE_WARNING) return { text: `Quiet ${p.lastTouchedDaysAgo}d`, tone: 'neutral' };
    return { text: 'Approaching SLA', tone: 'neutral' };
  }

  const attentionRow = (p) => {
    const reason = primaryReason(p);
    const toneClass = reason.tone === 'danger' ? 'text-haven-danger' : reason.tone === 'warn' ? 'text-haven-warn' : 'text-haven-muted';
    return `
      <div class="cursor-pointer hover:bg-haven-bg px-4 py-3 border-b border-haven-border flex items-center gap-4" data-project-id="${p.id}">
        <span class="risk-dot ${p.riskLevel}"></span>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <span class="font-medium truncate">${p.name}</span>
            <span class="text-xs text-haven-muted">· ${STAGE_LABELS[p.stage]}</span>
          </div>
          <div class="text-xs text-haven-muted mt-0.5 truncate">${p.nextAction || '<span class="italic text-haven-danger">No next action set</span>'}</div>
        </div>
        <div class="text-right shrink-0">
          <div class="text-sm font-medium ${toneClass}">${reason.text}</div>
          ${isLeadership ? `<div class="text-xs text-haven-muted mt-0.5">${getCoord(p).split(' ')[0]}</div>` : ''}
        </div>
      </div>`;
  };

  main.innerHTML = `
    <div class="p-6 max-w-4xl">
      <div class="mb-5">
        <h1 class="font-serif text-2xl font-bold text-haven-forest">${isLeadership ? 'Leadership home' : `Good morning, ${displayName}`}</h1>
        <p class="text-sm text-haven-muted mt-1">${visible.length} active · ${attention.length === 0 ? 'nothing flagged' : `${attention.length} need${attention.length === 1 ? 's' : ''} attention`}${readyToAdvance.length > 0 ? ` · <span class="text-haven-ok font-medium">${readyToAdvance.length} ready to advance</span>` : ''}</p>
      </div>

      ${(() => {
        const visibleIds = new Set(visible.map(p => p.id));
        const openBlockers = BLOCKERS.filter(b => !b.resolvedAt && visibleIds.has(b.projectId));
        if (openBlockers.length === 0) return '';

        const ancient = openBlockers.filter(b => b.openedDaysAgo >= 30).length;
        const stale = openBlockers.filter(b => b.openedDaysAgo >= 7 && b.openedDaysAgo < 30).length;
        const uniqueProjects = new Set(openBlockers.map(b => b.projectId)).size;
        const oldest = openBlockers.reduce((max, b) => b.openedDaysAgo > max ? b.openedDaysAgo : max, 0);

        // Top 3 oldest blockers to preview
        const preview = openBlockers.slice().sort((a, b) => b.openedDaysAgo - a.openedDaysAgo).slice(0, 3);

        const borderColor = ancient > 0 ? '#C44545' : stale > 0 ? '#E0A83A' : '#6B7568';
        const tone = ancient > 0 ? 'danger' : stale > 0 ? 'warn' : 'neutral';
        const toneClass = tone === 'danger' ? 'text-haven-danger' : tone === 'warn' ? 'text-haven-warn' : 'text-haven-forest';

        return `
          <div class="card p-0 overflow-hidden mb-5" style="border-left: 4px solid ${borderColor};">
            <div class="px-4 py-3 border-b border-haven-border flex items-center justify-between cursor-pointer hover:bg-haven-bg" onclick="goToBlockers()">
              <div>
                <h2 class="font-serif font-bold ${toneClass}">Blockers (${openBlockers.length} across ${uniqueProjects} project${uniqueProjects === 1 ? '' : 's'})</h2>
                <div class="text-xs text-haven-muted mt-0.5">
                  ${ancient > 0 ? `<span class="text-haven-danger font-medium">${ancient} ancient (30d+)</span> · ` : ''}
                  ${stale > 0 ? `<span class="text-haven-warn font-medium">${stale} stale</span> · ` : ''}
                  oldest is ${oldest}d
                </div>
              </div>
              <div class="text-xs text-haven-forest hover:underline">View all →</div>
            </div>
            ${preview.map(b => {
              const p = PROJECTS.find(pp => pp.id === b.projectId);
              if (!p) return '';
              const tone = blockerAgeTone(b);
              const ageClass = tone === 'danger' ? 'text-haven-danger' : tone === 'warn' ? 'text-haven-warn' : 'text-haven-muted';
              const catColor = BLOCKER_CATEGORY_COLORS[b.category];
              return `
                <div class="cursor-pointer hover:bg-haven-bg px-4 py-3 border-b border-haven-border flex items-center gap-3" data-project-id="${p.id}">
                  <div class="w-2 h-2 rounded-full shrink-0" style="background:${catColor}"></div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2">
                      <span class="font-medium truncate">${b.label}</span>
                      <span class="text-xs text-haven-muted">· ${p.name}</span>
                    </div>
                    <div class="text-xs text-haven-muted mt-0.5 truncate">${b.resolution}</div>
                  </div>
                  <div class="tabular-nums text-sm font-semibold shrink-0 ${ageClass}">${b.openedDaysAgo}d</div>
                </div>`;
            }).join('')}
          </div>
        `;
      })()}

      ${readyToAdvance.length > 0 ? `
        <div class="card p-0 overflow-hidden mb-5" style="border-left: 4px solid #2F7A3E;">
          <div class="px-4 py-3 border-b border-haven-border flex items-center justify-between">
            <div>
              <h2 class="font-serif font-bold text-haven-ok">Ready to advance (${readyToAdvance.length})</h2>
              <div class="text-xs text-haven-muted mt-0.5">All stage tasks complete — move these forward now</div>
            </div>
            <button class="btn btn-accent text-xs">Advance all</button>
          </div>
          ${readyToAdvance.slice(0, 5).map(p => `
            <div class="cursor-pointer hover:bg-haven-bg px-4 py-3 border-b border-haven-border flex items-center gap-4" data-project-id="${p.id}">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2">
                  <span class="font-medium truncate">${p.name}</span>
                  <span class="text-xs text-haven-muted">· in ${STAGE_LABELS[p.stage]} ${p.daysInStage}d</span>
                </div>
                <div class="text-xs text-haven-ok mt-0.5">→ ready for ${STAGE_LABELS[STAGE_ORDER[STAGE_ORDER.indexOf(p.stage) + 1]]}</div>
              </div>
              ${isLeadership ? `<div class="text-xs text-haven-muted">${getCoord(p).split(' ')[0]}</div>` : ''}
            </div>`).join('')}
        </div>
      ` : ''}

      <div class="card p-0 overflow-hidden mb-5">
        <div class="px-4 py-3 border-b border-haven-border flex items-center justify-between">
          <h2 class="font-serif font-bold text-haven-forest">Needs attention</h2>
          <span class="text-xs text-haven-muted">Sorted by risk</span>
        </div>
        ${attention.length === 0 ? '<div class="px-4 py-8 text-center text-sm text-haven-muted">All projects have next actions and recent activity.</div>' : (() => {
          const CAP = 30;
          const shown = attention.slice(0, CAP);
          const extra = attention.length - shown.length;
          return shown.map(attentionRow).join('') +
            (extra > 0 ? `<div class="px-4 py-3 text-center text-xs text-haven-muted border-t border-haven-border">Showing top ${CAP} of ${attention.length} — highest risk first</div>` : '');
        })()}
      </div>

      ${customerSilent.length > 0 ? `
        <div class="card p-0 overflow-hidden mb-5">
          <div class="px-4 py-3 border-b border-haven-border flex items-center justify-between">
            <h2 class="font-serif font-bold text-haven-forest">Waiting on customer response</h2>
            <span class="text-xs text-haven-muted">${customerSilent.length} customers</span>
          </div>
          ${customerSilent.sort((a, b) => customerSilenceDays(b) - customerSilenceDays(a)).map(p => {
            const d = customerSilenceDays(p);
            const tone = d >= CUSTOMER_SILENCE_DANGER ? 'danger' : 'warn';
            return `
              <div class="cursor-pointer hover:bg-haven-bg px-4 py-3 border-b border-haven-border flex items-center gap-4" data-project-id="${p.id}">
                <div class="flex-1 min-w-0">
                  <div class="font-medium truncate">${p.name}</div>
                  <div class="text-xs text-haven-muted mt-0.5 truncate">In ${STAGE_LABELS[p.stage]} · ${p.nextAction || 'waiting on reply'}</div>
                </div>
                <div class="text-right shrink-0">
                  <div class="text-sm font-medium text-haven-${tone}">Silent ${d}d</div>
                  <button class="text-xs text-haven-forest hover:underline mt-0.5" onclick="event.stopPropagation(); alert('Nudge email drafted for ${p.name}')">Nudge</button>
                </div>
              </div>`;
          }).join('')}
        </div>` : ''}

      ${renderPendingAddersCard()}

      ${isLeadership ? renderCoordLoadMini() : ''}
    </div>
  `;
  attachProjectHandlers();
}

function renderPendingAddersCard() {
  // Collect all pending adders for visible projects (leadership sees all, coord sees their own)
  const visibleIds = new Set(visibleProjects().map(p => p.id));
  const pending = [];
  for (const pid in ADDERS) {
    if (!visibleIds.has(pid)) continue;
    ADDERS[pid].filter(a => a.status === 'pending').forEach(a => pending.push(a));
  }
  if (pending.length === 0) return '';
  pending.sort((a, b) => a.submittedAt - b.submittedAt); // oldest first

  return `
    <div class="card p-0 overflow-hidden mb-5">
      <div class="px-4 py-3 border-b border-haven-border flex items-center justify-between">
        <h2 class="font-serif font-bold text-haven-forest">Installer adders awaiting review</h2>
        <span class="text-xs text-haven-muted">${pending.length} pending · ${dollar(pending.reduce((s, a) => s + a.amount, 0))} total</span>
      </div>
      ${pending.map(a => {
        const p = PROJECTS.find(pr => pr.id === a.projectId);
        return `
          <div class="cursor-pointer hover:bg-haven-bg px-4 py-3 border-b border-haven-border flex items-start gap-4" data-project-id="${a.projectId}">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 mb-0.5">
                <span class="font-medium">${p ? p.name : 'Project'}</span>
                <span class="text-xs text-haven-muted">· ${a.submittedBy} · ${timeAgo(a.submittedAt)}</span>
              </div>
              <div class="text-sm text-haven-ink truncate">${escapeHtml(a.description)}</div>
            </div>
            <div class="text-right shrink-0">
              <div class="font-semibold text-haven-forest">${dollar(a.amount)}</div>
              <div class="text-xs text-haven-muted mt-0.5">Click to review</div>
            </div>
          </div>`;
      }).join('')}
    </div>`;
}

function renderCoordLoadMini() {
  const loads = COORDINATORS.map(c => {
    const their = PROJECTS.filter(p => p.stage !== 'completed' && getCoord(p) === c);
    const atRisk = their.filter(p => p.riskLevel === 'high').length;
    return { coord: c, count: their.length, atRisk };
  });
  return `
    <div class="card">
      <h3 class="font-serif font-bold text-haven-forest mb-3 text-sm">Coordinator load</h3>
      <div class="space-y-2 text-sm">
        ${loads.map(l => `
          <div class="flex items-center justify-between cursor-pointer hover:text-haven-forest" onclick="switchToCoord('${l.coord}')">
            <span class="text-haven-muted">${l.coord.split(' ')[0]}</span>
            <span class="flex items-center gap-2">
              ${l.atRisk > 0 ? `<span class="badge badge-danger">${l.atRisk}</span>` : ''}
              <span class="font-medium">${l.count}</span>
            </span>
          </div>
        `).join('')}
      </div>
    </div>`;
}

window.switchToCoord = (c) => {
  currentCoord = c;
  renderCoordSelector(); renderNav(); render();
};

// ============================================================
// PIPELINE — kanban with ready-to-advance filter
// ============================================================
function renderPipeline() {
  // If drilled into a stage, render that instead
  if (pipelineDrilldownStage) {
    renderPipelineDrilldown();
    return;
  }

  // Completed view: list style (not kanban)
  if (pipelineFilter === 'completed') {
    renderPipelineCompleted();
    return;
  }

  const activeAll = pipelineFilteredProjects();
  const byStage = {};
  STAGE_ORDER.forEach(s => byStage[s] = activeAll.filter(p => p.stage === s));

  const stateFilteredAll = visibleProjects().filter(p => p.stage !== 'completed' && (pipelineStateFilter === 'all' || p.state === pipelineStateFilter));
  const totalCount = stateFilteredAll.length;
  const readyCount = stateFilteredAll.filter(p => isReadyToAdvance(p)).length;
  const atRiskCount = stateFilteredAll.filter(p => p.riskLevel === 'high').length;
  const completedCount = visibleProjects().filter(p => p.stage === 'completed' && (pipelineStateFilter === 'all' || p.state === pipelineStateFilter)).length;
  const grandTotal = totalCount + completedCount;

  const coordLabel = currentCoord === '__all__' ? 'All coordinators' : currentCoord;

  // KPI tiles at top: active / at risk / ready to advance / grand total
  const kpiTile = (label, value, tone, sub) => `
    <div class="card px-5 py-4" style="${tone === 'ok' ? 'border-left:3px solid #2F7A3E;' : tone === 'warn' ? 'border-left:3px solid #E0A83A;' : tone === 'danger' ? 'border-left:3px solid #C44545;' : 'border-left:3px solid #013300;'}">
      <div class="text-[11px] uppercase tracking-wider text-haven-muted">${label}</div>
      <div class="font-serif font-bold text-3xl mt-1 ${tone === 'danger' ? 'text-haven-danger' : tone === 'ok' ? 'text-haven-ok' : tone === 'warn' ? 'text-haven-warn' : 'text-haven-forest'}">${value}</div>
      ${sub ? `<div class="text-xs text-haven-muted mt-1">${sub}</div>` : ''}
    </div>`;

  // Build stage summary cards
  const stageCard = (stage) => {
    const projects = byStage[stage];
    const count = projects.length;
    const buckets = SUB_BUCKETS[stage] || [];

    // Bucketize
    const byBucket = {};
    const byBucketProjects = {};
    buckets.forEach(b => { byBucket[b.key] = 0; byBucketProjects[b.key] = []; });
    projects.forEach(p => {
      const k = subBucketForProject(p);
      if (k && byBucket[k] !== undefined) {
        byBucket[k]++;
        byBucketProjects[k].push(p);
      }
    });

    const atRiskInStage = projects.filter(p => p.riskLevel === 'high').length;
    const readyInStage = projects.filter(p => isReadyToAdvance(p)).length;
    const blockedInStage = projects.filter(p => isBlocked(p.id)).length;

    const toneColor = {
      ok: '#2F7A3E', warn: '#E0A83A', danger: '#C44545',
      info: '#3A6EA8', neutral: '#6B7568',
    };

    const isExpanded = pipelineExpandedStages.has(stage) || !!pipelineSearch.trim();

    // Age-bucket projects within a sub-bucket.
    // Age = the longer of daysInStage and oldest-open-blocker-age so "blocked-for-30d" lights up red even if stage is fresh.
    const bucketAgeCounts = (projectsInBucket) => {
      const counts = { green: 0, yellow: 0, orange: 0, red: 0 };
      projectsInBucket.forEach(p => {
        const blockers = getProjectBlockers(p.id);
        const oldestBlocker = blockers.reduce((m, b) => Math.max(m, b.openedDaysAgo), 0);
        const age = Math.max(p.daysInStage || 0, oldestBlocker);
        if (age <= 5) counts.green++;
        else if (age <= 14) counts.yellow++;
        else if (age <= 29) counts.orange++;
        else counts.red++;
      });
      return counts;
    };

    // Totals across stage for the header mini-legend
    const stageAgeTotals = bucketAgeCounts(projects);

    const renderAgeBar = (counts, total) => {
      if (total === 0) return `<div class="h-1.5 rounded-full" style="background:#E4E6E0;"></div>`;
      const pct = (n) => (n / total) * 100;
      return `
        <div class="h-1.5 rounded-full overflow-hidden flex" style="background:#E4E6E0;">
          ${counts.green > 0 ? `<div style="width:${pct(counts.green)}%; background:#2F7A3E;" title="${counts.green} fresh (0-5d)"></div>` : ''}
          ${counts.yellow > 0 ? `<div style="width:${pct(counts.yellow)}%; background:#E0A83A;" title="${counts.yellow} watching (6-14d)"></div>` : ''}
          ${counts.orange > 0 ? `<div style="width:${pct(counts.orange)}%; background:#D8691C;" title="${counts.orange} stale (15-29d)"></div>` : ''}
          ${counts.red > 0 ? `<div style="width:${pct(counts.red)}%; background:#C44545;" title="${counts.red} ancient (30+d)"></div>` : ''}
        </div>`;
    };

    return `
      <div class="card p-0 overflow-hidden">
        <div class="px-4 py-3 border-b border-haven-border flex items-center gap-3" style="${isExpanded ? 'border-bottom-color:#E4E6E0' : 'border-bottom-color:transparent'}">
          <button class="flex items-start gap-2.5 flex-1 min-w-0 text-left hover:bg-haven-bg rounded px-1 -mx-1 py-0.5 transition-colors" onclick="toggleStageExpanded('${stage}')">
            <svg class="w-4 h-4 text-haven-muted shrink-0 mt-1 transition-transform" style="${isExpanded ? 'transform:rotate(90deg);' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            <div class="min-w-0">
              <div class="font-serif font-bold text-haven-forest">${STAGE_LABELS[stage]}</div>
              <div class="text-xs text-haven-muted mt-0.5">
                ${count} project${count === 1 ? '' : 's'}
                ${atRiskInStage > 0 ? ` · <span class="text-haven-danger font-medium">${atRiskInStage} at risk</span>` : ''}
                ${blockedInStage > 0 ? ` · <span class="text-haven-warn font-medium">${blockedInStage} blocked</span>` : ''}
                ${readyInStage > 0 ? ` · <span class="text-haven-ok font-medium">${readyInStage} ready</span>` : ''}
              </div>
            </div>
          </button>
          <div class="flex items-center gap-3 shrink-0">
            <div class="font-serif font-bold text-2xl text-haven-forest tabular-nums">${count}</div>
            ${count > 0 ? `<button class="text-xs text-haven-forest hover:underline font-medium shrink-0" onclick="drilldownStage('${stage}')" title="See all projects in ${STAGE_LABELS[stage]}">View all →</button>` : ''}
          </div>
        </div>

        ${count > 0 ? `
          <div class="px-4 py-2 border-b border-haven-border" style="background:#FAFAF7;">
            <div class="flex items-center gap-2">
              ${renderAgeBar(stageAgeTotals, count)}
            </div>
            <div class="flex items-center gap-3 mt-1.5 text-[10px] text-haven-muted">
              ${stageAgeTotals.green > 0 ? `<span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full" style="background:#2F7A3E"></span>${stageAgeTotals.green} fresh</span>` : ''}
              ${stageAgeTotals.yellow > 0 ? `<span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full" style="background:#E0A83A"></span>${stageAgeTotals.yellow} watching</span>` : ''}
              ${stageAgeTotals.orange > 0 ? `<span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full" style="background:#D8691C"></span>${stageAgeTotals.orange} stale</span>` : ''}
              ${stageAgeTotals.red > 0 ? `<span class="flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full" style="background:#C44545"></span>${stageAgeTotals.red} ancient</span>` : ''}
            </div>
          </div>
        ` : ''}

        ${isExpanded ? (count === 0 ? `
          <div class="px-4 py-5 text-center text-xs text-haven-muted italic">No projects in this stage</div>
        ` : `
          <table class="w-full text-sm">
            <tbody>
              ${buckets.map(b => {
                const n = byBucket[b.key];
                const pct = count ? Math.round((n / count) * 100) : 0;
                const color = toneColor[b.tone] || '#6B7568';
                const dim = n === 0;
                const subAgeCounts = bucketAgeCounts(byBucketProjects[b.key] || []);
                return `
                  <tr class="border-b border-haven-border last:border-b-0 ${dim ? 'opacity-50' : 'cursor-pointer hover:bg-haven-bg'}" ${dim ? '' : `onclick="drilldownSubBucket('${stage}', '${b.key}')"`}>
                    <td class="px-4 py-2 w-1"><div class="w-2 h-2 rounded-full" style="background:${color}"></div></td>
                    <td class="px-2 py-2 text-haven-ink">${b.label}</td>
                    <td class="px-2 py-2 text-right font-semibold tabular-nums" style="color:${dim ? '#C4C4C0' : color}">${n}</td>
                    <td class="px-2 py-2 w-32">
                      ${renderAgeBar(subAgeCounts, n)}
                    </td>
                    <td class="px-4 py-2 text-right text-xs text-haven-muted tabular-nums w-12">${pct}%</td>
                  </tr>`;
              }).join('')}
            </tbody>
          </table>
        `) : ''}
      </div>`;
  };

  main.innerHTML = `
    <div class="p-6 max-w-[1600px]">
      <div class="flex items-start justify-between mb-4 gap-4 flex-wrap">
        <div>
          <h1 class="font-serif text-2xl font-bold text-haven-forest">Install Pipeline</h1>
          <p class="text-sm text-haven-muted mt-1">${coordLabel} · Click any stage or sub-bucket to see the underlying projects</p>
        </div>
        <div class="flex items-center gap-3">
          ${renderPipelineSearch()}
          ${renderPipelineStateToggle()}
        </div>
      </div>

      <div class="flex items-center gap-2 mb-5 flex-wrap">
        <button class="filter-chip ${pipelineFilter === 'all' ? 'active' : ''}" onclick="setPipelineFilter('all')">All <span class="opacity-70 ml-1">${totalCount}</span></button>
        <button class="filter-chip ${pipelineFilter === 'ready_to_advance' ? 'active' : ''}" onclick="setPipelineFilter('ready_to_advance')" style="${pipelineFilter !== 'ready_to_advance' && readyCount > 0 ? 'border-color:#2F7A3E;color:#2F7A3E;' : ''}">✓ Ready to advance <span class="opacity-70 ml-1">${readyCount}</span></button>
        <button class="filter-chip ${pipelineFilter === 'at_risk' ? 'active' : ''}" onclick="setPipelineFilter('at_risk')" style="${pipelineFilter !== 'at_risk' && atRiskCount > 0 ? 'border-color:#C44545;color:#C44545;' : ''}">⚠ At risk <span class="opacity-70 ml-1">${atRiskCount}</span></button>
        <button class="filter-chip ${pipelineFilter === 'completed' ? 'active' : ''}" onclick="setPipelineFilter('completed')">✓ Completed <span class="opacity-70 ml-1">${completedCount}</span></button>
        ${pipelineSearch ? `<span class="text-xs text-haven-muted ml-2">${activeAll.length} match${activeAll.length === 1 ? '' : 'es'} for "${pipelineSearch}"</span>` : ''}
      </div>

      <div class="grid grid-cols-5 gap-4 mb-6">
        ${kpiTile('Active', totalCount, 'forest', 'in pre-install pipeline')}
        ${kpiTile('At Risk', atRiskCount, atRiskCount > 0 ? 'danger' : 'ok', atRiskCount > 0 ? 'need attention' : 'none flagged')}
        ${(() => {
          const activeBlocked = stateFilteredAll.filter(p => isBlocked(p.id)).length;
          return kpiTile('Blocked', activeBlocked, activeBlocked > 0 ? 'warn' : 'ok', activeBlocked > 0 ? '<a href="#" onclick="goToBlockers();return false;" class="text-haven-forest hover:underline">view blockers →</a>' : 'none');
        })()}
        ${kpiTile('Ready to Advance', readyCount, readyCount > 0 ? 'ok' : 'neutral', readyCount > 0 ? 'move these forward' : 'none ready')}
        ${kpiTile('Completed', completedCount, 'ok', 'lifetime')}
      </div>

      <div class="flex items-center justify-between mb-3">
        <h2 class="font-serif font-bold text-haven-forest">Stages</h2>
        ${(() => {
          const allExpanded = STAGE_ORDER.every(s => pipelineExpandedStages.has(s));
          return `<button class="text-sm text-haven-forest hover:underline font-medium flex items-center gap-1" onclick="toggleAllStages()">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              ${allExpanded
                ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/>'
                : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>'}
            </svg>
            ${allExpanded ? 'Collapse all' : 'Expand all'}
          </button>`;
        })()}
      </div>

      <div class="grid grid-cols-2 gap-4">
        ${STAGE_ORDER.map(s => stageCard(s)).join('')}
      </div>
    </div>
  `;
  attachPipelineSearchHandler();
}

function renderPipelineSearch() {
  return `
    <div class="relative">
      <input type="text" id="pipelineSearchInput" placeholder="Search projects..." value="${pipelineSearch.replace(/"/g, '&quot;')}"
        class="pl-8 pr-8 py-1.5 border border-haven-border rounded-md text-sm bg-white w-64" />
      <svg class="absolute left-2.5 top-2 w-4 h-4 text-haven-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      ${pipelineSearch ? `<button onclick="clearPipelineSearch()" class="absolute right-2 top-2 text-haven-muted hover:text-haven-ink text-sm">×</button>` : ''}
    </div>`;
}

function renderPipelineStateToggle() {
  const btn = (key, label) => `<button class="view-toggle-btn ${pipelineStateFilter === key ? 'active' : ''}" onclick="setPipelineState('${key}')">${label}</button>`;
  return `
    <div class="view-toggle">
      ${btn('all', 'All')}
      ${btn('CA', 'CA')}
      ${btn('MA', 'MA')}
    </div>`;
}

function attachPipelineSearchHandler() {
  const s = document.getElementById('pipelineSearchInput');
  if (!s) return;
  s.addEventListener('input', (e) => {
    pipelineSearch = e.target.value;
    render();
    setTimeout(() => {
      const el = document.getElementById('pipelineSearchInput');
      if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
    }, 0);
  });
}

window.setPipelineState = (key) => { pipelineStateFilter = key; render(); };
window.clearPipelineSearch = () => { pipelineSearch = ''; render(); };
window.toggleStageExpanded = (stage) => {
  if (pipelineExpandedStages.has(stage)) pipelineExpandedStages.delete(stage);
  else pipelineExpandedStages.add(stage);
  render();
};
window.toggleAllStages = () => {
  const allExpanded = STAGE_ORDER.every(s => pipelineExpandedStages.has(s));
  if (allExpanded) pipelineExpandedStages = new Set();
  else pipelineExpandedStages = new Set(STAGE_ORDER);
  render();
};
window.drilldownStage = (stage) => {
  pipelineDrilldownStage = stage;
  pipelineDrilldownSubBucket = null;
  pipelineDrilldownFilters = { utility: null, installer: null, coord: null, sub_bucket: null };
  pipelineDrilldownOpenFilter = null;
  render();
};
window.drilldownSubBucket = (stage, subKey) => {
  pipelineDrilldownStage = stage;
  pipelineDrilldownSubBucket = subKey;
  pipelineDrilldownFilters = { utility: null, installer: null, coord: null, sub_bucket: subKey };
  pipelineDrilldownOpenFilter = null;
  render();
};
window.exitDrilldown = () => {
  pipelineDrilldownStage = null;
  pipelineDrilldownSubBucket = null;
  pipelineDrilldownFilters = { utility: null, installer: null, coord: null, sub_bucket: null };
  pipelineDrilldownOpenFilter = null;
  render();
};
window.togglePDSort = (col) => {
  if (pipelineDrilldownSort.col === col) pipelineDrilldownSort.dir = pipelineDrilldownSort.dir === 'asc' ? 'desc' : 'asc';
  else pipelineDrilldownSort = { col, dir: 'desc' };
  render();
};
window.togglePDFilterMenu = (col) => {
  pipelineDrilldownOpenFilter = pipelineDrilldownOpenFilter === col ? null : col;
  render();
};
window.setPDFilter = (col, value) => {
  pipelineDrilldownFilters[col] = value;
  if (col === 'sub_bucket') pipelineDrilldownSubBucket = value;
  pipelineDrilldownOpenFilter = null;
  render();
};
window.clearAllPDFilters = () => {
  pipelineDrilldownFilters = { utility: null, installer: null, coord: null, sub_bucket: null };
  pipelineDrilldownSubBucket = null;
  render();
};

function renderPipelineDrilldown() {
  const stage = pipelineDrilldownStage;
  const buckets = SUB_BUCKETS[stage] || [];
  const f = pipelineDrilldownFilters;

  // Start from all projects in this stage that pass visibleProjects + state + search filters
  let all = pipelineFilteredProjects().filter(p => p.stage === stage);

  // Apply drilldown column filters
  if (f.utility) all = all.filter(p => p.utility === f.utility);
  if (f.installer) all = all.filter(p => (p.installer || '—') === f.installer);
  if (f.coord) all = all.filter(p => p.coord === f.coord);
  if (f.sub_bucket) all = all.filter(p => subBucketForProject(p) === f.sub_bucket);

  // Facet values for filter dropdowns — use stage-scoped pool before column filters so user can see all options
  const facetPool = pipelineFilteredProjects().filter(p => p.stage === stage);
  const utilities = [...new Set(facetPool.map(p => p.utility))].sort();
  const installers = [...new Set(facetPool.map(p => p.installer || '—'))].sort();
  const coords = [...new Set(facetPool.map(p => p.coord))].sort();

  // Sort
  const accessors = {
    risk: p => p.risk,
    customer: p => p.name.toLowerCase(),
    utility: p => p.utility,
    sub_bucket: p => subBucketForProject(p) || 'zzz',
    install_date: p => (INSTALLER_PROJECT_DATA[p.id]?.installConfirmedDate) || '9999',
    days_in_stage: p => p.daysInStage,
    installer: p => p.installer || 'zzz',
  };
  const acc = accessors[pipelineDrilldownSort.col] || accessors.risk;
  const dir = pipelineDrilldownSort.dir === 'asc' ? 1 : -1;
  const sorted = all.slice().sort((a, b) => {
    const av = acc(a), bv = acc(b);
    if (av < bv) return -1 * dir;
    if (av > bv) return 1 * dir;
    return 0;
  });

  const CAP = 200;
  const shown = sorted.slice(0, CAP);
  const extra = sorted.length - shown.length;

  const stateLabel = pipelineStateFilter === 'all' ? '' : ` · ${pipelineStateFilter} only`;
  const activeFilterCount = Object.values(f).filter(v => v !== null).length;

  // Helper to render a column header with optional sort and filter
  function th(key, label, opts = {}) {
    const { sortable = true, filterCol = null, filterOptions = null, width = '' } = opts;
    const isSorted = pipelineDrilldownSort.col === key;
    const sortIcon = isSorted ? (pipelineDrilldownSort.dir === 'asc' ? '↑' : '↓') : '<span style="color:#C4C4C0">↕</span>';
    const filterValue = filterCol ? f[filterCol] : null;
    const hasFilter = filterValue !== null && filterValue !== undefined;

    return `
      <th class="px-3 py-2.5 text-left relative select-none" ${width ? `style="width:${width};"` : ''}>
        <div class="flex items-center gap-1">
          ${sortable ? `<button class="uppercase tracking-wide text-xs text-haven-muted hover:text-haven-forest flex items-center gap-1" onclick="togglePDSort('${key}')">${label} ${sortIcon}</button>` : `<span class="uppercase tracking-wide text-xs text-haven-muted">${label}</span>`}
          ${filterOptions ? `
            <button class="text-haven-muted hover:text-haven-forest px-1" onclick="togglePDFilterMenu('${filterCol}')">
              <svg class="w-3 h-3 inline" fill="${hasFilter ? '#013300' : 'none'}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
              ${hasFilter ? `<span class="inline-block w-1.5 h-1.5 rounded-full bg-haven-forest ml-1"></span>` : ''}
            </button>
            ${pipelineDrilldownOpenFilter === filterCol ? `
              <div class="absolute z-20 mt-1 bg-white border border-haven-border rounded-md shadow-lg py-1 text-sm text-left" style="top:100%; left:0; min-width:200px; max-height:300px; overflow-y:auto;">
                <button class="w-full text-left px-3 py-1.5 hover:bg-haven-bg ${filterValue === null ? 'font-semibold text-haven-forest' : ''}" onclick="setPDFilter('${filterCol}', null)">All</button>
                ${filterOptions.map(opt => `<button class="w-full text-left px-3 py-1.5 hover:bg-haven-bg ${filterValue === opt.value ? 'font-semibold text-haven-forest' : ''}" onclick="setPDFilter('${filterCol}', '${opt.value.replace(/'/g, "\\'")}')">${opt.label}</button>`).join('')}
              </div>
            ` : ''}
          ` : ''}
        </div>
      </th>`;
  }

  // Sub-bucket options for the drilldown header filter
  const subBucketOptions = buckets.map(b => ({ label: b.label, value: b.key }));

  main.innerHTML = `
    <div class="p-6 max-w-[1500px]">
      <div class="flex items-start justify-between mb-4 gap-4 flex-wrap">
        <div>
          <button class="text-sm text-haven-muted hover:text-haven-forest flex items-center gap-1 mb-2" onclick="exitDrilldown()">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            Back to pipeline
          </button>
          <h1 class="font-serif text-2xl font-bold text-haven-forest">${STAGE_LABELS[stage]}</h1>
          <p class="text-sm text-haven-muted mt-1">
            ${sorted.length} project${sorted.length === 1 ? '' : 's'}${stateLabel}
            ${activeFilterCount > 0 ? ` · <button class="text-haven-forest hover:underline" onclick="clearAllPDFilters()">Clear ${activeFilterCount} filter${activeFilterCount === 1 ? '' : 's'}</button>` : ''}
          </p>
        </div>
        <div class="flex items-center gap-3">
          ${renderPipelineSearch()}
          ${renderPipelineStateToggle()}
        </div>
      </div>

      <!-- Sub-bucket chip row for quick jumping -->
      <div class="flex items-center gap-2 mb-4 flex-wrap">
        <button class="filter-chip ${!f.sub_bucket ? 'active' : ''}" onclick="setPDFilter('sub_bucket', null)">All <span class="opacity-70 ml-1">${pipelineFilteredProjects().filter(p => p.stage === stage).length}</span></button>
        ${buckets.map(b => {
          const bucketCount = pipelineFilteredProjects().filter(p => p.stage === stage && subBucketForProject(p) === b.key).length;
          const isActive = f.sub_bucket === b.key;
          const toneColor = { ok: '#2F7A3E', warn: '#E0A83A', danger: '#C44545', info: '#3A6EA8', neutral: '#6B7568' }[b.tone] || '#6B7568';
          return `<button class="filter-chip ${isActive ? 'active' : ''}" onclick="setPDFilter('sub_bucket', '${b.key}')" style="${!isActive ? `border-color:${toneColor};color:${toneColor};` : ''}">${b.label} <span class="opacity-70 ml-1">${bucketCount}</span></button>`;
        }).join('')}
      </div>

      <div class="card p-0 overflow-visible">
        <table class="w-full text-sm">
          <thead class="bg-haven-bg border-b border-haven-border">
            <tr>
              ${th('risk', 'Risk', { width: '50px' })}
              ${th('customer', 'Customer')}
              ${th('utility', 'Utility', { filterCol: 'utility', filterOptions: utilities.map(u => ({ label: u, value: u })) })}
              ${th('sub_bucket', 'Status', { filterCol: 'sub_bucket', filterOptions: subBucketOptions })}
              <th class="px-3 py-2.5 text-left"><span class="uppercase tracking-wide text-xs text-haven-muted">Blocker</span></th>
              ${th('install_date', 'Install Date')}
              ${th('days_in_stage', 'Days in Stage')}
              ${th('installer', 'Installer', { filterCol: 'installer', filterOptions: installers.map(i => ({ label: i === '—' ? 'Not assigned' : i, value: i })) })}

// SUB-BUCKETS for stage drilldown
// ============================================================
// Ordered list of sub-bucket keys per stage, with human labels.
// Bucket inference is based on available project fields (waitingOn, submittals, installer data, etc.)
const SUB_BUCKETS = {
  site_survey: [
    { key: 'ready_to_schedule', label: 'Ready to schedule', tone: 'warn' },
    { key: 'scheduled', label: 'Scheduled', tone: 'info' },

  ],
  permitting: [
    { key: 'ready_to_submit', label: 'Ready to submit', tone: 'warn' },
    { key: 'submitted', label: 'Submitted', tone: 'info' },
    { key: 'corrections_requested', label: 'Corrections requested', tone: 'danger' },
    { key: 'approved', label: 'Approved', tone: 'ok' },
  ],
  scheduling: [
    { key: 'ready_to_schedule', label: 'Ready to schedule', tone: 'warn' },
    { key: 'date_proposed', label: 'Date proposed', tone: 'info' },
    { key: 'date_confirmed', label: 'Date confirmed', tone: 'ok' },
  ],
  installation: [
    { key: 'ready_to_install', label: 'Ready to install', tone: 'warn' },
    { key: 'in_progress', label: 'Install in progress', tone: 'info' },
    { key: 'complete_awaiting_inspection', label: 'Install complete (awaiting inspection)', tone: 'ok' },
  ],
  inspection: [
    { key: 'scheduled', label: 'Inspection scheduled', tone: 'info' },
    { key: 'rework_needed', label: 'Rework needed', tone: 'warn' },
    { key: 'passed', label: 'Passed', tone: 'ok' },
    { key: 'failed', label: 'Failed', tone: 'danger' },
  ],
  interconnection: [
    { key: 'application_submitted', label: 'Application submitted', tone: 'info' },
    { key: 'utility_clarification', label: 'Utility clarification needed', tone: 'warn' },
    { key: 'pto_granted', label: 'PTO granted', tone: 'ok' },
    { key: 'application_failed', label: 'Application failed', tone: 'danger' },
  ],
  rebate: [
    { key: 'icf_pending', label: 'ICF pending (no PTO yet)', tone: 'warn' },
    { key: 'ready_to_submit', label: 'PTO complete — ICF ready to submit', tone: 'info' },

    { key: 'icf_complete', label: 'ICF complete', tone: 'ok' },

};

// Indexed view of submittals for fast lookup in hot render loops
const SUBMITTALS_BY_PROJECT = {};
SUBMITTALS.forEach(s => {
  if (!SUBMITTALS_BY_PROJECT[s.projectId]) SUBMITTALS_BY_PROJECT[s.projectId] = [];
  SUBMITTALS_BY_PROJECT[s.projectId].push(s);
});

function subBucketForProject(p) {
  // Returns the sub-bucket key for p within its current stage.
  const stage = p.stage;
  const d = INSTALLER_PROJECT_DATA[p.id] || {};
  const projSubs = SUBMITTALS_BY_PROJECT[p.id] || [];

  if (stage === 'site_survey') {
    // Use waitingOn + days in stage as a rough signal
    if (p.waitingOn === 'customer' && p.daysInStage < 3) return 'ready_to_schedule';
    if (p.daysInStage < 5) return 'scheduled';
    return 'survey_complete';
  }
  if (stage === 'design') {
    if (p.waitingOn === 'customer') return 'awaiting_customer';
    if (p.nextAction && /revis/i.test(p.nextAction)) return 'revisions_requested';
    if (p.daysInStage <= 2) return 'ready_to_start';
    return 'in_progress';
  }
  if (stage === 'permitting') {
    // Use submittals log for clearer signal
    const permit = projSubs.find(s => s.type === 'permit_app' || s.type === 'permit_resubmit');
    if (!permit) return 'ready_to_submit';
    if (p.nextAction && /resubmit|revis|correct|revised/i.test(p.nextAction)) return 'corrections_requested';
    if (permit.status === 'responded') return 'approved';
    return 'submitted';
  }
  if (stage === 'scheduling') {
    if (d.installConfirmedDate) return 'date_confirmed';
    if (p.nextAction && /lock|confirm|install date/i.test(p.nextAction)) return 'date_proposed';
    return 'ready_to_schedule';
  }
  if (stage === 'installation') {
    if (d.installCompletedAt) return 'complete_awaiting_inspection';
    if (d.installConfirmedDate && p.daysInStage >= 1) return 'in_progress';
    return 'ready_to_install';
  }
  if (stage === 'inspection') {
    if (d.inspectionResult === 'passed') return 'passed';
    if (d.inspectionResult === 'failed') return 'failed';
    if (p.nextAction && /rework|fix|correct/i.test(p.nextAction)) return 'rework_needed';
    return 'scheduled';
  }
  if (stage === 'interconnection') {
    const ic = projSubs.find(s => s.type === 'interconnection_app');
    if (p.nextAction && /clarif|clarification/i.test(p.nextAction)) return 'utility_clarification';
    if (p.nextAction && /fail|reject/i.test(p.nextAction)) return 'application_failed';
    if (ic && ic.status === 'responded') return 'pto_granted';
    return 'application_submitted';
  }
  if (stage === 'rebate') {
    // For rebate, sub-buckets mirror the ICF milestones.
    const sgip = projSubs.find(s => s.type === 'sgip_rsse' || s.type === 'sgip_claim');
    const ptoGranted = projSubs.some(s => s.type === 'interconnection_app' && s.status === 'responded');
    if (!ptoGranted) return 'icf_pending';
    if (!sgip) return 'ready_to_submit';
    if (sgip.status === 'responded') return 'icf_complete';
    return 'icf_submitted';
  }
  return null;
}

// ============================================================
// STUCK DEALS — statuses projects get wedged in, used by Reporting → Stuck Deals
// ============================================================
// A project is "stuck" when its days-in-stage exceeds the stuck threshold for its
// current stage. We map to a finer-grained status label than the sub-bucket, since
// the ops team tracks stuck concentrations by very specific reasons.
const STUCK_STAGE_THRESHOLDS = {
  site_survey: 14,
  design: 21,
  permitting: 45,
  scheduling: 14,
  installation: 10,
  inspection: 30,
  interconnection: 45,
  rebate: 30,
};

// Catalog of stuck statuses, each with its phase label + a short description.
// Order matters — higher-priority matches come first within each phase.
const STUCK_STATUS_CATALOG = {
  'QA Hold':                                { phase: 'Site Survey QA' },
  'Site Survey Scheduled':                  { phase: 'Site Survey' },
  'Site Survey Awaiting Customer':          { phase: 'Site Survey' },
  'Planset Drafting':                       { phase: 'Design' },
  'Planset Review':                         { phase: 'Design' },
  'Planset Revision (active rework)':       { phase: 'Design' },
  'Planset Sent for Signature':             { phase: 'Design' },
  'Permit Submitted (waiting on AHJ)':      { phase: 'Permitting' },
  'Permit Rejected':                        { phase: 'Permitting' },
  'Permit Resubmitted':                     { phase: 'Permitting' },
  'Ready to Schedule Install':              { phase: 'Scheduling' },
  'Install Date Unconfirmed':               { phase: 'Scheduling' },
  'Ready to Install':                       { phase: 'Installation' },
  'Install Complete — Awaiting Inspection': { phase: 'Installation' },
  'Need to Request Inspection':             { phase: 'Inspection' },
  'Inspection Scheduled':                   { phase: 'Inspection' },
  'Pending Fire Inspection':                { phase: 'Inspection' },
  'Meter Collar Needed Before Final Inspection': { phase: 'Inspection' },
  'Plan Revision Needed Before Inspection': { phase: 'Inspection' },
  'PTO App Submitted (waiting on utility)': { phase: 'Interconnection' },
  'PTO Clarification Requested':            { phase: 'Interconnection' },
  'ICF Ready to Submit':                    { phase: 'Rebate' },
  'ICF Submitted — Awaiting Review':        { phase: 'Rebate' },
};

// Map a project to its stuck status, or null if it's moving fine.
function stuckStatusForProject(p) {
  if (!p || p.stage === 'completed') return null;
  const threshold = STUCK_STAGE_THRESHOLDS[p.stage];
  if (!threshold) return null;
  if ((p.daysInStage || 0) < threshold) return null;

  const sub = subBucketForProject(p);
  const blockers = getProjectBlockers(p.id);
  const hasBlocker = blockers.length > 0;

  // Refine by stage + sub-bucket + blockers for specific status labels
  switch (p.stage) {
    case 'site_survey':
      if (sub === 'survey_complete') return 'QA Hold';
      if (sub === 'ready_to_schedule') return 'Site Survey Awaiting Customer';
      return 'Site Survey Scheduled';
    case 'design':
      if (sub === 'revisions_requested') return 'Planset Revision (active rework)';
      if (sub === 'awaiting_customer') return 'Planset Sent for Signature';
      if (sub === 'in_progress') return 'Planset Drafting';
      if (sub === 'ready_to_start') return 'Planset Drafting';
      return 'Planset Review';
    case 'permitting':
      if (sub === 'corrections_requested') {
        // Deterministic split via project ID hash — about 2/3 rejected, 1/3 resubmitted
        const h = p.id.charCodeAt(p.id.length - 1);
        return h % 3 === 0 ? 'Permit Resubmitted' : 'Permit Rejected';
      }
      if (sub === 'submitted') return 'Permit Submitted (waiting on AHJ)';
      return 'Permit Submitted (waiting on AHJ)';
    case 'scheduling':
      if (sub === 'date_proposed') return 'Install Date Unconfirmed';
      return 'Ready to Schedule Install';
    case 'installation':
      if (sub === 'complete_awaiting_inspection') return 'Install Complete — Awaiting Inspection';
      return 'Ready to Install';
    case 'inspection': {
      // Varied reasons inspections get stuck
      const h = p.id.charCodeAt(p.id.length - 1);
      if (sub === 'failed') return 'Plan Revision Needed Before Inspection';
      if (sub === 'rework_needed') {
        return h % 2 === 0 ? 'Meter Collar Needed Before Final Inspection' : 'Plan Revision Needed Before Inspection';
      }
      if (sub === 'scheduled') {
        return h % 3 === 0 ? 'Pending Fire Inspection' : 'Inspection Scheduled';
      }
      // Default — need to request inspection
      return 'Need to Request Inspection';
    }
    case 'interconnection':
      if (sub === 'utility_clarification' || sub === 'application_failed') return 'PTO Clarification Requested';
      return 'PTO App Submitted (waiting on utility)';
    case 'rebate':
      if (sub === 'icf_submitted') return 'ICF Submitted — Awaiting Review';
      if (sub === 'ready_to_submit') return 'ICF Ready to Submit';
      return 'ICF Submitted — Awaiting Review';
  }
  return null;
}

// Days-stuck for a project — same as daysInStage, but we treat it as its own concept
// so it can be overridden later if the data model evolves.
function daysStuckForProject(p) {
  return p.daysInStage || 0;
}

// Apply search, state filter, and the existing pipelineFilter
function pipelineFilteredProjects() {
  let list = visibleProjects().filter(p => p.stage !== 'completed');
  if (pipelineStateFilter !== 'all') list = list.filter(p => p.state === pipelineStateFilter);
  if (pipelineFilter === 'ready_to_advance') list = list.filter(p => isReadyToAdvance(p));
  else if (pipelineFilter === 'at_risk') list = list.filter(p => p.riskLevel === 'high');
  if (pipelineSearch.trim()) {
    const q = pipelineSearch.trim().toLowerCase();
    list = list.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.city.toLowerCase().includes(q) ||
      p.projectNumber.toLowerCase().includes(q) ||
      p.zip.includes(q)
    );
  }
  return list;
}

// Drag state
let draggedProjectId = null;

function attachDragHandlers() {
  document.querySelectorAll('[draggable="true"][data-project-id]').forEach(card => {
    card.addEventListener('dragstart', (e) => {
      draggedProjectId = card.dataset.projectId;
      e.dataTransfer.effectAllowed = 'move';
      try { e.dataTransfer.setData('text/plain', draggedProjectId); } catch (_) {}
      card.style.opacity = '0.4';
    });
    card.addEventListener('dragend', () => {
      card.style.opacity = '';
      draggedProjectId = null;
      document.querySelectorAll('.drop-zone').forEach(z => {
        z.style.background = '';
        z.style.outline = '';
      });
    });
  });

  document.querySelectorAll('.drop-zone').forEach(zone => {
    zone.addEventListener('dragover', (e) => {
      if (!draggedProjectId) return;
      const p = PROJECTS.find(pr => pr.id === draggedProjectId);
      if (!p || p.stage === zone.dataset.stage) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      zone.style.background = 'rgba(197, 232, 74, 0.15)';
      zone.style.outline = '2px dashed #013300';
      zone.style.outlineOffset = '-2px';
    });
    zone.addEventListener('dragleave', (e) => {
      // Only clear when leaving the zone entirely, not crossing into a child
      if (!zone.contains(e.relatedTarget)) {
        zone.style.background = '';
        zone.style.outline = '';
      }
    });
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      const id = draggedProjectId;
      const newStage = zone.dataset.stage;
      draggedProjectId = null;
      zone.style.background = '';
      zone.style.outline = '';
      if (!id) return;
      const p = PROJECTS.find(pr => pr.id === id);
      if (!p || p.stage === newStage) return;
      handleStageMove(p, newStage);
    });
  });
}

// Decide which flow to trigger based on direction of move
function handleStageMove(p, newStage) {
  const fromIdx = STAGE_ORDER.indexOf(p.stage);
  const toIdx = STAGE_ORDER.indexOf(newStage);
  const isNextStage = toIdx === fromIdx + 1;
  const isBackward = toIdx < fromIdx;
  const isSkipForward = toIdx > fromIdx + 1;

  if (isNextStage) {
    // Same gated flow as clicking the "Advance" button
    openAdvanceModal(p.id, newStage);
  } else {
    // Backward or skip-forward: confirm with optional reason
    openStageMoveModal(p.id, newStage, isBackward ? 'backward' : 'skip');
  }
}

function renderTasks(installerOnly) {
  const visible = installerOnly ? visibleProjects() : stageScopedProjects();
  const visibleIds = new Set(visible.map(p => p.id));
  let tasks = TASKS.filter(t => visibleIds.has(t.projectId) && (installerOnly ? t.ownerType === 'installer' : t.ownerType === 'internal'));

  const isTaskDone = (t) => t.status === 'done' || completedTasks.has(t.id);

  const openCount = tasks.filter(t => !isTaskDone(t)).length;
  const doneCount = tasks.filter(t => isTaskDone(t)).length;

  // Apply status filter
  if (taskStatusFilter === 'open') tasks = tasks.filter(t => !isTaskDone(t));
  else if (taskStatusFilter === 'completed') tasks = tasks.filter(t => isTaskDone(t));

  const overdueCount = tasks.filter(t => t.dueInDays < 0 && !isTaskDone(t)).length;
  const dueTodayCount = tasks.filter(t => t.dueInDays === 0 && !isTaskDone(t)).length;
  const thisWeekCount = tasks.filter(t => t.dueInDays > 0 && t.dueInDays <= 7 && !isTaskDone(t)).length;

  // Batch mode: group tasks by normalized title (same action across many projects)
  let bodyHtml;
  if (taskBatchMode && !installerOnly) {
    const groups = {};
    tasks.filter(t => !isTaskDone(t)).forEach(t => {
      const key = t.title.toLowerCase().replace(/[#0-9].*/g, '').replace(/[^a-z ]/g, '').trim();
      if (!groups[key]) groups[key] = { title: t.title, items: [] };
      groups[key].items.push(t);
    });
    const sortedGroups = Object.values(groups).filter(g => g.items.length >= 2).sort((a, b) => b.items.length - a.items.length);
    bodyHtml = sortedGroups.length === 0 ? '<div class="p-8 text-center text-haven-muted text-sm">No recurring tasks to batch. Switch off batch mode for the full list.</div>' : sortedGroups.map(g => `

          <div class="font-medium text-sm">${g.title} <span class="text-haven-muted font-normal">· ${g.items.length} projects</span></div>
          <button class="btn btn-accent text-xs">Batch complete</button>
        </div>
        ${g.items.map(t => {
          const proj = PROJECTS.find(p => p.id === t.projectId);

          return `
            <div class="px-4 py-2 flex items-center gap-3 hover:bg-haven-bg cursor-pointer" data-project-id="${proj.id}">
              <div class="checkbox" onclick="event.stopPropagation(); toggleTask('${t.id}')">${completedTasks.has(t.id) ? '✓' : ''}</div>
              <div class="flex-1 min-w-0">
                <div class="text-sm font-medium truncate">${proj.name}</div>
                <div class="text-xs text-haven-muted truncate">${proj.city}, ${proj.state} · ${STAGE_LABELS[t.stage]}</div>
              </div>
              <div class="text-xs ${t.dueInDays < 0 ? 'text-haven-danger font-medium' : 'text-haven-muted'}">${dueText}</div>
            </div>`;
        }).join('')}
      </div>
    `).join('');
  } else {
    const CAP = 200;
    // When viewing completed tasks, sort most-recently-done first
    // When viewing open (default), sort by due-date ascending
    const allSorted = [...tasks].sort((a, b) => {
      if (taskStatusFilter === 'completed') return 0; // preserve natural order

    });
    const sorted = allSorted.slice(0, CAP);
    const getTaskAssignee = (t) => {
      if (taskAssignees[t.id]) return taskAssignees[t.id];
      const proj = PROJECTS.find(p => p.id === t.projectId);
      return proj ? proj.coord : '—';
    };
    const visibleIds_set = new Set(sorted.map(t => t.id));
    const visibleSelectedCount = sorted.filter(t => selectedTasks.has(t.id) && !isTaskDone(t)).length;
    const selectableCount = sorted.filter(t => !isTaskDone(t)).length;
    const allSelected = selectableCount > 0 && visibleSelectedCount === selectableCount;

    bodyHtml = `
      <table class="w-full text-sm">
        <thead class="bg-haven-bg border-b border-haven-border">
          <tr class="text-left text-xs text-haven-muted uppercase tracking-wide">
            <th class="px-3 py-2.5 w-8">${installerOnly ? '' : `<div class="checkbox ${allSelected ? 'checked' : ''}" onclick="toggleSelectAllTasks()" title="Select all visible open tasks">${allSelected ? '✓' : ''}</div>`}</th>
