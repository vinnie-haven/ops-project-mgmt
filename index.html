window.toggleBatchMode = () => { taskBatchMode = !taskBatchMode; render(); };
window.toggleTaskSelection = (id) => {
  if (selectedTasks.has(id)) selectedTasks.delete(id);
  else selectedTasks.add(id);
  render();
};
window.toggleSelectAllTasks = () => {
  // Select/deselect all visible open tasks
  const visible = visibleProjects();
  const visibleIds = new Set(visible.map(p => p.id));
  const visibleTasks = TASKS.filter(t => visibleIds.has(t.projectId) && t.ownerType === 'internal' && t.status !== 'done' && !completedTasks.has(t.id));
  const scoped = taskStatusFilter === 'completed' ? [] : visibleTasks;
  const allSelected = scoped.every(t => selectedTasks.has(t.id)) && scoped.length > 0;
  if (allSelected) scoped.forEach(t => selectedTasks.delete(t.id));
  else scoped.forEach(t => selectedTasks.add(t.id));
  render();
};
window.clearTaskSelection = () => { selectedTasks.clear(); render(); };
window.batchClaimTasks = () => {
  if (currentCoord === '__all__') return;
  selectedTasks.forEach(id => { taskAssignees[id] = currentCoord; });
  selectedTasks.clear();
  render();
};
window.batchMarkComplete = () => {
  selectedTasks.forEach(id => completedTasks.add(id));
  selectedTasks.clear();
  render();
};
window.batchSendToRework = () => {
  // Mark the associated projects as rework. Demo: just increment reworkCount on each affected project
  // and provide a generic reason.
  const affectedProjects = new Set();
  selectedTasks.forEach(id => {
    const t = TASKS.find(x => x.id === id);
    if (!t) return;
    const p = PROJECTS.find(x => x.id === t.projectId);
    if (!p) return;
    if (affectedProjects.has(p.id)) return;
    affectedProjects.add(p.id);
    p.reworkCount = (p.reworkCount || 0) + 1;
    p.reworkReason = p.reworkReason || 'Sent to rework from task queue';
    p.reworkedDaysAgo = 0;
    const stageIdx = STAGE_ORDER.indexOf(p.stage);
    p.reworkFromStage = p.reworkFromStage || STAGE_ORDER[Math.min(STAGE_ORDER.length - 1, stageIdx + 1)] || p.stage;
  });
  alert(`${affectedProjects.size} project${affectedProjects.size === 1 ? '' : 's'} sent to rework. View in Tracking → Rework.`);
  selectedTasks.clear();
  render();
};
window.batchAddBlocker = () => {
  // Simple demo: add a generic "waiting on external" blocker to each affected project
  const affectedProjects = new Set();
  selectedTasks.forEach(id => {
    const t = TASKS.find(x => x.id === id);
    if (!t) return;
    affectedProjects.add(t.projectId);
  });
  affectedProjects.forEach(pid => {
    const b = {
      id: `b${blockerId++}`,
      projectId: pid,
      code: 'other',
      label: 'Blocker added from batch action',
      category: 'internal',
      openedDaysAgo: 0,
      openedAt: Date.now(),
      resolvedAt: null,
      note: 'Added via task queue batch action',
    };
    BLOCKERS.push(b);
    if (!BLOCKERS_BY_PROJECT[pid]) BLOCKERS_BY_PROJECT[pid] = [];
    BLOCKERS_BY_PROJECT[pid].push(b);
  });
  alert(`Blocker added to ${affectedProjects.size} project${affectedProjects.size === 1 ? '' : 's'}.`);
  selectedTasks.clear();
  render();
};
window.setTaskStatusFilter = (f) => { taskStatusFilter = f; render(); };
window.toggleTask = (id) => {

};

function renderSchedule() {
  // Demo: synthesize crew schedule. Each installer has 2-3 crews; each crew has a project per day or is free.
  const DAYS = 14;
  const today = new Date();
  const dayLabels = [];
  for (let i = 0; i < DAYS; i++) {
    const d = new Date(today); d.setDate(d.getDate() + i);
    dayLabels.push({ date: d, label: `${d.toLocaleDateString('en-US', {weekday: 'short'})} ${d.getMonth()+1}/${d.getDate()}`, isWeekend: d.getDay() === 0 || d.getDay() === 6 });
  }

  const installersToShow = viewMode === 'installer' ? [CURRENT_INSTALLER] : INSTALLERS;

  // For each installer, figure out their active projects in installation/scheduling stages and place them
  const schedule = {};
  installersToShow.forEach(inst => {
    const theirProjects = PROJECTS.filter(p => getInstaller(p) === inst && ['scheduling','installation','inspection'].includes(p.stage));
    schedule[inst] = { crews: {}, projects: theirProjects };
    // 2 crews per installer
    const crewCount = 2;
    for (let c = 0; c < crewCount; c++) {
      schedule[inst].crews[`Crew ${String.fromCharCode(65+c)}`] = new Array(DAYS).fill(null);
    }
    // Place projects: installation stage = today + some offset, scheduling stage = further out
    theirProjects.forEach((p, idx) => {
      const crew = Object.keys(schedule[inst].crews)[idx % crewCount];
      const dayOffset = p.stage === 'installation' ? (idx % 2) : p.stage === 'scheduling' ? 3 + (idx % 8) : 7 + (idx % 5);
      if (dayOffset < DAYS && !dayLabels[dayOffset].isWeekend) {
        schedule[inst].crews[crew][dayOffset] = p;
      }
    });
  });

  main.innerHTML = `
    <div class="p-6">
      <div class="mb-5">
        <h1 class="font-serif text-2xl font-bold text-haven-forest">Install Schedule</h1>
        <p class="text-sm text-haven-muted mt-1">Next ${DAYS} days · ${viewMode === 'installer' ? CURRENT_INSTALLER : 'all installers'}</p>
      </div>

      <div class="card p-0 overflow-x-auto">
        <table class="w-full border-collapse">
          <thead>
            <tr class="border-b border-haven-border">
              <th class="text-left p-3 text-xs uppercase text-haven-muted sticky left-0 bg-white min-w-[160px]">Installer / Crew</th>
              ${dayLabels.map(d => `<th class="p-2 text-xs ${d.isWeekend ? 'bg-haven-bg text-haven-muted' : 'text-haven-muted'} min-w-[100px]">${d.label}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${installersToShow.map(inst => Object.entries(schedule[inst].crews).map(([crew, days], ci) => `
              <tr class="border-b border-haven-border">
                <td class="p-3 text-sm sticky left-0 bg-white">
                  ${ci === 0 ? `<div class="font-medium text-haven-forest">${inst}</div>` : ''}
                  <div class="text-xs text-haven-muted">${crew}</div>
                </td>
                ${days.map((proj, di) => `
                  <td class="p-1 ${dayLabels[di].isWeekend ? 'bg-haven-bg' : ''}">
                    ${proj ? `
                      <div class="p-1.5 rounded text-xs cursor-pointer hover-lift" style="background: rgba(1, 51, 0, 0.08); border-left: 3px solid #013300;" data-project-id="${proj.id}">
                        <div class="font-medium truncate">${proj.name.split(' ')[0]}</div>
                        <div class="text-[10px] text-haven-muted truncate">${STAGE_LABELS[proj.stage]}</div>
                      </div>` : ''}
                  </td>`).join('')}
              </tr>
            `).join('')).join('')}
          </tbody>
        </table>
      </div>

      <div class="mt-4 text-xs text-haven-muted">Drag projects between crews and days to reschedule (not wired in demo).</div>
    </div>
  `;
  attachProjectHandlers();

// Helpers shared across installer views
function installerActiveProjects() {
  return visibleProjects().filter(p => p.stage !== 'completed');
}
function installerCompletedProjects() {
  return visibleProjects().filter(p => p.stage === 'completed');
}
function projectInstallerState(p) {
  // Returns the current installer-facing state of a project
  const d = INSTALLER_PROJECT_DATA[p.id] || {};
  if (p.stage === 'completed') return 'completed';
  if (d.inspectionResult === 'passed') return 'inspection_passed';
  if (d.inspectionConfirmedDate) return 'inspection_scheduled';
  if (d.installCompletedAt) return 'install_complete_awaiting_inspection';
  if (d.installConfirmedDate) return 'install_scheduled';
  return 'needs_scheduling';
}
const INSTALLER_STATE_LABEL = {
  needs_scheduling: 'Needs install date',
  install_scheduled: 'Install scheduled',
  install_complete_awaiting_inspection: 'Awaiting inspection date',
  inspection_scheduled: 'Inspection scheduled',
  inspection_passed: 'Inspection passed',
  completed: 'Completed',
};
const INSTALLER_STATE_TONE = {
  needs_scheduling: 'warn',
  install_scheduled: 'info',
  install_complete_awaiting_inspection: 'warn',
  inspection_scheduled: 'info',
  inspection_passed: 'ok',
  completed: 'neutral',
};

function installerEarnings() {
  // Returns { paidThisMonth, paidThisWeek, outPendingInstall, outPendingInspection, lifetimePaid, pendingAdderReview, approvedAddersOutstanding }
  const now = Date.now();
  const weekAgo = now - 7 * 86400000;
  const monthAgo = now - 30 * 86400000;
  let paidThisWeek = 0, paidThisMonth = 0, lifetimePaid = 0;
  let outPendingInstall = 0, outPendingInspection = 0;
  let pendingAdderReview = 0, approvedAddersOutstanding = 0;
  visibleProjects().forEach(p => {
    const pay = PAYMENTS[p.id];
    if (!pay) return;
    const half = pay.amount / 2;
    if (pay.installPaid) {
      lifetimePaid += half;
      if (pay.installPaidAt >= weekAgo) paidThisWeek += half;
      if (pay.installPaidAt >= monthAgo) paidThisMonth += half;
    } else {
      // Outstanding install payment
      const d = INSTALLER_PROJECT_DATA[p.id] || {};
      if (d.installCompletedAt) outPendingInstall += half;
    }
    // Approved adders ride with inspection payment
    const approvedAdders = approvedAddersTotal(p.id);
    if (pay.inspectionPaid) {
      lifetimePaid += half + approvedAdders;
      if (pay.inspectionPaidAt >= weekAgo) paidThisWeek += half + approvedAdders;
      if (pay.inspectionPaidAt >= monthAgo) paidThisMonth += half + approvedAdders;
    } else {
      const d = INSTALLER_PROJECT_DATA[p.id] || {};
      if (d.inspectionResult === 'passed') {
        outPendingInspection += half;
        approvedAddersOutstanding += approvedAdders;
      }
    }
    pendingAdderReview += pendingAddersTotal(p.id);
  });
  return { paidThisWeek, paidThisMonth, outPendingInstall, outPendingInspection, lifetimePaid, pendingAdderReview, approvedAddersOutstanding };
}

function acceptWorkOrder(woId) {
  const wo = WORK_ORDERS.find(w => w.id === woId);
  if (!wo) return;
  const signedBy = prompt('Enter your name to sign and accept this work order:', 'Jorge Martinez (Crew Lead)');
  if (!signedBy) return;
  wo.status = 'accepted';
  wo.signedBy = signedBy;
  wo.acceptedAt = Date.now();
  // Assign this project's installer to the current installer if it wasn't already
  const p = PROJECTS.find(pr => pr.id === wo.projectId);
  if (p) assignedInstallers[p.id] = CURRENT_INSTALLER;
  renderNav(); render();
}
window.acceptWorkOrder = acceptWorkOrder;

function declineWorkOrder(woId) {
  const wo = WORK_ORDERS.find(w => w.id === woId);
  if (!wo) return;
  const reason = prompt('Reason for declining (optional):', '');
  wo.status = 'declined';
  wo.declinedReason = reason || 'No reason given';
  // Roll to next installer in fallback queue
  if (wo.fallbackQueue.length > 0) {
    const nextInstaller = wo.fallbackQueue[0];
    const remainingFallback = wo.fallbackQueue.slice(1);
    WORK_ORDERS.push({
      id: `wo${woSeq++}`,
      projectId: wo.projectId,
      dispatchedTo: nextInstaller,
      fallbackQueue: remainingFallback,
      dispatchedAt: Date.now(),
      expiresAt: Date.now() + WORK_ORDER_WINDOW_DAYS * 86400000,
      status: 'pending',
      signedBy: null, acceptedAt: null, declinedReason: null,
    });
    alert(`Declined. Work order rolled to ${nextInstaller}.`);
  } else {
    alert('Declined. No fallback contractors configured — Haven will need to dispatch manually.');
  }
  renderNav(); render();
}
window.declineWorkOrder = declineWorkOrder;

// --------------------------------------------------------------
// DISPATCH (internal-initiated)
// --------------------------------------------------------------
function dispatchWorkOrder(projectId) {
  const sel = document.getElementById(`dispatchInstallerSelect-${projectId}`);
  if (!sel) return;
  const installer = sel.value;
  const p = PROJECTS.find(pr => pr.id === projectId);
  if (!p) return;

  // Cancel any previous pending work order for this project
  WORK_ORDERS.forEach(w => {
    if (w.projectId === projectId && w.status === 'pending') w.status = 'cancelled';
  });

  // Create fresh pending work order
  const now = Date.now();
  WORK_ORDERS.push({
    id: `wo${woSeq++}`,
    projectId,
    dispatchedTo: installer,
    fallbackQueue: [],
    dispatchedAt: now,
    expiresAt: now + WORK_ORDER_WINDOW_DAYS * 86400000,
    status: 'pending',
    signedBy: null, acceptedAt: null, declinedReason: null,
  });

  // Ensure PAYMENTS record exists
  if (!PAYMENTS[projectId]) {
    PAYMENTS[projectId] = { amount: installerPayoutAmount(p), installPaid: false, inspectionPaid: false };
  }

  alert(`Work order sent to ${installer}. They have ${WORK_ORDER_WINDOW_DAYS} days to accept.`);
  openProjectModal(projectId);
  renderNav(); render();
}
window.dispatchWorkOrder = dispatchWorkOrder;

function cancelWorkOrder(woId) {
  const wo = WORK_ORDERS.find(w => w.id === woId);
  if (!wo || wo.status !== 'pending') return;
  if (!confirm(`Cancel work order to ${wo.dispatchedTo}?`)) return;
  wo.status = 'cancelled';
  openProjectModal(wo.projectId);
  renderNav(); render();
}
window.cancelWorkOrder = cancelWorkOrder;

}

let pendingAdderReview = null;
function openAdderReview(adderId, decision) {
  pendingAdderReview = { adderId, decision };
  // Find adder and project for label
  let adder = null;
  for (const pid in ADDERS) {
    const a = ADDERS[pid].find(x => x.id === adderId);
    if (a) { adder = a; break; }
  }
  if (!adder) return;
  const p = PROJECTS.find(pr => pr.id === adder.projectId);
  const actionLabel = decision === 'approved' ? 'Approve' : 'Reject';
  const actionTone = decision === 'approved' ? 'btn-primary' : 'btn-secondary';
  document.getElementById('advanceModalContent').innerHTML = `
    <div class="p-6">
      <h2 class="font-serif text-xl font-bold text-haven-forest mb-1">${actionLabel} adder?</h2>
      <p class="text-sm text-haven-muted mb-4">${p ? p.name : 'Project'} · ${dollar(adder.amount)}</p>

      </div>
      <div class="flex items-center justify-between mt-5 pt-4 border-t border-haven-border">
        <span class="badge ${decision === 'approved' ? 'badge-ok' : 'badge-danger'}">${actionLabel}</span>
        <div class="flex gap-2">
          <button class="btn btn-secondary" onclick="closeAdvanceModal()">Cancel</button>
          <button class="btn ${actionTone}" onclick="confirmAdderReview()">${actionLabel} adder</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('advanceModal').classList.remove('hidden');
  setTimeout(() => { const t = document.getElementById('adderReviewNote'); if (t) t.focus(); }, 50);

function confirmAdderReview() {
  if (!pendingAdderReview) return;
  const noteEl = document.getElementById('adderReviewNote');
  const note = noteEl ? noteEl.value.trim() || null : null;
  const a = reviewAdder(pendingAdderReview.adderId, pendingAdderReview.decision, note);

  pendingAdderReview = null;
  closeAdvanceModal();
  if (projectId) openProjectModal(projectId);

}

  if (s) {
    s.addEventListener('input', (e) => {
      jobsSearch = e.target.value;
      render();
      setTimeout(() => {
        const el = document.getElementById('jobsSearch');
        if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
      }, 0);
    });
  }
}
window.setJobsFilter = (s) => { jobsStateFilter = s; render(); };
window.clearJobsSearch = () => { jobsSearch = ''; render(); };

// --------------------------------------------------------------
// INSTALL DAY — one-screen runbook for crew leads
// --------------------------------------------------------------
function renderInstallDay() {
  // If a project is open, show the runbook; otherwise show the landing list
  if (runbookProjectId) {
    const p = PROJECTS.find(pr => pr.id === runbookProjectId);
    if (!p) { runbookProjectId = null; render(); return; }
    renderRunbook(p);
    return;
  }

  // Landing: list of upcoming + in-progress installs for this installer
  const jobs = PROJECTS.filter(p => p.installer === CURRENT_INSTALLER && runbookState(p));
  const today = new Date().toISOString().slice(0, 10);

  const todayInstalls = jobs.filter(p => {
    const d = INSTALLER_PROJECT_DATA[p.id];
    return d?.installConfirmedDate === today && !d.installCompletedAt;
  });
  const upcoming = jobs.filter(p => {
    const d = INSTALLER_PROJECT_DATA[p.id];
    return d?.installConfirmedDate && d.installConfirmedDate > today && !d.installCompletedAt;
  }).sort((a, b) => INSTALLER_PROJECT_DATA[a.id].installConfirmedDate.localeCompare(INSTALLER_PROJECT_DATA[b.id].installConfirmedDate));
  const inProgress = jobs.filter(p => {
    const d = INSTALLER_PROJECT_DATA[p.id];
    return d?.installConfirmedDate && d.installConfirmedDate <= today && !d.installCompletedAt;
  });
  const recentlyCompleted = jobs.filter(p => {
    const d = INSTALLER_PROJECT_DATA[p.id];
    return d?.installCompletedAt && (Date.now() - d.installCompletedAt) < 7 * 86400000;
  }).sort((a, b) => INSTALLER_PROJECT_DATA[b.id].installCompletedAt - INSTALLER_PROJECT_DATA[a.id].installCompletedAt);

  const jobCard = (p, mode) => {
    const d = INSTALLER_PROJECT_DATA[p.id];
    const rb = runbookState(p);
    const prog = runbookPhotoProgress(p);
    const pctRequired = prog.required > 0 ? Math.round((prog.requiredCompleted / prog.required) * 100) : 0;

    let toneColor, statusLabel;
    if (mode === 'today') { toneColor = '#C44545'; statusLabel = 'TODAY'; }
    else if (mode === 'in_progress') { toneColor = '#E0A83A'; statusLabel = 'IN PROGRESS'; }
    else if (mode === 'upcoming') { toneColor = '#3A6EA8'; statusLabel = 'UPCOMING'; }
    else { toneColor = '#2F7A3E'; statusLabel = 'COMPLETE'; }

    return `
      <div class="card p-0 overflow-hidden hover-lift cursor-pointer" onclick="openRunbook('${p.id}')">
        <div class="px-4 py-3 border-b border-haven-border flex items-center justify-between" style="border-left:4px solid ${toneColor}">
          <div>
            <div class="flex items-center gap-2">
              <span class="text-[10px] font-bold tracking-wider" style="color:${toneColor}">${statusLabel}</span>
              <span class="text-xs text-haven-muted">${d.installConfirmedDate}</span>
            </div>
            <div class="font-serif font-bold text-lg text-haven-forest mt-0.5">${p.name}</div>
            <div class="text-xs text-haven-muted">${p.city}, ${p.state} · ${p.solar} kW${p.battery ? ` + ${p.battery} kWh` : ''}</div>
          </div>
          <svg class="w-5 h-5 text-haven-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </div>
        <div class="px-4 py-3 grid grid-cols-3 gap-3 text-xs">
          <div>
            <div class="text-[10px] uppercase tracking-wider text-haven-muted">Crew</div>
            <div class="font-medium mt-0.5">${rb.crewLead.split(' ')[0]} · ${rb.crewSize} crew</div>
          </div>
          <div>
            <div class="text-[10px] uppercase tracking-wider text-haven-muted">Photos</div>
            <div class="font-medium mt-0.5">${prog.completed}/${prog.total}${pctRequired === 100 ? ' ✓' : ''}</div>
          </div>
          <div>
            <div class="text-[10px] uppercase tracking-wider text-haven-muted">Equipment</div>
            <div class="font-medium mt-0.5">${rb.equipmentChecklist.filter(e => e.checked).length}/${rb.equipmentChecklist.length}</div>
          </div>
        </div>
      </div>
    `;
  };

  main.innerHTML = `
    <div class="p-6 max-w-[1100px]">
      <div class="mb-6">
        <h1 class="font-serif text-2xl font-bold text-haven-forest">Install Day</h1>
        <p class="text-sm text-haven-muted mt-1">${CURRENT_INSTALLER} · Tap a job to open the runbook</p>
      </div>

      ${todayInstalls.length > 0 ? `
        <div class="mb-6">
          <h2 class="font-serif font-bold text-haven-danger mb-3">Today (${todayInstalls.length})</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            ${todayInstalls.map(p => jobCard(p, 'today')).join('')}
          </div>
        </div>
      ` : ''}

      ${inProgress.length > 0 ? `
        <div class="mb-6">
          <h2 class="font-serif font-bold text-haven-warn mb-3">In progress (${inProgress.length})</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            ${inProgress.map(p => jobCard(p, 'in_progress')).join('')}
          </div>
        </div>
      ` : ''}

      ${upcoming.length > 0 ? `
        <div class="mb-6">
          <h2 class="font-serif font-bold text-haven-forest mb-3">Upcoming (${upcoming.length})</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            ${upcoming.slice(0, 8).map(p => jobCard(p, 'upcoming')).join('')}
          </div>
          ${upcoming.length > 8 ? `<div class="text-xs text-haven-muted mt-3 text-center">Showing 8 of ${upcoming.length}</div>` : ''}
        </div>
      ` : ''}

      ${recentlyCompleted.length > 0 ? `
        <div class="mb-6">
          <h2 class="font-serif font-bold text-haven-ok mb-3">Recently completed (${recentlyCompleted.length})</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            ${recentlyCompleted.slice(0, 4).map(p => jobCard(p, 'complete')).join('')}
          </div>
        </div>
      ` : ''}

      ${todayInstalls.length === 0 && inProgress.length === 0 && upcoming.length === 0 && recentlyCompleted.length === 0 ? `
        <div class="card text-center py-12">
          <div class="text-haven-muted">No installs scheduled yet.</div>
        </div>
      ` : ''}
    </div>
  `;
}

function renderRunbook(p) {

            <div>
              <div class="text-xs text-haven-muted">Customer</div>

            <div>
              <div class="text-xs text-haven-muted">Crew</div>
              <div class="font-medium">${rb.crewLead} · ${rb.crewSize} crew</div>
            </div>
          </div>

            <svg class="w-5 h-5 text-haven-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            <div>
              <div class="text-xs text-haven-muted">Coord</div>
              <div class="font-medium">${p.coord.split(' ')[0]}</div>

            <li class="flex items-start gap-2">
              <svg class="w-4 h-4 text-haven-muted mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>

        <div class="space-y-2">

            <label class="flex items-center gap-3 p-2 rounded-md hover:bg-haven-bg cursor-pointer">
              <div class="checkbox ${item.checked ? 'checked' : ''}" onclick="toggleRunbookEquipment('${p.id}', ${idx})">${item.checked ? '✓' : ''}</div>

      <!-- Photo requirements with phase grouping -->
      <div class="card mb-4">

            </div>
            <div class="${eqDone === eqTotal ? 'text-haven-ok' : 'text-haven-warn'}">
              ${eqDone === eqTotal ? '✓' : '○'} ${eqDone}/${eqTotal} equipment items
            </div>
          </div>
        `}
      </div>
    </div>
  `;
}

window.openRunbook = (projectId) => { runbookProjectId = projectId; render(); };
window.exitRunbook = () => { runbookProjectId = null; render(); };
window.toggleRunbookEquipment = (projectId, idx) => {
  event.stopPropagation();
  const rb = RUNBOOK_STATE[projectId];
  if (!rb) return;
  rb.equipmentChecklist[idx].checked = !rb.equipmentChecklist[idx].checked;
  render();
};
window.toggleRunbookPhoto = (projectId, category) => {
  const rb = RUNBOOK_STATE[projectId];
  if (!rb) return;
  const upload = rb.photoUploads[category];
  if (!upload) return;
  upload.uploaded = !upload.uploaded;
  upload.uploadedAt = upload.uploaded ? Date.now() : null;
  render();
};
window.submitRunbookSignoff = (projectId) => {
  const rb = RUNBOOK_STATE[projectId];
  if (!rb) return;
  const input = document.getElementById(`signoffInput-${projectId}`);
  const name = input ? input.value.trim() : '';
  if (!name) { alert('Please type your full name.'); return; }
  rb.signoffName = name;
  rb.signoffAt = Date.now();
  // Also mark install completed on INSTALLER_PROJECT_DATA
  const d = INSTALLER_PROJECT_DATA[projectId];
  if (d && !d.installCompletedAt) d.installCompletedAt = Date.now();
  rb.phase = 'complete';
  render();
};

function renderInstallerPayments() {
  const all = visibleProjects().filter(p => PAYMENTS[p.id]);
  const earn = installerEarnings();

  const paymentRow = (p) => {
    const pay = PAYMENTS[p.id];
    const d = INSTALLER_PROJECT_DATA[p.id] || {};
    const half = pay.amount / 2;

    const installStatus = pay.installPaid
      ? `<span class="badge badge-ok">Paid · ${new Date(pay.installPaidAt).toLocaleDateString()}</span>`
      : d.installCompletedAt
        ? `<span class="badge badge-warn">Due · completed ${Math.floor((Date.now() - d.installCompletedAt) / 86400000)}d ago</span>`
        : `<span class="badge badge-neutral">Not yet earned</span>`;

    const inspectionStatus = pay.inspectionPaid
      ? `<span class="badge badge-ok">Paid · ${new Date(pay.inspectionPaidAt).toLocaleDateString()}</span>`
      : d.inspectionResult === 'passed'
        ? `<span class="badge badge-warn">Due · passed ${Math.floor((Date.now() - d.inspectionResultAt) / 86400000)}d ago</span>`
        : `<span class="badge badge-neutral">Not yet earned</span>`;

    const approved = approvedAddersTotal(p.id);
    const pendingAddAmt = pendingAddersTotal(p.id);
    const adderCell = approved > 0 || pendingAddAmt > 0 ? `
      <div class="text-sm">${approved > 0 ? `<span class="text-haven-ok">${dollar(approved)} approved</span>` : ''}</div>
      ${pendingAddAmt > 0 ? `<div class="text-xs text-haven-warn">${dollar(pendingAddAmt)} pending</div>` : ''}
    ` : '<span class="text-xs text-haven-muted">—</span>';

    return `
      <tr class="border-b border-haven-border hover:bg-haven-bg cursor-pointer" data-project-id="${p.id}">
        <td class="px-4 py-3 font-medium">${p.name}</td>
        <td class="px-4 py-3 text-sm text-haven-muted">${p.city}, ${p.state}</td>
        <td class="px-4 py-3 font-medium">${dollar(pay.amount)}</td>
        <td class="px-4 py-3"><div class="text-sm">${dollar(half)}</div>${installStatus}</td>
        <td class="px-4 py-3"><div class="text-sm">${dollar(half)}</div>${inspectionStatus}</td>
        <td class="px-4 py-3">${adderCell}</td>
      </tr>`;
  };

  main.innerHTML = `
    <div class="p-6 max-w-6xl">

let inboxSearch = '';
let inboxFilter = 'all'; // all | needs_reply | customer_silent | unread
let inboxExpanded = new Set(); // project ids with expanded threads
let inboxRead = new Set(); // project ids marked read

function classifyThread(project, messages) {
  // Most recent message direction + age determines status
  const sorted = [...messages].sort((a, b) => a.daysAgo - b.daysAgo);
  const latest = sorted[0];
  const isInboundLatest = latest.direction === 'inbound';

  // Auto-confirmation noise: AHJ "received your application" and similar
  const isAuto = latest.subject.toLowerCase().includes('received') ||
                 latest.subject.toLowerCase().includes('confirmation') && latest.from.includes('.gov');

  // Does customer owe us a reply?
  const lastOutboundToCustomer = sorted.find(m => m.direction === 'outbound' && m.to && m.to.includes('@gmail.com'));
  const laterInboundFromCustomer = lastOutboundToCustomer && sorted.find(m =>
    m.direction === 'inbound' && m.from && m.from.includes('@gmail.com') && m.daysAgo < lastOutboundToCustomer.daysAgo
  );
  const customerSilent = lastOutboundToCustomer && !laterInboundFromCustomer && lastOutboundToCustomer.daysAgo >= 3;
  const customerSilentDays = customerSilent ? lastOutboundToCustomer.daysAgo : 0;

  // Needs reply: most recent message is inbound from a human (not auto) and not yet responded
  const needsReply = isInboundLatest && !isAuto;

  return { needsReply, customerSilent, customerSilentDays, isAuto, latest, count: messages.length };
}

function renderInbox(installerOnly) {
  const visible = visibleProjects();

  // Build threads: one per project. Skip completed projects (their inboxes are quiet).
  const threads = [];
  visible.forEach(p => {
    if (p.stage === 'completed') return;
    if (installerOnly && p.installer !== CURRENT_INSTALLER) return;
    const messages = buildEmails(p);
    if (messages.length === 0) return;
    const meta = classifyThread(p, messages);
    threads.push({ project: p, messages, ...meta });
  });

  // Search
  const q = inboxSearch.trim().toLowerCase();
  let filtered = threads;
  if (q) {
    filtered = filtered.filter(t =>
      t.project.name.toLowerCase().includes(q) ||
      t.project.city.toLowerCase().includes(q) ||
      t.project.projectNumber.toLowerCase().includes(q) ||
      t.messages.some(m =>
        m.subject.toLowerCase().includes(q) ||
        m.body.toLowerCase().includes(q) ||
        m.from.toLowerCase().includes(q) ||
        (m.to || '').toLowerCase().includes(q)
      )
    );
  }

  // Filter
  if (inboxFilter === 'needs_reply') filtered = filtered.filter(t => t.needsReply);
  else if (inboxFilter === 'customer_silent') filtered = filtered.filter(t => t.customerSilent);
  else if (inboxFilter === 'unread') filtered = filtered.filter(t => !inboxRead.has(t.project.id));

  // Sort: needs-reply first, then customer-silent, then by recency
  filtered.sort((a, b) => {
    const score = (t) => (t.needsReply ? 0 : 10) + (t.customerSilent ? 0 : 5) + (t.latest.daysAgo / 100);
    return score(a) - score(b);
  });

  // Counts for filter chips
  const allCount = threads.length;
  const needsReplyCount = threads.filter(t => t.needsReply).length;
  const customerSilentCount = threads.filter(t => t.customerSilent).length;
  const unreadCount = threads.filter(t => !inboxRead.has(t.project.id)).length;

  const chip = (key, label, count, tone) => `
    <button class="filter-chip ${inboxFilter === key ? 'active' : ''}" onclick="setInboxFilter('${key}')"
      ${inboxFilter !== key && tone === 'danger' && count > 0 ? 'style="border-color:#C44545;color:#C44545;"' : ''}
      ${inboxFilter !== key && tone === 'warn' && count > 0 ? 'style="border-color:#E0A83A;color:#E0A83A;"' : ''}>
      ${label} <span class="opacity-70 ml-1">${count}</span>
    </button>`;

  // Highlight search matches in a string
  const hl = (s) => {
    if (!q) return s;
    const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'ig');
    return s.replace(re, '<mark style="background:#C5E84A; color:#013300; padding:0 2px; border-radius:2px;">$1</mark>');
  };

  const threadRow = (t) => {
    const p = t.project;
    const isExpanded = inboxExpanded.has(p.id);
    const isRead = inboxRead.has(p.id);
    const latestWho = t.latest.direction === 'inbound'
      ? t.latest.from.split('<')[0].trim()
      : 'You to ' + (t.latest.to ? t.latest.to.split('<')[0].trim() : 'recipient');

    // Status badge
    let statusBadge = '';
    if (t.needsReply) statusBadge = `<span class="badge badge-danger">Needs reply</span>`;
    else if (t.customerSilent) statusBadge = `<span class="badge badge-warn">Silent ${t.customerSilentDays}d</span>`;
    else if (t.isAuto) statusBadge = `<span class="badge badge-neutral">Auto</span>`;

    const unreadDot = !isRead ? `<span class="w-2 h-2 rounded-full bg-haven-forest shrink-0" style="margin-top:6px"></span>` : `<span class="w-2 h-2 shrink-0"></span>`;

    return `
      <div class="border-b border-haven-border ${!isRead ? 'bg-white' : 'bg-haven-bg/50'}">
        <div class="px-4 py-3 cursor-pointer hover:bg-haven-bg flex items-start gap-3" onclick="toggleInboxThread('${p.id}')">
          ${unreadDot}

                <button class="btn btn-accent text-xs" onclick="event.stopPropagation(); alert('Reply draft opened (demo)')">Reply</button>
              </div>
            </div>
            <div class="space-y-2">
              ${t.messages.map(m => `
                <div class="email-bubble ${m.direction === 'outbound' ? 'outbound' : ''}" style="font-size: 13px;">
                  <div class="email-header">
                    <div class="min-w-0 flex-1">
                      <div class="text-[11px] text-haven-muted">${m.direction === 'outbound' ? 'To: ' : 'From: '}<span class="text-haven-ink">${hl(m.direction === 'outbound' ? (m.to || '') : m.from)}</span></div>
                      <div class="text-sm font-medium mt-0.5 truncate">${hl(m.subject)}</div>
                    </div>
                    <span class="text-[11px] text-haven-muted shrink-0">${m.daysAgo === 0 ? 'today' : `${m.daysAgo}d ago`}</span>
                  </div>
                  <div class="text-sm text-haven-ink whitespace-pre-line mt-2 leading-relaxed">${hl(m.body)}</div>
                </div>`).join('')}
            </div>
          </div>
        ` : ''}
      </div>`;
  };

  main.innerHTML = `
    <div class="p-6 max-w-5xl">
      <div class="flex items-baseline justify-between mb-4">
        <div>
          <h1 class="font-serif text-2xl font-bold text-haven-forest">${installerOnly ? 'Messages' : 'Inbox'}</h1>
          <p class="text-sm text-haven-muted mt-1">${installerOnly ? CURRENT_INSTALLER : (currentCoord === '__all__' ? 'All coordinators' : currentCoord)} · ${threads.length} conversations</p>
        </div>
      </div>

      <div class="flex items-center gap-2 mb-4 flex-wrap">
        ${chip('all', 'All', allCount)}
        ${chip('needs_reply', 'Needs reply', needsReplyCount, 'danger')}
        ${chip('customer_silent', 'Customer silent', customerSilentCount, 'warn')}
        ${chip('unread', 'Unread', unreadCount)}
        <div class="flex-1"></div>
        <div class="relative">
          <input type="text" id="inboxSearchInput" placeholder="Search name, subject, body…" value="${inboxSearch.replace(/"/g, '&quot;')}"
            class="pl-8 pr-8 py-1.5 border border-haven-border rounded-md text-sm bg-white w-72" />
          <svg class="absolute left-2.5 top-2 w-4 h-4 text-haven-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
          ${inboxSearch ? `<button onclick="clearInboxSearch()" class="absolute right-2 top-2 text-haven-muted hover:text-haven-ink text-sm">×</button>` : ''}
        </div>
      </div>

      ${q && filtered.length > 0 ? `<div class="text-xs text-haven-muted mb-2">${filtered.length} ${filtered.length === 1 ? 'match' : 'matches'} for "${inboxSearch}"</div>` : ''}

      <div class="card p-0 overflow-hidden">
        ${filtered.length === 0 ? `
          <div class="p-12 text-center">
            <div class="text-haven-muted mb-2">${q ? `No results for "${inboxSearch}"` : 'Nothing to show'}</div>
            ${q ? `<button class="text-xs text-haven-forest hover:underline" onclick="clearInboxSearch()">Clear search</button>` : ''}
          </div>
        ` : (() => {
            const CAP = 200;
            const shown = filtered.slice(0, CAP);
            const extra = filtered.length - shown.length;
            return shown.map(threadRow).join('') +
              (extra > 0 ? `<div class="p-3 text-center text-xs text-haven-muted border-t border-haven-border">Showing first ${CAP} of ${filtered.length} — prioritized by action needed</div>` : '');
          })()}
      </div>
    </div>`;

  // Wire up search input
  const s = document.getElementById('inboxSearchInput');
  if (s) {
    s.addEventListener('input', (e) => {
      inboxSearch = e.target.value;
      render();
      setTimeout(() => {
        const el = document.getElementById('inboxSearchInput');
        if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
      }, 0);
    });
  }
}

window.setInboxFilter = (k) => { inboxFilter = k; render(); };
window.toggleInboxThread = (id) => {
  if (inboxExpanded.has(id)) inboxExpanded.delete(id);
  else { inboxExpanded.add(id); inboxRead.add(id); }

};
window.markInboxRead = (id) => {
  if (inboxRead.has(id)) inboxRead.delete(id);
  else inboxRead.add(id);
  render();
};
window.clearInboxSearch = () => { inboxSearch = ''; render(); };

// ============================================================
// POST-INSTALL TRACKING
// ============================================================
// A post-install record exists for every project that has been installed.
// Tracks: inspection, PTO submitted, PTO complete, ICF complete milestones,
// plus who the project is currently waiting on ("ball in court")

const BALL_IN_COURT_GROUPS = {
  utility: { label: 'Utility', color: '#3A6EA8',
    reasons: ['PTO Submitted', 'Clarification', 'Transformer Upgrade', 'Pending pre-approval'] },
  franklin_sce: { label: 'Franklin/SCE', color: '#E07A3A',
    reasons: ['SOO'] },
  customer: { label: 'Customer', color: '#D84A7A',
    reasons: ['Customer Signature', 'Escalation'] },
  interconnection: { label: 'Interconnection', color: '#7AC74F',
    reasons: ['GIPT Delay', 'Ready to Submit', 'Utility Clarification'] },
  installer: { label: 'Installer', color: '#3BBF9E',
    reasons: ['Missing Photo'] },
};

// Seed synthetic historical installs so we have 12 months of data for the cohort view.
// These simulate projects that have been installed at various points over the last year.
function buildPostInstallRecords() {
  const records = [];
  // Use a fixed seed so demo data is stable across renders
  let seed = 42;
  const rand = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };

  const months = [
    { label: 'Apr 2025', total: 24 }, { label: 'May 2025', total: 39 },
    { label: 'Jun 2025', total: 48 }, { label: 'Jul 2025', total: 52 },
    { label: 'Aug 2025', total: 59 }, { label: 'Sep 2025', total: 68 },
    { label: 'Oct 2025', total: 82 }, { label: 'Nov 2025', total: 77 },
    { label: 'Dec 2025', total: 82 }, { label: 'Jan 2026', total: 107 },
    { label: 'Feb 2026', total: 95 }, { label: 'Mar 2026', total: 13 },
  ];

  let recId = 1;
  months.forEach((m, monthIdx) => {
    // Older cohorts are further along; newer cohorts are mostly still in flight
    const ageMonths = months.length - 1 - monthIdx;
    for (let i = 0; i < m.total; i++) {
      // Completion probabilities decay with recency
      const inspectionComplete = rand() < Math.min(0.97, 0.55 + ageMonths * 0.08);
      const ptoSubmitted = inspectionComplete && rand() < Math.min(0.97, 0.60 + ageMonths * 0.07);
      const ptoComplete = ptoSubmitted && rand() < Math.min(0.95, 0.35 + ageMonths * 0.10);
      const icfComplete = ptoComplete && rand() < Math.min(0.95, 0.10 + ageMonths * 0.10);

      // Pick a "ball in court" reason if not fully complete
      let ballInCourt = null;
      if (!icfComplete) {
        // Newer cohorts mostly waiting on utility (PTO); older stragglers more varied
        if (!ptoSubmitted) {
          const r = rand();
          if (r < 0.6) ballInCourt = { group: 'interconnection', reason: 'Ready to Submit', daysInHold: Math.floor(rand() * 45) + 3 };
          else if (r < 0.85) ballInCourt = { group: 'installer', reason: 'Missing Photo', daysInHold: Math.floor(rand() * 50) + 5 };
          else ballInCourt = { group: 'customer', reason: 'Customer Signature', daysInHold: Math.floor(rand() * 30) + 2 };
        } else if (!ptoComplete) {
          const r = rand();
          if (r < 0.75) ballInCourt = { group: 'utility', reason: 'PTO Submitted', daysInHold: Math.floor(rand() * 60) + 10 };
          else if (r < 0.82) ballInCourt = { group: 'utility', reason: 'Clarification', daysInHold: Math.floor(rand() * 80) + 20 };
          else if (r < 0.85) ballInCourt = { group: 'utility', reason: 'Transformer Upgrade', daysInHold: Math.floor(rand() * 180) + 60 };
          else if (r < 0.87) ballInCourt = { group: 'utility', reason: 'Pending pre-approval', daysInHold: Math.floor(rand() * 10) + 1 };
          else if (r < 0.97) ballInCourt = { group: 'franklin_sce', reason: 'SOO', daysInHold: Math.floor(rand() * 50) + 10 };
          else ballInCourt = { group: 'customer', reason: 'Escalation', daysInHold: Math.floor(rand() * 140) + 40 };
        } else if (!icfComplete) {
          const r = rand();
          if (r < 0.6) ballInCourt = { group: 'interconnection', reason: 'GIPT Delay', daysInHold: Math.floor(rand() * 15) + 1 };
          else if (r < 0.85) ballInCourt = { group: 'interconnection', reason: 'Utility Clarification', daysInHold: Math.floor(rand() * 20) + 3 };
          else ballInCourt = { group: 'customer', reason: 'Customer Signature', daysInHold: Math.floor(rand() * 25) + 2 };
        }
      }

      // Synthesize a customer name and coordinator for drill-through
      const firstNames = ['Alex','Jordan','Sam','Morgan','Casey','Taylor','Riley','Jamie','Chris','Pat','Drew','Blake','Hayden','Quinn','Avery','Reese','Sage','River','Parker','Rowan'];
      const lastNames = ['Rivera','Chen','Park','Singh','Walsh','Cohen','Nakamura','Hassan','Okafor','Volkov','Andersson','Silva','Kim','Nguyen','Dubois','Rossi','Fischer','Lopez','Brennan','Yamada'];
      const cities = ['San Jose','Oakland','Fremont','Berkeley','Sunnyvale','San Mateo','Hayward','Mountain View','Redwood City','Pasadena','Long Beach','Irvine','San Diego','Pacifica','Half Moon Bay'];
      const utilities = ['PG&E','SCE','SDG&E','PCE'];
      const name = `${firstNames[Math.floor(rand() * firstNames.length)]} ${lastNames[Math.floor(rand() * lastNames.length)]}`;
      const coord = COORDINATORS[Math.floor(rand() * COORDINATORS.length)];
      const installer = INSTALLERS[Math.floor(rand() * INSTALLERS.length)];
      const utility = utilities[Math.floor(rand() * utilities.length)];
      const city = cities[Math.floor(rand() * cities.length)];
      const installDaysAgo = ageMonths * 30 + Math.floor(rand() * 28);

      records.push({
        id: `pi${recId++}`,
        projectNumber: `HVN-2025-${String(recId).padStart(4, '0')}`,
        name, coord, installer, utility, city,
        installMonth: m.label, installDaysAgo,
        inspectionComplete, ptoSubmitted, ptoComplete, icfComplete,
        ballInCourt,
      });
    }
  });
  return { records, months };
}

const POST_INSTALL = buildPostInstallRecords();

// ============================================================
// METRICS SUBCOMPONENTS
// ============================================================
let ballInCourtFilter = 'all'; // all | inspection | interconnection
let expandedBICGroups = new Set(['utility']); // which groups are expanded

function renderBallInCourt() {
  const recs = POST_INSTALL.records.filter(r => {
    if (r.icfComplete) return false;
    if (!r.ballInCourt) return false;
    if (ballInCourtFilter === 'all') return true;
    if (ballInCourtFilter === 'inspection') return !r.inspectionComplete;
    if (ballInCourtFilter === 'interconnection') return r.inspectionComplete && !r.ptoComplete;
    return true;
  });

  const totalActivePostInstall = POST_INSTALL.records.filter(r => !r.icfComplete && r.ballInCourt).length;
  const inInspection = POST_INSTALL.records.filter(r => !r.icfComplete && r.ballInCourt && !r.inspectionComplete).length;
  const inInterconnection = POST_INSTALL.records.filter(r => !r.icfComplete && r.ballInCourt && r.inspectionComplete && !r.ptoComplete).length;
  const externalHolds = POST_INSTALL.records.filter(r => !r.icfComplete && r.ballInCourt && ['utility','franklin_sce','customer'].includes(r.ballInCourt.group)).length;

  // Group records by BIC group, then by reason within group
  const byGroup = {};
  Object.keys(BALL_IN_COURT_GROUPS).forEach(g => byGroup[g] = { count: 0, reasons: {} });
  recs.forEach(r => {
    const g = r.ballInCourt.group;
    if (!byGroup[g]) return;
    byGroup[g].count++;
    const reason = r.ballInCourt.reason;
    if (!byGroup[g].reasons[reason]) byGroup[g].reasons[reason] = { count: 0, totalDays: 0 };
    byGroup[g].reasons[reason].count++;
    byGroup[g].reasons[reason].totalDays += r.ballInCourt.daysInHold;
  });

  // Group-level avg days (weighted)
  Object.keys(byGroup).forEach(g => {
    const reasons = byGroup[g].reasons;
    let totalCount = 0, totalDays = 0;
    Object.values(reasons).forEach(r => { totalCount += r.count; totalDays += r.totalDays; });
    byGroup[g].avgDays = totalCount ? Math.round(totalDays / totalCount) : 0;
  });

  const maxGroupCount = Math.max(1, ...Object.values(byGroup).map(g => g.count));
  const totalActive = recs.length || 1;

  const dayColorClass = (d) => d >= 30 ? 'text-haven-danger' : d >= 14 ? 'text-haven-warn' : 'text-haven-muted';

  const filterBtn = (key, label) => `<button class="filter-chip ${ballInCourtFilter === key ? 'active' : ''}" onclick="setBICFilter('${key}')">${label}</button>`;

  const kpi = (n, label) => `
    <div class="card px-4 py-3" style="background:#FAFAF7;">
      <div class="font-serif font-bold text-3xl text-haven-forest">${n}</div>
      <div class="text-[10px] uppercase tracking-wider text-haven-muted mt-1">${label}</div>
    </div>`;

  return `
    <div class="card mb-6">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h2 class="font-serif font-bold text-xl text-haven-forest">Post-Install Tracking</h2>
          <p class="text-sm mt-1 text-haven-muted">Projects awaiting inspection, PTO, and ICF</p>
        </div>
      </div>

      <div class="grid grid-cols-4 gap-3 mb-5">
        ${kpi(POST_INSTALL.records.length, 'Total Installs')}
        ${kpi(inInspection, 'Inspection')}
        ${kpi(inInterconnection, 'Interconnection')}
        ${kpi(externalHolds, 'External Holds')}
      </div>

      <div class="flex items-center justify-between mb-3 pt-4 border-t border-haven-border">
        <div>
          <div class="text-xs uppercase tracking-wider text-haven-muted">Ball in court</div>
          <div class="text-sm mt-0.5 text-haven-ink">Who is holding up the pipeline right now</div>
        </div>
        <div class="flex gap-2">
          <button class="filter-chip ${ballInCourtFilter === 'all' ? 'active' : ''}" onclick="setBICFilter('all')">All</button>
          <button class="filter-chip ${ballInCourtFilter === 'inspection' ? 'active' : ''}" onclick="setBICFilter('inspection')">Inspection</button>
          <button class="filter-chip ${ballInCourtFilter === 'interconnection' ? 'active' : ''}" onclick="setBICFilter('interconnection')">Interconnection</button>
        </div>
      </div>

      <div class="grid grid-cols-[1fr_auto_auto] gap-x-4 text-xs mb-2 text-haven-muted">
        <div></div>
        <div class="text-right">COUNT / %</div>
        <div class="text-right min-w-[60px]">AVG DAYS</div>
      </div>

      <div class="space-y-1">
        ${Object.entries(BALL_IN_COURT_GROUPS).map(([key, cfg]) => {
          const g = byGroup[key];
          if (g.count === 0) return '';
          const pct = Math.round((g.count / totalActive) * 100);
          const barPct = (g.count / maxGroupCount) * 100;
          const isExpanded = expandedBICGroups.has(key);
          return `
            <div>
              <div class="grid grid-cols-[1fr_auto_auto] gap-x-4 items-center py-2 cursor-pointer border-t border-haven-border" onclick="toggleBICGroup('${key}')">
                <div class="flex items-center gap-3">
                  <div class="font-semibold text-haven-ink w-32">${cfg.label}</div>
                  <div class="flex-1 h-2.5 rounded-full" style="background: #E4E6E0;">
                    <div class="h-full rounded-full transition-all" style="width:${barPct}%; background:${cfg.color};"></div>
                  </div>
                </div>
                <div class="text-right tabular-nums text-haven-ink">
                  <span class="font-semibold">${g.count}</span> <span class="text-haven-muted">${pct}%</span>
                </div>
                <div class="text-right min-w-[60px] ${dayColorClass(g.avgDays)} font-semibold tabular-nums">
                  ${g.avgDays}d <span class="text-haven-muted">${isExpanded ? '▲' : '▼'}</span>
                </div>
              </div>
              ${isExpanded ? Object.entries(g.reasons).sort((a,b) => b[1].count - a[1].count).map(([reason, r]) => {
                const reasonPct = Math.round((r.count / g.count) * 100);
                const avgD = Math.round(r.totalDays / r.count);
                const reasonBarPct = (r.count / g.count) * 100;
                return `
                  <div class="grid grid-cols-[1fr_auto_auto] gap-x-4 items-center py-1.5 pl-8 text-sm text-haven-ink">
                    <div class="flex items-center gap-3">
                      <div class="w-24 text-haven-muted">${reason}</div>
                      <div class="flex-1 h-1.5 rounded-full" style="background: #E4E6E0;">
                        <div class="h-full rounded-full" style="width:${reasonBarPct}%; background:${cfg.color}; opacity:0.7;"></div>
                      </div>

                    <div class="text-right tabular-nums"><span class="font-semibold">${r.count}</span> <span class="text-haven-muted">${reasonPct}%</span></div>
                    <div class="text-right min-w-[60px] ${dayColorClass(avgD)} font-semibold tabular-nums">${avgD}d</div>
                  </div>`;
              }).join('') : ''}
            </div>`;
        }).join('')}
      </div>

      <div class="mt-4 pt-3 text-xs text-haven-muted border-t border-haven-border">
        Avg days: <span style="color:#E0A83A;">■</span> 14–29 days &nbsp; <span style="color:#C44545;">■</span> 30+ days
      </div>
    </div>
  `;
}

function renderInstallsByMonth() {

function renderBlockers() {

  // Apply filters
  if (blockerCategoryFilter !== 'all') open = open.filter(b => b.category === blockerCategoryFilter);

  else if (blockerAgeFilter === 'stale') open = open.filter(b => b.openedDaysAgo >= 7 && b.openedDaysAgo < 30);
  else if (blockerAgeFilter === 'ancient') open = open.filter(b => b.openedDaysAgo >= 30);

  if (blockerSearch.trim()) {
    const q = blockerSearch.trim().toLowerCase();
    open = open.filter(b => {
      const p = PROJECTS.find(pp => pp.id === b.projectId);
      if (!p) return false;
      return p.name.toLowerCase().includes(q) ||

        p.projectNumber.toLowerCase().includes(q) ||

  // Sort
  const sortAcc = {
    age: b => b.openedDaysAgo,
    project: b => (PROJECTS.find(p => p.id === b.projectId)?.name || '').toLowerCase(),
    category: b => b.category,
    blocker: b => b.label,
  };
  const acc = sortAcc[blockerSort.col] || sortAcc.age;
  const dir = blockerSort.dir === 'asc' ? 1 : -1;
  open.sort((a, b) => {
    const av = acc(a), bv = acc(b);

    return 0;
  });

  // Totals for filter chips
  const allOpen = BLOCKERS.filter(b => !b.resolvedAt && visibleIds.has(b.projectId));

  const fresh = allOpen.filter(b => b.openedDaysAgo < 7).length;
  const stale = allOpen.filter(b => b.openedDaysAgo >= 7 && b.openedDaysAgo < 30).length;
  const ancient = allOpen.filter(b => b.openedDaysAgo >= 30).length;

  // Unique blocked projects
  const blockedProjectIds = new Set(allOpen.map(b => b.projectId));

  const CAP = 200;
  const shown = open.slice(0, CAP);
  const extra = open.length - shown.length;

  function th(key, label) {

  }

  const catChip = (key, label, count) => {
    const color = key === 'all' ? '#013300' : BLOCKER_CATEGORY_COLORS[key];

  };

  const ageChip = (key, label, count) => {
    const active = blockerAgeFilter === key;
    return `<button class="filter-chip ${active ? 'active' : ''}" onclick="setBlockerAge('${key}')">${label} <span class="opacity-70 ml-1">${count}</span></button>`;
  };

  main.innerHTML = `
    <div class="p-6 max-w-[1400px]">

            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>

          <div class="text-xs text-haven-muted">across ${blockedProjectIds.size} projects</div>
        </div>
        <div class="card px-4 py-3" style="border-left:3px solid #2F7A3E;">
          <div class="text-[11px] uppercase tracking-wider text-haven-muted">Fresh (&lt;7d)</div>
          <div class="font-serif font-bold text-2xl mt-0.5 text-haven-forest">${fresh}</div>
          <div class="text-xs text-haven-muted">normal follow-up</div>
        </div>
        <div class="card px-4 py-3" style="border-left:3px solid #E0A83A;">
          <div class="text-[11px] uppercase tracking-wider text-haven-muted">Stale (7-30d)</div>
          <div class="font-serif font-bold text-2xl mt-0.5 text-haven-warn">${stale}</div>
          <div class="text-xs text-haven-muted">needs escalation</div>
        </div>
        <div class="card px-4 py-3" style="border-left:3px solid #C44545;">
          <div class="text-[11px] uppercase tracking-wider text-haven-muted">Ancient (30d+)</div>

          ${catChip('utility', 'Utility', catCounts.utility)}
          ${catChip('installer', 'Installer', catCounts.installer)}
          ${catChip('internal', 'Internal', catCounts.internal)}

        <div class="text-[11px] uppercase tracking-wider text-haven-muted mb-1.5">By age</div>
        <div class="flex items-center gap-2 flex-wrap">
          ${ageChip('all', 'Any age', allOpen.length)}

          ${ageChip('ancient', 'Ancient', ancient)}

        <table class="w-full text-sm">
          <thead class="bg-haven-bg border-b border-haven-border">
            <tr>
              ${th('category', 'Category')}
              ${th('blocker', 'Blocker')}
              ${th('project', 'Project')}
              <th class="px-3 py-2.5 text-left"><span class="uppercase tracking-wide text-xs text-haven-muted">Stage</span></th>
              <th class="px-3 py-2.5 text-left"><span class="uppercase tracking-wide text-xs text-haven-muted">Resolution</span></th>
              <th class="px-3 py-2.5 text-left"><span class="uppercase tracking-wide text-xs text-haven-muted">Coord</span></th>
              ${th('age', 'Age')}

            </tr>
          </thead>

            ${shown.length === 0 ? `<tr><td colspan="8" class="px-4 py-8 text-center text-haven-muted">No blockers match</td></tr>` : shown.map(b => {
              const p = PROJECTS.find(pp => pp.id === b.projectId);
              if (!p) return '';
              const tone = blockerAgeTone(b);
              const ageColor = tone === 'danger' ? 'text-haven-danger' : tone === 'warn' ? 'text-haven-warn' : 'text-haven-muted';

              return `
                <tr class="border-b border-haven-border hover:bg-haven-bg">
                  <td class="px-3 py-2.5"><div class="flex items-center gap-1.5"><div class="w-2 h-2 rounded-full" style="background:${catColor}"></div><span class="text-xs">${BLOCKER_CATEGORY_LABELS[b.category]}</span></div></td>
                  <td class="px-3 py-2.5 font-medium text-haven-forest">${b.label}</td>
                  <td class="px-3 py-2.5 cursor-pointer" data-project-id="${p.id}">
                    <div class="font-medium text-haven-ink">${p.name}</div>
                    <div class="text-[11px] text-haven-muted">${p.projectNumber} · ${p.city}, ${p.state}</div>

      setTimeout(() => {

        if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); }

window.resolveBlocker = (id) => {

  b.resolvedAt = Date.now();
  // Keep index in sync
  const list = BLOCKERS_BY_PROJECT[b.projectId] || [];

};

window.openAddBlocker = (projectId) => {
  const codes = Object.keys(BLOCKER_CATALOG);
  const catalogList = codes.map((code, i) => `${i + 1}. ${BLOCKER_CATALOG[code].label} (${BLOCKER_CATALOG[code].category})`).join('\n');
  const picked = prompt(`Add blocker — enter number:\n\n${catalogList}`);
  if (!picked) return;
  const idx = parseInt(picked, 10) - 1;
  if (isNaN(idx) || idx < 0 || idx >= codes.length) return;
  const code = codes[idx];
  pushBlocker(projectId, code, 0, null, 'Shane Brennan');
  // Update index
  const last = BLOCKERS[BLOCKERS.length - 1];
  if (!BLOCKERS_BY_PROJECT[projectId]) BLOCKERS_BY_PROJECT[projectId] = [];
  BLOCKERS_BY_PROJECT[projectId].push(last);
  // Reopen modal to show new blocker
  openProjectModal(projectId);
};

    reworked_days_ago: p => p.reworkedDaysAgo || 0,
    customer: p => p.name.toLowerCase(),
    stage: p => STAGE_ORDER.indexOf(p.stage),
    returned_from: p => STAGE_ORDER.indexOf(p.reworkFromStage || p.stage),
    rework_count: p => p.reworkCount || 0,
    coord: p => (p.coord || '').toLowerCase(),
  };
  const accFn = acc[reworkSort.col] || acc.reworked_days_ago;
  const dir = reworkSort.dir === 'asc' ? 1 : -1;
  list.sort((a, b) => {
    const av = accFn(a), bv = accFn(b);
    if (av < bv) return -1 * dir;
    if (av > bv) return 1 * dir;
    return 0;
  });

  // Rework rate metrics
  const activeTotal = PROJECTS.filter(p => p.stage !== 'completed').length;
  const reworkRate = activeTotal > 0 ? Math.round((allRework.length / activeTotal) * 100) : 0;

  // By stage
  const byStage = {};
  allRework.forEach(p => { byStage[p.stage] = (byStage[p.stage] || 0) + 1; });
  const stageList = Object.keys(byStage).sort((a, b) => byStage[b] - byStage[a]);

  // By coord
  const byCoord = {};
  const coordActive = {};
  PROJECTS.filter(p => p.stage !== 'completed').forEach(p => {
    coordActive[p.coord] = (coordActive[p.coord] || 0) + 1;
    if ((p.reworkCount || 0) > 0) byCoord[p.coord] = (byCoord[p.coord] || 0) + 1;
  });
  const coordRates = Object.keys(coordActive).map(c => ({
    coord: c,
    active: coordActive[c],
    rework: byCoord[c] || 0,
    rate: coordActive[c] > 0 ? Math.round(((byCoord[c] || 0) / coordActive[c]) * 100) : 0,
  })).sort((a, b) => b.rate - a.rate);

  // By installer
  const byInstaller = {};
  const installerActive = {};
  PROJECTS.filter(p => p.stage !== 'completed' && p.installer).forEach(p => {
    installerActive[p.installer] = (installerActive[p.installer] || 0) + 1;
    if ((p.reworkCount || 0) > 0) byInstaller[p.installer] = (byInstaller[p.installer] || 0) + 1;
  });
  const installerRates = Object.keys(installerActive).map(i => ({
    installer: i,
    active: installerActive[i],
    rework: byInstaller[i] || 0,
    rate: installerActive[i] > 0 ? Math.round(((byInstaller[i] || 0) / installerActive[i]) * 100) : 0,
  })).sort((a, b) => b.rate - a.rate);

  const th = (key, label) => {
    const isSorted = reworkSort.col === key;
    const icon = isSorted ? (reworkSort.dir === 'asc' ? '↑' : '↓') : '<span style="color:#C4C4C0">↕</span>';
    return `<th class="px-3 py-2.5 text-left"><button class="uppercase tracking-wide text-xs text-haven-muted hover:text-haven-forest flex items-center gap-1" onclick="toggleReworkSort('${key}')">${label} ${icon}</button></th>`;
  };

  const rateColor = (pct) => {
    if (pct >= 15) return '#C44545';
    if (pct >= 8) return '#E0A83A';
    return '#2F7A3E';
  };

  main.innerHTML = `
    <div class="p-6">
      <div class="mb-5">
        <h1 class="font-serif text-2xl font-bold text-haven-forest">Rework</h1>
        <p class="text-sm text-haven-muted mt-1">Projects sent back to a prior stage · ${allRework.length} active · ${reworkRate}% overall rework rate</p>
      </div>

      <div class="grid grid-cols-3 gap-4 mb-6">
        <div class="card">
          <div class="text-xs uppercase tracking-wider text-haven-muted mb-1">Active in rework</div>
          <div class="font-serif font-bold text-3xl text-haven-forest">${allRework.length}</div>
          <div class="text-xs text-haven-muted mt-1">${reworkRate}% of active pipeline</div>
        </div>
        <div class="card">
          <div class="text-xs uppercase tracking-wider text-haven-muted mb-2">By stage</div>
          ${stageList.length === 0 ? '<div class="text-sm text-haven-muted">No rework</div>' : stageList.slice(0, 5).map(s => `
            <div class="flex items-center justify-between py-0.5 text-sm">
              <span>${STAGE_LABELS[s]}</span>
              <span class="font-semibold">${byStage[s]}</span>
            </div>
          `).join('')}
        </div>
        <div class="card">
          <div class="text-xs uppercase tracking-wider text-haven-muted mb-2">Multiple reworks</div>
          <div class="font-serif font-bold text-3xl text-haven-forest">${allRework.filter(p => p.reworkCount > 1).length}</div>
          <div class="text-xs text-haven-muted mt-1">projects reworked more than once</div>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="card">
          <h2 class="font-serif font-bold text-haven-forest mb-3">Rework rate by coordinator</h2>
          <table class="w-full text-sm">
            <thead><tr class="text-left text-xs text-haven-muted uppercase border-b border-haven-border">
              <th class="pb-2">Coord</th>
              <th class="pb-2 text-right">Active</th>
              <th class="pb-2 text-right">Rework</th>
              <th class="pb-2 text-right">Rate</th>
            </tr></thead>
            <tbody>
              ${coordRates.map(r => `
                <tr class="border-b border-haven-border">
                  <td class="py-2">${avatar(r.coord, 18)} <span class="ml-1.5 align-middle text-xs">${r.coord.split(' ')[0]}</span></td>
                  <td class="py-2 text-right text-haven-muted">${r.active}</td>
                  <td class="py-2 text-right">${r.rework}</td>
                  <td class="py-2 text-right font-semibold" style="color:${rateColor(r.rate)}">${r.rate}%</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>

        <div class="card">
          <h2 class="font-serif font-bold text-haven-forest mb-3">Rework rate by installer</h2>
          <table class="w-full text-sm">
            <thead><tr class="text-left text-xs text-haven-muted uppercase border-b border-haven-border">
              <th class="pb-2">Installer</th>
              <th class="pb-2 text-right">Active</th>
              <th class="pb-2 text-right">Rework</th>
              <th class="pb-2 text-right">Rate</th>
            </tr></thead>
            <tbody>
              ${installerRates.map(r => `
                <tr class="border-b border-haven-border">
                  <td class="py-2 text-sm">${r.installer.split(' ')[0]}</td>
                  <td class="py-2 text-right text-haven-muted">${r.active}</td>
                  <td class="py-2 text-right">${r.rework}</td>
                  <td class="py-2 text-right font-semibold" style="color:${rateColor(r.rate)}">${r.rate}%</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <div class="flex items-center gap-2 mb-4 flex-wrap">
        <button class="filter-chip ${reworkFilterStage === null ? 'active' : ''}" onclick="setReworkStageFilter(null)">All stages <span class="opacity-70 ml-1">${allRework.length}</span></button>
        ${stageList.map(s => `<button class="filter-chip ${reworkFilterStage === s ? 'active' : ''}" onclick="setReworkStageFilter('${s}')">${STAGE_LABELS[s]} <span class="opacity-70 ml-1">${byStage[s]}</span></button>`).join('')}
      </div>

      <div class="card p-0 overflow-hidden">
        ${list.length === 0 ? '<div class="p-8 text-center text-sm text-haven-muted">No rework projects in this view.</div>' : `

// POST-INSTALL
// ============================================================
function renderPostInstall() {
  let recs = POST_INSTALL.records.filter(r => !r.icfComplete);

  // Apply milestone column filters
  if (postInstallFilters.inspection === 'done') recs = recs.filter(r => r.inspectionComplete);
  else if (postInstallFilters.inspection === 'not_done') recs = recs.filter(r => !r.inspectionComplete);
  if (postInstallFilters.pto_sub === 'done') recs = recs.filter(r => r.ptoSubmitted);
  else if (postInstallFilters.pto_sub === 'not_done') recs = recs.filter(r => !r.ptoSubmitted);
  if (postInstallFilters.pto_done === 'done') recs = recs.filter(r => r.ptoComplete);
  else if (postInstallFilters.pto_done === 'not_done') recs = recs.filter(r => !r.ptoComplete);
  if (postInstallFilters.icf === 'done') recs = recs.filter(r => r.icfComplete);
  else if (postInstallFilters.icf === 'not_done') recs = recs.filter(r => !r.icfComplete);
  if (postInstallFilters.utility) recs = recs.filter(r => r.utility === postInstallFilters.utility);
  if (postInstallFilters.coord) recs = recs.filter(r => r.coord === postInstallFilters.coord);
  if (postInstallFilters.waiting_on) recs = recs.filter(r => r.ballInCourt && r.ballInCourt.group === postInstallFilters.waiting_on);

  // Search
  if (postInstallSearch) {
    const q = postInstallSearch.toLowerCase();
    recs = recs.filter(r => r.name.toLowerCase().includes(q) || r.city.toLowerCase().includes(q) || r.projectNumber.toLowerCase().includes(q));
  }

  // Sort
  const sortAccessor = {
    project: r => r.name.toLowerCase(),
    location: r => r.city.toLowerCase(),
    utility: r => r.utility,
    coord: r => r.coord,
    installed: r => r.installDaysAgo,
    inspection: r => r.inspectionComplete ? 1 : 0,
    pto_sub: r => r.ptoSubmitted ? 1 : 0,
    pto_done: r => r.ptoComplete ? 1 : 0,
    icf: r => r.icfComplete ? 1 : 0,
    waiting_on: r => r.ballInCourt ? r.ballInCourt.group : 'zzz',
    days: r => r.ballInCourt?.daysInHold || 0,
  };
  const acc = sortAccessor[postInstallSort.col] || sortAccessor.days;
  const dir = postInstallSort.dir === 'asc' ? 1 : -1;
  recs.sort((a, b) => {
    const av = acc(a), bv = acc(b);
    if (av < bv) return -1 * dir;
    if (av > bv) return 1 * dir;
    return 0;
  });

  // Totals for header bar
  const activeFilterCount = Object.values(postInstallFilters).filter(v => v !== null).length;

  const mcell = (done) => done
    ? '<div class="w-6 h-6 rounded-full flex items-center justify-center" style="background:#2F7A3E; color:white; font-size:12px;">✓</div>'
    : '<div class="w-6 h-6 rounded-full border-2 border-haven-border bg-white"></div>';

  // Unique values for filter dropdowns (from all post-install records, not just filtered)
  const allOpen = POST_INSTALL.records.filter(r => !r.icfComplete);
  const utilities = [...new Set(allOpen.map(r => r.utility))].sort();
  const coords = [...new Set(allOpen.map(r => r.coord))].sort();
  const waitingGroups = Object.keys(BALL_IN_COURT_GROUPS);

  // Header renderer — supports sort and (optionally) a filter menu
  function th(key, label, opts = {}) {

    const sortIcon = isSorted ? (postInstallSort.dir === 'asc' ? '↑' : '↓') : '<span style="color:#C4C4C0">↕</span>';
    const filterValue = postInstallFilters[key];
    const hasFilter = filterValue !== null && filterValue !== undefined;
    const filterBadge = hasFilter ? `<span class="inline-block w-1.5 h-1.5 rounded-full bg-haven-forest ml-1"></span>` : '';
    const alignClass = align === 'center' ? 'text-center' : 'text-left';

    return `
      <th class="px-3 py-2.5 ${alignClass} relative select-none" style="user-select:none;">
        <div class="flex items-center gap-1 ${align === 'center' ? 'justify-center' : ''}">
          ${sortable ? `<button class="uppercase tracking-wide text-xs text-haven-muted hover:text-haven-forest flex items-center gap-1" onclick="togglePISort('${key}')">${label} ${sortIcon}</button>` : `<span class="uppercase tracking-wide text-xs text-haven-muted">${label}</span>`}
          ${filterOptions ? `
            <button class="text-haven-muted hover:text-haven-forest px-1" onclick="togglePIFilterMenu('${key}')">
              <svg class="w-3 h-3 inline" fill="${hasFilter ? '#013300' : 'none'}" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
              ${filterBadge}
            </button>
            ${postInstallOpenFilter === key ? `
              <div class="absolute z-20 mt-1 bg-white border border-haven-border rounded-md shadow-lg py-1 text-sm text-left" style="top:100%; ${align === 'center' ? 'left:50%; transform:translateX(-50%);' : 'left:0;'} min-width:180px;">
                <button class="w-full text-left px-3 py-1.5 hover:bg-haven-bg ${filterValue === null ? 'font-semibold text-haven-forest' : ''}" onclick="setPIFilter('${key}', null)">All</button>
                ${filterOptions.map(opt => `<button class="w-full text-left px-3 py-1.5 hover:bg-haven-bg ${filterValue === opt.value ? 'font-semibold text-haven-forest' : ''}" onclick="setPIFilter('${key}', '${opt.value}')">${opt.label}</button>`).join('')}
              </div>
            ` : ''}
          ` : ''}
        </div>
      </th>`;
  }

  main.innerHTML = `
    <div class="p-6 max-w-[1400px]">
      <div class="flex items-start justify-between mb-5 gap-4 flex-wrap">
        <div>
          <h1 class="font-serif text-2xl font-bold text-haven-forest">Post-Install</h1>
          <p class="text-sm text-haven-muted mt-1">
            Every project that's been installed and its milestone status · ${recs.length} shown
            ${activeFilterCount > 0 ? ` · <button class="text-haven-forest hover:underline" onclick="clearAllPIFilters()">Clear ${activeFilterCount} filter${activeFilterCount === 1 ? '' : 's'}</button>` : ''}
          </p>
        </div>
        <div class="flex items-center gap-2">
          <div class="relative">
            <input type="text" id="piSearch" placeholder="Search name, city, project #..." value="${postInstallSearch.replace(/"/g, '&quot;')}"

              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            ${postInstallSearch ? `<button onclick="clearPISearch()" class="absolute right-2 top-2 text-haven-muted hover:text-haven-ink text-sm">×</button>` : ''}
          </div>
        </div>
      </div>

      <div class="card p-0 overflow-visible">
        <table class="w-full text-sm">
          <thead class="bg-haven-bg border-b border-haven-border">
            <tr>
              ${th('project', 'Project')}
              ${th('location', 'Location')}
              ${th('utility', 'Utility', { filterOptions: utilities.map(u => ({ label: u, value: u })) })}
              ${th('coord', 'Coord', { filterOptions: coords.map(c => ({ label: c.split(' ')[0], value: c })) })}
              ${th('installed', 'Installed')}
              ${th('inspection', 'Inspection', { align: 'center', filterOptions: [{ label: 'Complete', value: 'done' }, { label: 'Not complete', value: 'not_done' }] })}
              ${th('pto_sub', 'PTO Sub', { align: 'center', filterOptions: [{ label: 'Submitted', value: 'done' }, { label: 'Not submitted', value: 'not_done' }] })}
              ${th('pto_done', 'PTO Done', { align: 'center', filterOptions: [{ label: 'Complete', value: 'done' }, { label: 'Not complete', value: 'not_done' }] })}
              ${th('icf', 'ICF', { align: 'center', filterOptions: [{ label: 'Complete', value: 'done' }, { label: 'Not complete', value: 'not_done' }] })}
              ${th('waiting_on', 'Waiting on', { filterOptions: waitingGroups.map(g => ({ label: BALL_IN_COURT_GROUPS[g].label, value: g })) })}
              ${th('days', 'Days in hold')}
            </tr>
          </thead>
          <tbody>
            ${recs.length === 0 ? '<tr><td colspan="11" class="px-4 py-8 text-center text-haven-muted">No projects match</td></tr>' : recs.slice(0, 100).map(r => {
              const bic = r.ballInCourt;
              const bicGroup = bic ? BALL_IN_COURT_GROUPS[bic.group] : null;
              const d = bic?.daysInHold || 0;
              const dayClass = d >= 30 ? 'text-haven-danger font-medium' : d >= 14 ? 'text-haven-warn font-medium' : 'text-haven-muted';
              return `
                <tr class="border-b border-haven-border hover:bg-haven-bg">
                  <td class="px-3 py-2.5">
                    <div class="font-medium text-haven-forest">${r.name}</div>
                    <div class="text-[11px] text-haven-muted">${r.projectNumber}</div>
                  </td>
                  <td class="px-3 py-2.5 text-haven-muted">${r.city}</td>
                  <td class="px-3 py-2.5 text-haven-muted">${r.utility}</td>
                  <td class="px-3 py-2.5">${avatar(r.coord, 18)} <span class="text-xs ml-1 align-middle">${r.coord.split(' ')[0]}</span></td>
                  <td class="px-3 py-2.5 text-xs text-haven-muted">${r.installDaysAgo}d ago</td>
                  <td class="px-3 py-2.5"><div class="flex justify-center">${mcell(r.inspectionComplete)}</div></td>
                  <td class="px-3 py-2.5"><div class="flex justify-center">${mcell(r.ptoSubmitted)}</div></td>
                  <td class="px-3 py-2.5"><div class="flex justify-center">${mcell(r.ptoComplete)}</div></td>

      if (postInstallOpenFilter && !e.target.closest('button')) {

// ============================================================
// METRICS — cycle time + post-install + coordinator load
// ============================================================
function renderMetrics() {
  const active = PROJECTS.filter(p => p.stage !== 'completed');
  const completed = PROJECTS.filter(p => p.stage === 'completed');

  // Coord health
  const coordHealth = COORDINATORS.map(c => {
    const their = active.filter(p => getCoord(p) === c);
    return {
      coord: c,
      active: their.length,
      atRisk: their.filter(p => p.riskLevel === 'high').length,
      breached: their.filter(p => p.slaStatus === 'breached').length,
      noAction: their.filter(p => !p.nextAction).length,
    };
  });

  // ------------------------------------------------------------
  // SLA COMPLIANCE DATA
  // ------------------------------------------------------------
  // Cycle time per stage: average days-in-stage for ACTIVE projects vs CA target
  const stageSLA = STAGE_ORDER.map(stage => {
    const inStage = active.filter(p => p.stage === stage);
    const target = STAGE_TARGETS_CA[stage] || 10;
    const avgDays = inStage.length > 0 ? inStage.reduce((s, p) => s + (p.daysInStage || 0), 0) / inStage.length : 0;
    const onTrack = inStage.filter(p => (p.daysInStage || 0) <= target).length;
    const compliancePct = inStage.length > 0 ? Math.round((onTrack / inStage.length) * 100) : null;
    return {
      stage,
      label: STAGE_LABELS[stage],
      target,
      avgDays: Math.round(avgDays * 10) / 10,
      count: inStage.length,
      compliancePct,
      overUnder: avgDays - target,
    };
  }).filter(s => s.count > 0);

  // Compliance per coord: % of their active projects that are not SLA-breached
  const coordSLA = COORDINATORS.map(c => {
    const their = active.filter(p => getCoord(p) === c);
    const compliant = their.filter(p => p.slaStatus !== 'breached').length;
    const pct = their.length > 0 ? Math.round((compliant / their.length) * 100) : null;
    // Break down by stage-bucket: pre-install vs post-install
    const preInstall = their.filter(p => ['site_survey', 'design', 'permitting', 'scheduling'].includes(p.stage));
    const install = their.filter(p => ['installation', 'inspection'].includes(p.stage));
    const postInstall = their.filter(p => ['interconnection', 'rebate'].includes(p.stage));
    const bucketPct = (arr) => arr.length === 0 ? null : Math.round((arr.filter(p => p.slaStatus !== 'breached').length / arr.length) * 100);
    return {
      coord: c,
      total: their.length,
      compliant,
      pct,
      prePct: bucketPct(preInstall), preCount: preInstall.length,
      instPct: bucketPct(install), instCount: install.length,
      postPct: bucketPct(postInstall), postCount: postInstall.length,
    };
  });

  const slaPctColor = (pct) => {
    if (pct === null) return '#6B7568';
    if (pct >= 85) return '#2F7A3E';
    if (pct >= 70) return '#E0A83A';
    return '#C44545';
  };

  main.innerHTML = `

            <th class="pb-2 text-right">Target</th>
            <th class="pb-2 text-right">Actual avg</th>
            <th class="pb-2 text-right">Over / under</th>
            <th class="pb-2 text-right">On-target %</th>
          </tr></thead>
          <tbody>
            ${stageSLA.map(s => {
              const over = s.overUnder > 0;
              const pctColor = slaPctColor(s.compliancePct);
              return `
                <tr class="border-b border-haven-border">
                  <td class="py-2 font-medium text-haven-forest">${s.label}</td>
                  <td class="py-2 text-right text-haven-muted">${s.count}</td>
                  <td class="py-2 text-right text-haven-muted">${s.target}d</td>
                  <td class="py-2 text-right font-medium">${s.avgDays}d</td>
                  <td class="py-2 text-right ${over ? 'text-haven-danger font-medium' : 'text-haven-ok font-medium'}">${over ? '+' : ''}${s.overUnder.toFixed(1)}d</td>
                  <td class="py-2 text-right font-semibold" style="color:${pctColor}">${s.compliancePct}%</td>
                </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>

      <div class="card mb-6">
        <div class="flex items-baseline justify-between mb-4">

        </div>
        <table class="w-full text-sm">
          <thead><tr class="text-left text-xs text-haven-muted uppercase border-b border-haven-border">
            <th class="pb-2">Coordinator</th>
            <th class="pb-2 text-right">Active</th>

            <th class="pb-2 text-right">Install</th>
            <th class="pb-2 text-right">Post-install</th>
          </tr></thead>
          <tbody>
            ${coordSLA.map(c => {
              const pctCell = (pct, count) => {
                if (pct === null) return `<span class="text-haven-muted">—</span>`;
                return `<span class="font-semibold" style="color:${slaPctColor(pct)}">${pct}%</span> <span class="text-[10px] text-haven-muted">(${count})</span>`;
              };
              return `
