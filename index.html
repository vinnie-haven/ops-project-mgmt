const COMPLETED_STAGE_DURATIONS = {
  site_survey: [5, 6, 8, 7],
  design: [7, 8, 9, 8],
  permitting: [18, 21, 28, 23],
  scheduling: [3, 4, 5, 4],
  installation: [2, 2, 3, 2],
  inspection: [8, 9, 11, 10],
  interconnection: [22, 26, 31, 25],
  rebate: [10, 12, 14, 11],
  handoff_gaps: [2, 3, 1, 2, 2, 1, 2, 3] // interspersed handoff time
};

const PROJECTS = PROJECTS_RAW.map((p, i) => {
  const target = (p.state === 'MA' ? STAGE_TARGETS_MA : STAGE_TARGETS_CA)[p.stage] ?? null;
  const utilityOverride = p.utility === 'PG&E' && p.stage === 'interconnection' ? 45 : null;
  const effectiveTarget = utilityOverride ?? target;
  const daysOverdue = effectiveTarget ? Math.max(0, p.daysInStage - effectiveTarget) : 0;
  const slaStatus = p.stage === 'completed' ? 'completed'
    : daysOverdue > 0 ? 'breached'
    : effectiveTarget && p.daysInStage >= effectiveTarget * 0.8 ? 'approaching'
    : 'ok';

  let risk = 0;
  if (p.stage !== 'completed') {
    if (slaStatus === 'breached') risk += 30 + Math.min(40, daysOverdue * 2);
    else if (slaStatus === 'approaching') risk += 15;
    if (!p.nextAction) risk += 25;
    if (p.nextActionDueInDays !== null && p.nextActionDueInDays < 0) risk += 15 + Math.min(20, -p.nextActionDueInDays * 3);
    if (p.lastTouchedDaysAgo >= IDLE_DANGER) risk += 20;
    else if (p.lastTouchedDaysAgo >= IDLE_WARNING) risk += 10;
    if (p.priority === 'urgent') risk += 10;
    if (p.priority === 'high') risk += 5;
  }
  risk = Math.min(100, risk);
  const riskLevel = risk >= 50 ? 'high' : risk >= 25 ? 'medium' : 'low';

  return {
    ...p,
    id: `p${i+1}`,
    projectNumber: `HVN-2026-${String(i+1).padStart(4, '0')}`,
    daysOverdue, effectiveTarget, slaStatus,
    risk, riskLevel,
    systemType: p.battery && p.solar ? 'Solar + Battery' : p.solar ? 'Solar only' : 'Battery only',
    kickoffAgo: Math.floor(Math.random() * 45) + p.daysInStage + 5,
    customerLastReplyDaysAgo: p.waitingOn === 'customer' ? Math.max(1, p.lastTouchedDaysAgo) : null,

const SUBMITTAL_TYPES = {
  permit_app: 'Permit application',
  permit_resubmit: 'Permit resubmittal',
  utility_preapp: 'Utility pre-application',
  interconnection_app: 'Interconnection application',
  inspection_request: 'Inspection request',
  sgip_rsse: 'SGIP RSSE submission',
  sgip_claim: 'SGIP incentive claim',
  smart_app: 'SMART application',
  ptoc_submission: 'PTO submission',
};

const SUBMITTALS = [];
let subSeq = 1;

// Generate submittals based on project stage (everything past permitting has a permit submittal, etc.)
PROJECTS.forEach(p => {
  const stageIdx = STAGE_ORDER.indexOf(p.stage);
  const completed = p.stage === 'completed';
  const isPast = (s) => completed || stageIdx > STAGE_ORDER.indexOf(s);
  const isCurrent = (s) => p.stage === s;

  // Permit submission for anything at or past permitting
  if (stageIdx >= STAGE_ORDER.indexOf('permitting') || completed) {
    const sentDaysAgo = isCurrent('permitting') ? p.daysInStage : 40 + Math.floor(Math.random() * 30);
    const ahjStats = EXTERNAL_PARTY_STATS[p.ahj] || { avg: 20, median: 18, n: 10 };
    const expectedResponseInDays = ahjStats.avg;
    const responseDaysAgo = isPast('permitting') ? sentDaysAgo - Math.floor(ahjStats.avg * (0.8 + Math.random() * 0.4)) : null;
    SUBMITTALS.push({
      id: `s${subSeq++}`,
      projectId: p.id,
      type: 'permit_app',
      recipient: p.ahj,
      recipientType: 'ahj',
      sentDaysAgo,
      expectedResponseInDays,
      responseDaysAgo,
      status: responseDaysAgo !== null ? 'responded' : (sentDaysAgo > expectedResponseInDays ? 'overdue' : 'pending'),
    });
  }

  // Resubmit for Oakland permitting project specifically
  if (p.id === 'p2') {
    SUBMITTALS.push({
      id: `s${subSeq++}`, projectId: p.id, type: 'permit_resubmit', recipient: p.ahj, recipientType: 'ahj',
      sentDaysAgo: 14, expectedResponseInDays: 14, responseDaysAgo: null, status: 'pending',
    });
  }

  // Interconnection for anything at or past that stage
  if (stageIdx >= STAGE_ORDER.indexOf('interconnection') || completed) {
    const sentDaysAgo = isCurrent('interconnection') ? p.daysInStage : 20 + Math.floor(Math.random() * 15);
    const uStats = EXTERNAL_PARTY_STATS[p.utility] || { avg: 30 };
    const responseDaysAgo = completed ? sentDaysAgo - Math.floor(uStats.avg * 0.9) : null;
    SUBMITTALS.push({
      id: `s${subSeq++}`,
      projectId: p.id,
      type: 'interconnection_app',
      recipient: p.utility,
      recipientType: 'utility',
      sentDaysAgo,
      expectedResponseInDays: uStats.avg,
      responseDaysAgo,
      status: responseDaysAgo !== null ? 'responded' : (sentDaysAgo > uStats.avg ? 'overdue' : 'pending'),
    });
  }

  // Inspection request for projects at inspection stage
  if (isCurrent('inspection') || isPast('inspection')) {
    const sentDaysAgo = isCurrent('inspection') ? p.daysInStage : 12 + Math.floor(Math.random() * 8);
    SUBMITTALS.push({
      id: `s${subSeq++}`, projectId: p.id, type: 'inspection_request', recipient: p.ahj, recipientType: 'ahj',
      sentDaysAgo, expectedResponseInDays: 7, responseDaysAgo: isPast('inspection') ? sentDaysAgo - 5 : null,
      status: isPast('inspection') ? 'responded' : (sentDaysAgo > 7 ? 'overdue' : 'pending'),
    });
  }

  // SGIP for rebate-stage projects
  if (isCurrent('rebate')) {
    SUBMITTALS.push({
      id: `s${subSeq++}`, projectId: p.id, type: 'sgip_rsse', recipient: 'SGIP PA (CSE)', recipientType: 'rebate',
      sentDaysAgo: Math.max(1, p.daysInStage - 2), expectedResponseInDays: 21, responseDaysAgo: null,
      status: 'pending',
    });
  }
});

function buildEmails(p) {
  const threads = [];
  const coord = p.coord;
  const coordEmail = `${coord.toLowerCase().replace(/\s/g,'.')}@havenenergy.com`;
  const customerEmail = `${p.name.toLowerCase().replace(/[^a-z]/g,'.')}@gmail.com`;
  const installerEmail = p.installer ? `ops@${p.installer.toLowerCase().replace(/[^a-z]/g,'')}.com` : null;

  threads.push({ id: `${p.id}-e1`, direction: 'outbound', from: `${coord} <${coordEmail}>`, to: `${p.name} <${customerEmail}>`,
    daysAgo: p.kickoffAgo, subject: `Welcome to Haven — your ${p.systemType.toLowerCase()} install at ${p.city}`,
    body: `Hi ${p.name.split(' ')[0]},\n\nGreat to have you onboard. I'm ${coord}, your install coordinator at Haven. We'll be managing your ${p.solar} kW ${p.battery ? `solar + ${p.battery} kWh battery` : 'solar'} project from kickoff through interconnection with ${p.utility}.\n\nBest,\n${coord}` });
  threads.push({ id: `${p.id}-e2`, direction: 'inbound', from: `${p.name} <${customerEmail}>`, to: `${coord} <${coordEmail}>`,
    daysAgo: p.kickoffAgo - 1, subject: `Re: Welcome to Haven`, body: `Thanks ${coord.split(' ')[0]}! Excited to get started. Mornings work best for the site survey.` });
  threads.push({ id: `${p.id}-e3`, direction: 'outbound', from: `${coord} <${coordEmail}>`, to: `${p.name} <${customerEmail}>`,
    daysAgo: p.kickoffAgo - 2, subject: `Site survey scheduled — ${p.surveyor}`,
    body: `Hi ${p.name.split(' ')[0]},\n\nYour site survey is scheduled with ${p.surveyor} for next Tuesday, 8:30-10:30am.\n\n${coord.split(' ')[0]}` });

  if (['permitting','scheduling','installation','inspection','interconnection','rebate','completed'].includes(p.stage)) {
    threads.push({ id: `${p.id}-e4`, direction: 'inbound', from: `${p.ahj} <permits@${p.ahj.toLowerCase().replace(/[^a-z]/g,'')}.gov>`, to: `Haven Permitting <permits@havenenergy.com>`,
      daysAgo: Math.max(1, p.daysInStage + 3), subject: `${p.ahj}: Permit application received`,
      body: `Confirmation from ${p.ahj}: permit application received. Expected review window 2-4 weeks.` });
  }
  if (p.slaStatus === 'breached' && p.stage === 'permitting') {
    threads.push({ id: `${p.id}-e5`, direction: 'outbound', from: `${coord} <${coordEmail}>`, to: `${p.ahj} <permits@${p.ahj.toLowerCase().replace(/[^a-z]/g,'')}.gov>`,
      daysAgo: 3, subject: `Status check: Permit for ${p.name}`,
      body: `Hi team,\n\nFollowing up on the permit submitted for ${p.name}. We're now ${p.daysInStage} days in. Any update?\n\n${coord}` });
  }
  if (p.waitingOn === 'customer') {
    threads.push({ id: `${p.id}-ecust`, direction: 'outbound', from: `${coord} <${coordEmail}>`, to: `${p.name} <${customerEmail}>`,
      daysAgo: p.customerLastReplyDaysAgo || 4,
      subject: p.stage === 'design' ? `Design ready for your approval` : p.stage === 'scheduling' ? `Confirming your install date` : `Quick question on your project`,
      body: `Hi ${p.name.split(' ')[0]},\n\n${p.stage === 'design' ? 'Attached is the design for your review. Let me know if any changes.' : p.stage === 'scheduling' ? 'Can you confirm the proposed install date works for you?' : 'Quick question when you have a moment.'}\n\nThanks,\n${coord.split(' ')[0]}` });
  }
  if (p.installer && ['scheduling','installation','inspection','interconnection','completed'].includes(p.stage)) {
    threads.push({ id: `${p.id}-e7`, direction: 'outbound', from: `${coord} <${coordEmail}>`, to: `${p.installer} <${installerEmail}>`,
      daysAgo: Math.max(1, p.daysInStage + 1), subject: `Install assignment — ${p.name}`,
      body: `Assigning the ${p.name} install to you. ${p.solar} kW solar, ${p.battery ? `${p.battery} kWh battery` : 'no battery'}, ${p.utility}.` });
    threads.push({ id: `${p.id}-e8`, direction: 'inbound', from: `${p.installer} <${installerEmail}>`, to: `${coord} <${coordEmail}>`,
      daysAgo: Math.max(0, p.daysInStage), subject: `Re: Install assignment`, body: `Got it. Crew lead Jorge.` });
  }
  return threads.sort((a, b) => b.daysAgo - a.daysAgo);
}

let viewMode = 'internal';
let currentCoord = 'Shane Brennan';
let currentView = 'pipeline';
let photoFilter = 'all';
let pipelineFilter = 'all'; // all | ready_to_advance | at_risk
let taskBatchMode = false;
let assignedInstallers = {};
let assignedCoords = {};
let completedTasks = new Set();
const main = document.getElementById('main');

function getInstaller(p) { return assignedInstallers[p.id] !== undefined ? assignedInstallers[p.id] : p.installer; }
function getCoord(p) { return assignedCoords[p.id] !== undefined ? assignedCoords[p.id] : p.coord; }

function visibleProjects() {
  if (viewMode === 'installer') return PROJECTS.filter(p => getInstaller(p) === CURRENT_INSTALLER);
  if (currentCoord === '__all__') return PROJECTS;
  return PROJECTS.filter(p => getCoord(p) === currentCoord);
}

// Which projects are "ready to advance"?
// Definition: at current stage for > 0 days, all auto-generated tasks for this stage are done, not already at end
function isReadyToAdvance(p) {
  if (p.stage === 'completed' || p.stage === 'rebate') return false;
  const stageTasks = TASKS.filter(t => t.projectId === p.id && t.stage === p.stage && t.autoGenerated);
  if (stageTasks.length === 0) return false;
  const openCount = stageTasks.filter(t => !completedTasks.has(t.id) && t.status !== 'done').length;
  return openCount === 0;
}

// Customer response overdue?
function customerSilenceDays(p) {
  if (p.waitingOn !== 'customer') return 0;
  return p.customerLastReplyDaysAgo || 0;
}

function getCoordAttentionCount(name) {
  return PROJECTS.filter(p =>
    p.stage !== 'completed' &&
    (name === '__all__' || getCoord(p) === name) &&
    p.riskLevel === 'high'
  ).length;
}

function getReadyToAdvanceCount(scope = 'current') {
  const list = scope === 'current' ? visibleProjects() : PROJECTS;
  return list.filter(p => isReadyToAdvance(p)).length;
}

];

function renderNav() {
  const nav = document.getElementById('nav');
  const items = viewMode === 'installer' ? NAV_INSTALLER : NAV_INTERNAL;
  nav.innerHTML = items.map(item => {
    if (item.group) return `<div class="nav-group-label">${item.group}</div>`;
    let countBadge = '';
    if (item.view === 'home' && viewMode === 'internal') {
      const cnt = getCoordAttentionCount(currentCoord);
      if (cnt > 0) countBadge = `<span class="count-badge">${cnt}</span>`;
    }
    return `<div class="nav-link ${currentView === item.view ? 'active' : ''}" data-view="${item.view}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">${item.icon}</svg>
      <span>${item.label}</span>${countBadge}
    </div>`;
  }).join('');
  nav.querySelectorAll('.nav-link').forEach(el => {
    el.addEventListener('click', () => {
      currentView = el.dataset.view;
      pipelineFilter = 'all';
      renderNav();
      render();
    });
  });
}

function renderCoordSelector() {
  const sel = document.getElementById('coordSelect');
  const opts = [
    `<option value="__all__">All coordinators</option>`,
    ...COORDINATORS.map(c => `<option value="${c}" ${currentCoord === c ? 'selected' : ''}>${c}</option>`)
  ];
  sel.innerHTML = opts.join('');
  sel.value = currentCoord;
  const context = document.getElementById('coordContext');
  if (currentCoord === '__all__') {
    const active = PROJECTS.filter(p => p.stage !== 'completed').length;
    context.innerHTML = `<span class="text-haven-muted">Leadership · ${active} active</span>`;
  } else {
    const count = PROJECTS.filter(p => p.stage !== 'completed' && getCoord(p) === currentCoord).length;
    const attn = getCoordAttentionCount(currentCoord);
    context.innerHTML = `<span class="text-haven-muted">${count} active${attn > 0 ? ` · <span class="text-haven-danger">${attn} at risk</span>` : ''}</span>`;
  }
}

document.getElementById('toggleInternal').addEventListener('click', () => setMode('internal'));
document.getElementById('toggleInstaller').addEventListener('click', () => setMode('installer'));
document.getElementById('coordSelect').addEventListener('change', (e) => {
  currentCoord = e.target.value;
  renderCoordSelector(); renderNav(); render();
});

function setMode(mode) {
  viewMode = mode;
  document.querySelectorAll('.view-toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  document.getElementById('coordSelector').style.display = mode === 'installer' ? 'none' : 'block';
  currentView = mode === 'installer' ? 'jobs' : 'pipeline';
  pipelineFilter = 'all';
  renderNav(); render(); closeModal();
}

function render() {
  main.innerHTML = '';
  if (viewMode === 'internal') {
    if (currentView === 'home') renderHome();
    else if (currentView === 'pipeline') renderPipeline();
    else if (currentView === 'projects') renderProjects();
    else if (currentView === 'tasks') renderTasks(false);
    else if (currentView === 'submittals') renderSubmittals();
    else if (currentView === 'post_install') renderPostInstall();
    else if (currentView === 'schedule') renderSchedule();
    else if (currentView === 'inbox') renderInbox(false);
    else if (currentView === 'photos') renderPhotos(false);
    else if (currentView === 'metrics') renderMetrics();
  } else {
    if (currentView === 'jobs') renderInstallerJobs();
    else if (currentView === 'tasks') renderTasks(true);
    else if (currentView === 'schedule') renderSchedule();
    else if (currentView === 'inbox') renderInbox(true);
    else if (currentView === 'photos') renderPhotos(true);
  }
  main.scrollTop = 0;
}


// ============================================================
// HOME — lean attention queue + response tracker + ready-to-advance
// ============================================================
function renderHome() {
  const visible = visibleProjects().filter(p => p.stage !== 'completed');
  const isLeadership = currentCoord === '__all__';
  const displayName = isLeadership ? 'Leadership' : currentCoord.split(' ')[0];

  const attention = visible.filter(p => p.riskLevel !== 'low').sort((a, b) => b.risk - a.risk);
  const readyToAdvance = visible.filter(p => isReadyToAdvance(p));
  const customerSilent = visible.filter(p => customerSilenceDays(p) >= CUSTOMER_SILENCE_WARNING);

  function primaryReason(p) {
    if (p.slaStatus === 'breached') return { text: `${p.daysOverdue}d past SLA`, tone: 'danger' };
    if (!p.nextAction) return { text: 'No next action', tone: 'danger' };
    if (p.nextActionDueInDays !== null && p.nextActionDueInDays < 0) return { text: `Action ${-p.nextActionDueInDays}d late`, tone: 'warn' };
    if (p.lastTouchedDaysAgo >= IDLE_DANGER) return { text: `Idle ${p.lastTouchedDaysAgo}d`, tone: 'warn' };
    if (p.nextActionDueInDays === 0) return { text: 'Action due today', tone: 'warn' };
    if (p.lastTouchedDaysAgo >= IDLE_WARNING) return { text: `Quiet ${p.lastTouchedDaysAgo}d`, tone: 'neutral' };
    return { text: 'Approaching SLA', tone: 'neutral' };
  }

  const attentionRow = (p) => {
    const reason = primaryReason(p);
    const toneClass = reason.tone === 'danger' ? 'text-haven-danger' : reason.tone === 'warn' ? 'text-haven-warn' : 'text-haven-muted';
    return `
      <div class="cursor-pointer hover:bg-haven-bg px-4 py-3 border-b border-haven-border flex items-center gap-4" data-project-id="${p.id}">
        <span class="risk-dot ${p.riskLevel}"></span>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2">
            <span class="font-medium truncate">${p.name}</span>
            <span class="text-xs text-haven-muted">· ${STAGE_LABELS[p.stage]}</span>
          </div>
          <div class="text-xs text-haven-muted mt-0.5 truncate">${p.nextAction || '<span class="italic text-haven-danger">No next action set</span>'}</div>
        </div>
        <div class="text-right shrink-0">
          <div class="text-sm font-medium ${toneClass}">${reason.text}</div>
          ${isLeadership ? `<div class="text-xs text-haven-muted mt-0.5">${getCoord(p).split(' ')[0]}</div>` : ''}
        </div>
      </div>`;
  };

  main.innerHTML = `
    <div class="p-6 max-w-4xl">
      <div class="mb-5">
        <h1 class="font-serif text-2xl font-bold text-haven-forest">${isLeadership ? 'Leadership home' : `Good morning, ${displayName}`}</h1>
        <p class="text-sm text-haven-muted mt-1">${visible.length} active · ${attention.length === 0 ? 'nothing flagged' : `${attention.length} need${attention.length === 1 ? 's' : ''} attention`}${readyToAdvance.length > 0 ? ` · <span class="text-haven-ok font-medium">${readyToAdvance.length} ready to advance</span>` : ''}</p>
      </div>

      ${readyToAdvance.length > 0 ? `
        <div class="card p-0 overflow-hidden mb-5" style="border-left: 4px solid #2F7A3E;">
          <div class="px-4 py-3 border-b border-haven-border flex items-center justify-between">
            <div>
              <h2 class="font-serif font-bold text-haven-ok">Ready to advance (${readyToAdvance.length})</h2>
              <div class="text-xs text-haven-muted mt-0.5">All stage tasks complete — move these forward now</div>
            </div>
            <button class="btn btn-accent text-xs">Advance all</button>
          </div>
          ${readyToAdvance.slice(0, 5).map(p => `
            <div class="cursor-pointer hover:bg-haven-bg px-4 py-3 border-b border-haven-border flex items-center gap-4" data-project-id="${p.id}">
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2">
                  <span class="font-medium truncate">${p.name}</span>
                  <span class="text-xs text-haven-muted">· in ${STAGE_LABELS[p.stage]} ${p.daysInStage}d</span>
                </div>
                <div class="text-xs text-haven-ok mt-0.5">→ ready for ${STAGE_LABELS[STAGE_ORDER[STAGE_ORDER.indexOf(p.stage) + 1]]}</div>
              </div>
              ${isLeadership ? `<div class="text-xs text-haven-muted">${getCoord(p).split(' ')[0]}</div>` : ''}
            </div>`).join('')}
        </div>
      ` : ''}

      <div class="card p-0 overflow-hidden mb-5">
        <div class="px-4 py-3 border-b border-haven-border flex items-center justify-between">
          <h2 class="font-serif font-bold text-haven-forest">Needs attention</h2>
          <span class="text-xs text-haven-muted">Sorted by risk</span>
        </div>
        ${attention.length === 0 ? '<div class="px-4 py-8 text-center text-sm text-haven-muted">All projects have next actions and recent activity.</div>' : attention.map(attentionRow).join('')}
      </div>

      ${customerSilent.length > 0 ? `
        <div class="card p-0 overflow-hidden mb-5">
          <div class="px-4 py-3 border-b border-haven-border flex items-center justify-between">
            <h2 class="font-serif font-bold text-haven-forest">Waiting on customer response</h2>
            <span class="text-xs text-haven-muted">${customerSilent.length} customers</span>
          </div>
          ${customerSilent.sort((a, b) => customerSilenceDays(b) - customerSilenceDays(a)).map(p => {
            const d = customerSilenceDays(p);
            const tone = d >= CUSTOMER_SILENCE_DANGER ? 'danger' : 'warn';
            return `
              <div class="cursor-pointer hover:bg-haven-bg px-4 py-3 border-b border-haven-border flex items-center gap-4" data-project-id="${p.id}">
                <div class="flex-1 min-w-0">
                  <div class="font-medium truncate">${p.name}</div>
                  <div class="text-xs text-haven-muted mt-0.5 truncate">In ${STAGE_LABELS[p.stage]} · ${p.nextAction || 'waiting on reply'}</div>
                </div>
                <div class="text-right shrink-0">
                  <div class="text-sm font-medium text-haven-${tone}">Silent ${d}d</div>
                  <button class="text-xs text-haven-forest hover:underline mt-0.5" onclick="event.stopPropagation(); alert('Nudge email drafted for ${p.name}')">Nudge</button>
                </div>
              </div>`;
          }).join('')}
        </div>` : ''}

      ${isLeadership ? renderCoordLoadMini() : ''}
    </div>
  `;
  attachProjectHandlers();
}

function renderCoordLoadMini() {
  const loads = COORDINATORS.map(c => {
    const their = PROJECTS.filter(p => p.stage !== 'completed' && getCoord(p) === c);
    const atRisk = their.filter(p => p.riskLevel === 'high').length;
    return { coord: c, count: their.length, atRisk };
  });
  return `
    <div class="card">
      <h3 class="font-serif font-bold text-haven-forest mb-3 text-sm">Coordinator load</h3>
      <div class="space-y-2 text-sm">
        ${loads.map(l => `
          <div class="flex items-center justify-between cursor-pointer hover:text-haven-forest" onclick="switchToCoord('${l.coord}')">
            <span class="text-haven-muted">${l.coord.split(' ')[0]}</span>
            <span class="flex items-center gap-2">
              ${l.atRisk > 0 ? `<span class="badge badge-danger">${l.atRisk}</span>` : ''}
              <span class="font-medium">${l.count}</span>
            </span>
          </div>
        `).join('')}
      </div>
    </div>`;
}

window.switchToCoord = (c) => {
  currentCoord = c;
  renderCoordSelector(); renderNav(); render();
};

function renderPipeline() {
  let active = visibleProjects().filter(p => p.stage !== 'completed');

  if (pipelineFilter === 'ready_to_advance') {
    active = active.filter(p => isReadyToAdvance(p));
  } else if (pipelineFilter === 'at_risk') {
    active = active.filter(p => p.riskLevel === 'high');
  }

  const readyCount = visibleProjects().filter(p => p.stage !== 'completed' && isReadyToAdvance(p)).length;
  const atRiskCount = visibleProjects().filter(p => p.stage !== 'completed' && p.riskLevel === 'high').length;
  const totalCount = visibleProjects().filter(p => p.stage !== 'completed').length;

  const byStage = {};
  STAGE_ORDER.forEach(s => byStage[s] = active.filter(p => p.stage === s));

  const coordLabel = currentCoord === '__all__' ? 'All coordinators' : currentCoord;

  main.innerHTML = `
    <div class="p-6">
      <div class="flex items-center justify-between mb-4 max-w-[1600px]">
        <div>
          <h1 class="font-serif text-2xl font-bold text-haven-forest">Install Pipeline</h1>
          <p class="text-sm text-haven-muted mt-1">${coordLabel}</p>
        </div>
      </div>

      <div class="flex items-center gap-2 mb-5 flex-wrap">
        <button class="filter-chip ${pipelineFilter === 'all' ? 'active' : ''}" onclick="setPipelineFilter('all')">All <span class="opacity-70 ml-1">${totalCount}</span></button>
        <button class="filter-chip ${pipelineFilter === 'ready_to_advance' ? 'active' : ''}" onclick="setPipelineFilter('ready_to_advance')" style="${pipelineFilter !== 'ready_to_advance' && readyCount > 0 ? 'border-color:#2F7A3E;color:#2F7A3E;' : ''}">✓ Ready to advance <span class="opacity-70 ml-1">${readyCount}</span></button>
        <button class="filter-chip ${pipelineFilter === 'at_risk' ? 'active' : ''}" onclick="setPipelineFilter('at_risk')" style="${pipelineFilter !== 'at_risk' && atRiskCount > 0 ? 'border-color:#C44545;color:#C44545;' : ''}">⚠ At risk <span class="opacity-70 ml-1">${atRiskCount}</span></button>
      </div>

      <div class="overflow-x-auto pb-4">
        <div class="grid gap-3 min-w-[1400px]" style="grid-template-columns: repeat(8, minmax(0, 1fr));">
          ${STAGE_ORDER.map(stage => `
            <div class="flex flex-col min-h-[60vh]">
              <div class="flex items-center justify-between px-2 pb-2 border-b-2 border-haven-forest mb-2">
                <div class="font-serif font-bold text-sm text-haven-forest">${STAGE_LABELS[stage]}</div>
                <div class="text-xs text-haven-muted">${byStage[stage].length}</div>
              </div>
              <div class="space-y-2 flex-1">
                ${byStage[stage].length === 0 ? '<div class="text-xs text-haven-muted text-center py-6 border border-dashed border-haven-border rounded-md">None</div>' : byStage[stage].sort((a,b)=>b.risk - a.risk).map(p => pipelineCard(p)).join('')}
              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>
  `;
  attachProjectHandlers();
}

window.setPipelineFilter = (f) => { pipelineFilter = f; render(); };

function pipelineCard(p) {
  const ready = isReadyToAdvance(p);
  const borderClass = ready ? 'border-l-4 border-l-haven-ok'
    : p.slaStatus === 'breached' ? 'border-l-4 border-l-haven-danger'
    : p.slaStatus === 'approaching' ? 'border-l-4 border-l-haven-warn'
    : !p.nextAction ? 'border-l-4 border-l-haven-warn' : '';
  const coord = getCoord(p);
  const showCoord = currentCoord === '__all__';

  let reason = '';
  if (ready) reason = `<span class="text-haven-ok font-medium">✓ Ready to advance</span>`;
  else if (p.slaStatus === 'breached') reason = `<span class="text-haven-danger font-medium">${p.daysOverdue}d past SLA</span>`;
  else if (!p.nextAction) reason = `<span class="text-haven-warn font-medium">No next action</span>`;
  else if (p.nextActionDueInDays !== null && p.nextActionDueInDays < 0) reason = `<span class="text-haven-warn font-medium">Action ${-p.nextActionDueInDays}d late</span>`;
  else if (p.lastTouchedDaysAgo >= IDLE_DANGER) reason = `<span class="text-haven-warn">Idle ${p.lastTouchedDaysAgo}d</span>`;

  return `
    <div data-project-id="${p.id}" class="card hover-lift cursor-pointer p-3 ${borderClass}">
      <div class="flex items-start justify-between gap-1">
        <div class="font-medium text-sm truncate min-w-0">${p.name}</div>
        ${showCoord ? avatar(coord, 18) : ''}
      </div>
      <div class="text-xs text-haven-muted truncate mt-0.5">${p.city}, ${p.state}</div>
      ${reason ? `<div class="text-xs mt-2">${reason}</div>` : ''}
      ${p.nextAction && !ready ? `<div class="text-[11px] text-haven-muted mt-2 pt-2 border-t border-haven-border truncate">${p.nextAction}</div>` : ''}
    </div>`;
}

        <td class="px-3 py-2.5 text-xs ${p.lastTouchedDaysAgo >= IDLE_DANGER ? 'text-haven-warn font-medium' : 'text-haven-muted'}">${p.lastTouchedDaysAgo}d ago</td>

      </div>
      <div class="card p-0 overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-haven-bg border-b border-haven-border">
            <tr class="text-left text-xs text-haven-muted uppercase tracking-wide">
              <th class="px-3 py-2.5">Risk</th><th class="px-3 py-2.5">#</th><th class="px-3 py-2.5">Customer</th>
              <th class="px-3 py-2.5">Location</th><th class="px-3 py-2.5">Stage</th><th class="px-3 py-2.5">Coord</th>
              <th class="px-3 py-2.5">Installer</th><th class="px-3 py-2.5">Status</th><th class="px-3 py-2.5">Next action</th><th class="px-3 py-2.5">Last touched</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
  attachProjectHandlers();
}


// ============================================================
// TASKS — with batch mode grouping
// ============================================================
function renderTasks(installerOnly) {
  const visible = visibleProjects();
  const visibleIds = new Set(visible.map(p => p.id));
  let tasks = TASKS.filter(t => visibleIds.has(t.projectId) && (installerOnly ? t.ownerType === 'installer' : t.ownerType === 'internal'));

  const overdueCount = tasks.filter(t => t.dueInDays < 0 && t.status !== 'done' && !completedTasks.has(t.id)).length;
  const dueTodayCount = tasks.filter(t => t.dueInDays === 0 && t.status !== 'done' && !completedTasks.has(t.id)).length;
  const thisWeekCount = tasks.filter(t => t.dueInDays > 0 && t.dueInDays <= 7 && t.status !== 'done' && !completedTasks.has(t.id)).length;

  // Batch mode: group tasks by normalized title (same action across many projects)
  let bodyHtml;
  if (taskBatchMode && !installerOnly) {
    const groups = {};
    tasks.filter(t => t.status !== 'done' && !completedTasks.has(t.id)).forEach(t => {
      const key = t.title.toLowerCase().replace(/[#0-9].*/g, '').replace(/[^a-z ]/g, '').trim();

function renderSchedule() {
  // Demo: synthesize crew schedule. Each installer has 2-3 crews; each crew has a project per day or is free.
  const DAYS = 14;
  const today = new Date();
  const dayLabels = [];
  for (let i = 0; i < DAYS; i++) {
    const d = new Date(today); d.setDate(d.getDate() + i);
    dayLabels.push({ date: d, label: `${d.toLocaleDateString('en-US', {weekday: 'short'})} ${d.getMonth()+1}/${d.getDate()}`, isWeekend: d.getDay() === 0 || d.getDay() === 6 });
  }

  const installersToShow = viewMode === 'installer' ? [CURRENT_INSTALLER] : INSTALLERS;

  // For each installer, figure out their active projects in installation/scheduling stages and place them
  const schedule = {};
  installersToShow.forEach(inst => {
    const theirProjects = PROJECTS.filter(p => getInstaller(p) === inst && ['scheduling','installation','inspection'].includes(p.stage));
    schedule[inst] = { crews: {}, projects: theirProjects };
    // 2 crews per installer
    const crewCount = 2;
    for (let c = 0; c < crewCount; c++) {
      schedule[inst].crews[`Crew ${String.fromCharCode(65+c)}`] = new Array(DAYS).fill(null);
    }
    // Place projects: installation stage = today + some offset, scheduling stage = further out
    theirProjects.forEach((p, idx) => {
      const crew = Object.keys(schedule[inst].crews)[idx % crewCount];
      const dayOffset = p.stage === 'installation' ? (idx % 2) : p.stage === 'scheduling' ? 3 + (idx % 8) : 7 + (idx % 5);
      if (dayOffset < DAYS && !dayLabels[dayOffset].isWeekend) {
        schedule[inst].crews[crew][dayOffset] = p;
      }
    });
  });

  main.innerHTML = `
    <div class="p-6">
      <div class="mb-5">
        <h1 class="font-serif text-2xl font-bold text-haven-forest">Install Schedule</h1>
        <p class="text-sm text-haven-muted mt-1">Next ${DAYS} days · ${viewMode === 'installer' ? CURRENT_INSTALLER : 'all installers'}</p>
      </div>

      <div class="card p-0 overflow-x-auto">
        <table class="w-full border-collapse">
          <thead>
            <tr class="border-b border-haven-border">
              <th class="text-left p-3 text-xs uppercase text-haven-muted sticky left-0 bg-white min-w-[160px]">Installer / Crew</th>
              ${dayLabels.map(d => `<th class="p-2 text-xs ${d.isWeekend ? 'bg-haven-bg text-haven-muted' : 'text-haven-muted'} min-w-[100px]">${d.label}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${installersToShow.map(inst => Object.entries(schedule[inst].crews).map(([crew, days], ci) => `
              <tr class="border-b border-haven-border">
                <td class="p-3 text-sm sticky left-0 bg-white">
                  ${ci === 0 ? `<div class="font-medium text-haven-forest">${inst}</div>` : ''}
                  <div class="text-xs text-haven-muted">${crew}</div>
                </td>
                ${days.map((proj, di) => `
                  <td class="p-1 ${dayLabels[di].isWeekend ? 'bg-haven-bg' : ''}">
                    ${proj ? `
                      <div class="p-1.5 rounded text-xs cursor-pointer hover-lift" style="background: rgba(1, 51, 0, 0.08); border-left: 3px solid #013300;" data-project-id="${proj.id}">
                        <div class="font-medium truncate">${proj.name.split(' ')[0]}</div>
                        <div class="text-[10px] text-haven-muted truncate">${STAGE_LABELS[proj.stage]}</div>
                      </div>` : ''}
                  </td>`).join('')}
              </tr>
            `).join('')).join('')}
          </tbody>
        </table>
      </div>

      <div class="mt-4 text-xs text-haven-muted">Drag projects between crews and days to reschedule (not wired in demo).</div>
    </div>
  `;
  attachProjectHandlers();
}

// ============================================================
// INBOX
// ============================================================
let inboxSearch = '';
let inboxFilter = 'all'; // all | needs_reply | customer_silent | unread
let inboxExpanded = new Set(); // project ids with expanded threads
let inboxRead = new Set(); // project ids marked read

function classifyThread(project, messages) {
  // Most recent message direction + age determines status
  const sorted = [...messages].sort((a, b) => a.daysAgo - b.daysAgo);
  const latest = sorted[0];
  const isInboundLatest = latest.direction === 'inbound';

  // Auto-confirmation noise: AHJ "received your application" and similar
  const isAuto = latest.subject.toLowerCase().includes('received') ||
                 latest.subject.toLowerCase().includes('confirmation') && latest.from.includes('.gov');

  // Does customer owe us a reply?
  const lastOutboundToCustomer = sorted.find(m => m.direction === 'outbound' && m.to && m.to.includes('@gmail.com'));
  const laterInboundFromCustomer = lastOutboundToCustomer && sorted.find(m =>
    m.direction === 'inbound' && m.from && m.from.includes('@gmail.com') && m.daysAgo < lastOutboundToCustomer.daysAgo
  );
  const customerSilent = lastOutboundToCustomer && !laterInboundFromCustomer && lastOutboundToCustomer.daysAgo >= 3;
  const customerSilentDays = customerSilent ? lastOutboundToCustomer.daysAgo : 0;

  // Needs reply: most recent message is inbound from a human (not auto) and not yet responded
  const needsReply = isInboundLatest && !isAuto;

  return { needsReply, customerSilent, customerSilentDays, isAuto, latest, count: messages.length };
}

function renderInbox(installerOnly) {
  const visible = visibleProjects();

  // Build threads: one per project
  const threads = [];
  visible.forEach(p => {
    if (installerOnly && p.installer !== CURRENT_INSTALLER) return;
    const messages = buildEmails(p);
    if (messages.length === 0) return;
    const meta = classifyThread(p, messages);
    threads.push({ project: p, messages, ...meta });
  });

  // Search
  const q = inboxSearch.trim().toLowerCase();
  let filtered = threads;
  if (q) {
    filtered = filtered.filter(t =>
      t.project.name.toLowerCase().includes(q) ||
      t.project.city.toLowerCase().includes(q) ||
      t.project.projectNumber.toLowerCase().includes(q) ||
      t.messages.some(m =>
        m.subject.toLowerCase().includes(q) ||
        m.body.toLowerCase().includes(q) ||
        m.from.toLowerCase().includes(q) ||
        (m.to || '').toLowerCase().includes(q)
      )
    );
  }

  // Filter
  if (inboxFilter === 'needs_reply') filtered = filtered.filter(t => t.needsReply);
  else if (inboxFilter === 'customer_silent') filtered = filtered.filter(t => t.customerSilent);
  else if (inboxFilter === 'unread') filtered = filtered.filter(t => !inboxRead.has(t.project.id));

  // Sort: needs-reply first, then customer-silent, then by recency
  filtered.sort((a, b) => {
    const score = (t) => (t.needsReply ? 0 : 10) + (t.customerSilent ? 0 : 5) + (t.latest.daysAgo / 100);
    return score(a) - score(b);
  });

  // Counts for filter chips
  const allCount = threads.length;
  const needsReplyCount = threads.filter(t => t.needsReply).length;
  const customerSilentCount = threads.filter(t => t.customerSilent).length;
  const unreadCount = threads.filter(t => !inboxRead.has(t.project.id)).length;

  const chip = (key, label, count, tone) => `
    <button class="filter-chip ${inboxFilter === key ? 'active' : ''}" onclick="setInboxFilter('${key}')"
      ${inboxFilter !== key && tone === 'danger' && count > 0 ? 'style="border-color:#C44545;color:#C44545;"' : ''}
      ${inboxFilter !== key && tone === 'warn' && count > 0 ? 'style="border-color:#E0A83A;color:#E0A83A;"' : ''}>
      ${label} <span class="opacity-70 ml-1">${count}</span>
    </button>`;

  // Highlight search matches in a string
  const hl = (s) => {
    if (!q) return s;
    const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'ig');
    return s.replace(re, '<mark style="background:#C5E84A; color:#013300; padding:0 2px; border-radius:2px;">$1</mark>');
  };

  const threadRow = (t) => {
    const p = t.project;
    const isExpanded = inboxExpanded.has(p.id);
    const isRead = inboxRead.has(p.id);
    const latestWho = t.latest.direction === 'inbound'
      ? t.latest.from.split('<')[0].trim()
      : 'You to ' + (t.latest.to ? t.latest.to.split('<')[0].trim() : 'recipient');

    // Status badge
    let statusBadge = '';
    if (t.needsReply) statusBadge = `<span class="badge badge-danger">Needs reply</span>`;
    else if (t.customerSilent) statusBadge = `<span class="badge badge-warn">Silent ${t.customerSilentDays}d</span>`;
    else if (t.isAuto) statusBadge = `<span class="badge badge-neutral">Auto</span>`;

    const unreadDot = !isRead ? `<span class="w-2 h-2 rounded-full bg-haven-forest shrink-0" style="margin-top:6px"></span>` : `<span class="w-2 h-2 shrink-0"></span>`;

    return `
      <div class="border-b border-haven-border ${!isRead ? 'bg-white' : 'bg-haven-bg/50'}">

// ============================================================
// POST-INSTALL TRACKING
// ============================================================
// A post-install record exists for every project that has been installed.
// Tracks: inspection, PTO submitted, PTO complete, ICF complete milestones,
// plus who the project is currently waiting on ("ball in court")

const BALL_IN_COURT_GROUPS = {
  utility: { label: 'Utility', color: '#3A6EA8',
    reasons: ['PTO Submitted', 'Clarification', 'Transformer Upgrade', 'Pending pre-approval'] },
  franklin_sce: { label: 'Franklin/SCE', color: '#E07A3A',
    reasons: ['SOO'] },
  customer: { label: 'Customer', color: '#D84A7A',
    reasons: ['Customer Signature', 'Escalation'] },
  interconnection: { label: 'Interconnection', color: '#7AC74F',
    reasons: ['GIPT Delay', 'Ready to Submit', 'Utility Clarification'] },
  installer: { label: 'Installer', color: '#3BBF9E',
    reasons: ['Missing Photo'] },
};

// Seed synthetic historical installs so we have 12 months of data for the cohort view.
// These simulate projects that have been installed at various points over the last year.
function buildPostInstallRecords() {
  const records = [];
  // Use a fixed seed so demo data is stable across renders
  let seed = 42;
  const rand = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };

  const months = [
    { label: 'Apr 2025', total: 24 }, { label: 'May 2025', total: 39 },
    { label: 'Jun 2025', total: 48 }, { label: 'Jul 2025', total: 52 },
    { label: 'Aug 2025', total: 59 }, { label: 'Sep 2025', total: 68 },
    { label: 'Oct 2025', total: 82 }, { label: 'Nov 2025', total: 77 },
    { label: 'Dec 2025', total: 82 }, { label: 'Jan 2026', total: 107 },
    { label: 'Feb 2026', total: 95 }, { label: 'Mar 2026', total: 13 },
  ];

  let recId = 1;
  months.forEach((m, monthIdx) => {
    // Older cohorts are further along; newer cohorts are mostly still in flight
    const ageMonths = months.length - 1 - monthIdx;
    for (let i = 0; i < m.total; i++) {
      // Completion probabilities decay with recency
      const inspectionComplete = rand() < Math.min(0.97, 0.55 + ageMonths * 0.08);
      const ptoSubmitted = inspectionComplete && rand() < Math.min(0.97, 0.60 + ageMonths * 0.07);
      const ptoComplete = ptoSubmitted && rand() < Math.min(0.95, 0.35 + ageMonths * 0.10);
      const icfComplete = ptoComplete && rand() < Math.min(0.95, 0.10 + ageMonths * 0.10);

      // Pick a "ball in court" reason if not fully complete
      let ballInCourt = null;
      if (!icfComplete) {
        // Newer cohorts mostly waiting on utility (PTO); older stragglers more varied
        if (!ptoSubmitted) {
          const r = rand();
          if (r < 0.6) ballInCourt = { group: 'interconnection', reason: 'Ready to Submit', daysInHold: Math.floor(rand() * 45) + 3 };
          else if (r < 0.85) ballInCourt = { group: 'installer', reason: 'Missing Photo', daysInHold: Math.floor(rand() * 50) + 5 };
          else ballInCourt = { group: 'customer', reason: 'Customer Signature', daysInHold: Math.floor(rand() * 30) + 2 };
        } else if (!ptoComplete) {
          const r = rand();
          if (r < 0.75) ballInCourt = { group: 'utility', reason: 'PTO Submitted', daysInHold: Math.floor(rand() * 60) + 10 };
          else if (r < 0.82) ballInCourt = { group: 'utility', reason: 'Clarification', daysInHold: Math.floor(rand() * 80) + 20 };
          else if (r < 0.85) ballInCourt = { group: 'utility', reason: 'Transformer Upgrade', daysInHold: Math.floor(rand() * 180) + 60 };
          else if (r < 0.87) ballInCourt = { group: 'utility', reason: 'Pending pre-approval', daysInHold: Math.floor(rand() * 10) + 1 };
          else if (r < 0.97) ballInCourt = { group: 'franklin_sce', reason: 'SOO', daysInHold: Math.floor(rand() * 50) + 10 };
          else ballInCourt = { group: 'customer', reason: 'Escalation', daysInHold: Math.floor(rand() * 140) + 40 };
        } else if (!icfComplete) {
          const r = rand();
          if (r < 0.6) ballInCourt = { group: 'interconnection', reason: 'GIPT Delay', daysInHold: Math.floor(rand() * 15) + 1 };
          else if (r < 0.85) ballInCourt = { group: 'interconnection', reason: 'Utility Clarification', daysInHold: Math.floor(rand() * 20) + 3 };
          else ballInCourt = { group: 'customer', reason: 'Customer Signature', daysInHold: Math.floor(rand() * 25) + 2 };
        }
      }

      // Synthesize a customer name and coordinator for drill-through
      const firstNames = ['Alex','Jordan','Sam','Morgan','Casey','Taylor','Riley','Jamie','Chris','Pat','Drew','Blake','Hayden','Quinn','Avery','Reese','Sage','River','Parker','Rowan'];
      const lastNames = ['Rivera','Chen','Park','Singh','Walsh','Cohen','Nakamura','Hassan','Okafor','Volkov','Andersson','Silva','Kim','Nguyen','Dubois','Rossi','Fischer','Lopez','Brennan','Yamada'];
      const cities = ['San Jose','Oakland','Fremont','Berkeley','Sunnyvale','San Mateo','Hayward','Mountain View','Redwood City','Pasadena','Long Beach','Irvine','San Diego','Pacifica','Half Moon Bay'];
      const utilities = ['PG&E','SCE','SDG&E','PCE'];
      const name = `${firstNames[Math.floor(rand() * firstNames.length)]} ${lastNames[Math.floor(rand() * lastNames.length)]}`;
      const coord = COORDINATORS[Math.floor(rand() * COORDINATORS.length)];
      const installer = INSTALLERS[Math.floor(rand() * INSTALLERS.length)];
      const utility = utilities[Math.floor(rand() * utilities.length)];
      const city = cities[Math.floor(rand() * cities.length)];
      const installDaysAgo = ageMonths * 30 + Math.floor(rand() * 28);

      records.push({
        id: `pi${recId++}`,
        projectNumber: `HVN-2025-${String(recId).padStart(4, '0')}`,
        name, coord, installer, utility, city,
        installMonth: m.label, installDaysAgo,
        inspectionComplete, ptoSubmitted, ptoComplete, icfComplete,
        ballInCourt,
      });
    }
  });
  return { records, months };
}

const POST_INSTALL = buildPostInstallRecords();

// ============================================================
// METRICS SUBCOMPONENTS
// ============================================================
let ballInCourtFilter = 'all'; // all | inspection | interconnection
let expandedBICGroups = new Set(['utility']); // which groups are expanded

function renderBallInCourt() {
  const recs = POST_INSTALL.records.filter(r => {
    if (r.icfComplete) return false;
    if (!r.ballInCourt) return false;
    if (ballInCourtFilter === 'all') return true;
    if (ballInCourtFilter === 'inspection') return !r.inspectionComplete;
    if (ballInCourtFilter === 'interconnection') return r.inspectionComplete && !r.ptoComplete;
    return true;
  });

  const totalActivePostInstall = POST_INSTALL.records.filter(r => !r.icfComplete && r.ballInCourt).length;
  const inInspection = POST_INSTALL.records.filter(r => !r.icfComplete && r.ballInCourt && !r.inspectionComplete).length;
  const inInterconnection = POST_INSTALL.records.filter(r => !r.icfComplete && r.ballInCourt && r.inspectionComplete && !r.ptoComplete).length;
  const externalHolds = POST_INSTALL.records.filter(r => !r.icfComplete && r.ballInCourt && ['utility','franklin_sce','customer'].includes(r.ballInCourt.group)).length;

  // Group records by BIC group, then by reason within group
  const byGroup = {};
  Object.keys(BALL_IN_COURT_GROUPS).forEach(g => byGroup[g] = { count: 0, reasons: {} });
  recs.forEach(r => {
    const g = r.ballInCourt.group;
    if (!byGroup[g]) return;
    byGroup[g].count++;
    const reason = r.ballInCourt.reason;
    if (!byGroup[g].reasons[reason]) byGroup[g].reasons[reason] = { count: 0, totalDays: 0 };
    byGroup[g].reasons[reason].count++;
    byGroup[g].reasons[reason].totalDays += r.ballInCourt.daysInHold;
  });

  // Group-level avg days (weighted)
  Object.keys(byGroup).forEach(g => {
    const reasons = byGroup[g].reasons;
    let totalCount = 0, totalDays = 0;
    Object.values(reasons).forEach(r => { totalCount += r.count; totalDays += r.totalDays; });
    byGroup[g].avgDays = totalCount ? Math.round(totalDays / totalCount) : 0;
  });

  const maxGroupCount = Math.max(1, ...Object.values(byGroup).map(g => g.count));
  const totalActive = recs.length || 1;

  const dayColorClass = (d) => d >= 30 ? 'text-haven-danger' : d >= 14 ? 'text-haven-warn' : 'text-haven-muted';

  const filterBtn = (key, label) => `<button class="filter-chip ${ballInCourtFilter === key ? 'active' : ''}" onclick="setBICFilter('${key}')">${label}</button>`;

  const kpi = (n, label) => `
    <div class="card px-4 py-3" style="background:#1a1f1a; color:white; border-color:#2a2f2a;">
      <div class="font-serif font-bold text-3xl">${n}</div>
      <div class="text-[10px] uppercase tracking-wider text-white/60 mt-1">${label}</div>
    </div>`;

  return `
    <div class="card mb-6" style="background: #12161a; color: white; border-color: #1f2428;">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h2 class="font-serif font-bold text-xl text-white">Post-Install Tracking</h2>
          <p class="text-sm mt-1" style="color:#8a9098;">Projects awaiting inspection, PTO, and ICF</p>
        </div>
      </div>

      <div class="grid grid-cols-4 gap-3 mb-5">
        ${kpi(POST_INSTALL.records.length, 'Total Installs')}
        ${kpi(inInspection, 'Inspection')}
        ${kpi(inInterconnection, 'Interconnection')}
        ${kpi(externalHolds, 'External Holds')}
      </div>

      <div class="flex items-center justify-between mb-3 pt-4" style="border-top: 1px solid #1f2428;">
        <div>
          <div class="text-xs uppercase tracking-wider" style="color:#8a9098;">Ball in court</div>
          <div class="text-sm mt-0.5" style="color:#c4c8cc;">Who is holding up the pipeline right now</div>
        </div>
        <div class="flex gap-2">
          <button class="filter-chip ${ballInCourtFilter === 'all' ? 'active' : ''}" style="${ballInCourtFilter !== 'all' ? 'background:transparent;color:#c4c8cc;border-color:#2a2f2a;' : ''}" onclick="setBICFilter('all')">All</button>
          <button class="filter-chip ${ballInCourtFilter === 'inspection' ? 'active' : ''}" style="${ballInCourtFilter !== 'inspection' ? 'background:transparent;color:#c4c8cc;border-color:#2a2f2a;' : ''}" onclick="setBICFilter('inspection')">Inspection</button>
          <button class="filter-chip ${ballInCourtFilter === 'interconnection' ? 'active' : ''}" style="${ballInCourtFilter !== 'interconnection' ? 'background:transparent;color:#c4c8cc;border-color:#2a2f2a;' : ''}" onclick="setBICFilter('interconnection')">Interconnection</button>
        </div>
      </div>

      <div class="grid grid-cols-[1fr_auto_auto] gap-x-4 text-xs mb-2" style="color:#8a9098;">
        <div></div>
        <div class="text-right">COUNT / %</div>
        <div class="text-right min-w-[60px]">AVG DAYS</div>
      </div>

      <div class="space-y-1">
        ${Object.entries(BALL_IN_COURT_GROUPS).map(([key, cfg]) => {
          const g = byGroup[key];
          if (g.count === 0) return '';
          const pct = Math.round((g.count / totalActive) * 100);
          const barPct = (g.count / maxGroupCount) * 100;
          const isExpanded = expandedBICGroups.has(key);
          return `
            <div>
              <div class="grid grid-cols-[1fr_auto_auto] gap-x-4 items-center py-2 cursor-pointer" onclick="toggleBICGroup('${key}')" style="border-top: 1px solid #1f2428;">
                <div class="flex items-center gap-3">
                  <div class="font-semibold text-white w-32">${cfg.label}</div>
                  <div class="flex-1 h-2.5 rounded-full" style="background: #1f2428;">
                    <div class="h-full rounded-full transition-all" style="width:${barPct}%; background:${cfg.color};"></div>
                  </div>
                </div>
                <div class="text-right tabular-nums" style="color:#c4c8cc;">
                  <span class="font-semibold text-white">${g.count}</span> <span style="color:#8a9098;">${pct}%</span>
                </div>
                <div class="text-right min-w-[60px] ${dayColorClass(g.avgDays)} font-semibold tabular-nums">
                  ${g.avgDays}d <span style="color:#5a6068;">${isExpanded ? '▲' : '▼'}</span>
                </div>
              </div>
              ${isExpanded ? Object.entries(g.reasons).sort((a,b) => b[1].count - a[1].count).map(([reason, r]) => {
                const reasonPct = Math.round((r.count / g.count) * 100);
                const avgD = Math.round(r.totalDays / r.count);
                const reasonBarPct = (r.count / g.count) * 100;
                return `
                  <div class="grid grid-cols-[1fr_auto_auto] gap-x-4 items-center py-1.5 pl-8 text-sm" style="color:#c4c8cc;">
                    <div class="flex items-center gap-3">
                      <div class="w-24" style="color:#c4c8cc;">${reason}</div>
                      <div class="flex-1 h-1.5 rounded-full" style="background: #1f2428;">
                        <div class="h-full rounded-full" style="width:${reasonBarPct}%; background:${cfg.color}; opacity:0.7;"></div>
                      </div>
                    </div>
                    <div class="text-right tabular-nums"><span class="font-semibold text-white">${r.count}</span> <span style="color:#8a9098;">${reasonPct}%</span></div>
                    <div class="text-right min-w-[60px] ${dayColorClass(avgD)} font-semibold tabular-nums">${avgD}d</div>
                  </div>`;
              }).join('') : ''}
            </div>`;
        }).join('')}
      </div>

      <div class="mt-4 pt-3 text-xs" style="color:#8a9098; border-top: 1px solid #1f2428;">
        Avg days: <span style="color:#E0A83A;">■</span> 14–29 days &nbsp; <span style="color:#C44545;">■</span> 30+ days
      </div>
    </div>
  `;
}

function renderInstallsByMonth() {
  const rows = POST_INSTALL.months.slice().reverse().map(m => {
    const cohort = POST_INSTALL.records.filter(r => r.installMonth === m.label);
    const total = cohort.length;
    const inspection = cohort.filter(r => r.inspectionComplete).length;
    const ptoSub = cohort.filter(r => r.ptoSubmitted).length;
    const ptoDone = cohort.filter(r => r.ptoComplete).length;
    const icfDone = cohort.filter(r => r.icfComplete).length;
    const icfPending = total - icfDone;
    const pct = total ? Math.round((icfDone / total) * 100) : 0;
    return { month: m.label, total, inspection, ptoSub, ptoDone, icfDone, icfPending, pct };
  });

  return `
    <div class="card mb-6" style="background: #0e1418; color: white; border-color: #1a2128;">
      <div class="flex items-center gap-2 mb-1">
        <div class="text-cyan-400">📅</div>
        <h2 class="font-serif font-bold text-xl text-cyan-300">Installs by Month</h2>
      </div>
      <p class="text-sm mb-4" style="color:#8a9098;">Total installs per month with completion status for each milestone</p>
      <div class="overflow-x-auto">

let postInstallMilestoneFilter = 'all'; // all | no_inspection | no_pto_submitted | no_pto | no_icf
let postInstallSearch = '';

function renderPostInstall() {
  let recs = POST_INSTALL.records.filter(r => !r.icfComplete);

  if (postInstallMilestoneFilter === 'no_inspection') recs = recs.filter(r => !r.inspectionComplete);
  else if (postInstallMilestoneFilter === 'no_pto_submitted') recs = recs.filter(r => r.inspectionComplete && !r.ptoSubmitted);
  else if (postInstallMilestoneFilter === 'no_pto') recs = recs.filter(r => r.ptoSubmitted && !r.ptoComplete);
  else if (postInstallMilestoneFilter === 'no_icf') recs = recs.filter(r => r.ptoComplete && !r.icfComplete);

  if (postInstallSearch) {
    const q = postInstallSearch.toLowerCase();
    recs = recs.filter(r => r.name.toLowerCase().includes(q) || r.city.toLowerCase().includes(q) || r.projectNumber.toLowerCase().includes(q));
  }

  // Sort: longest in hold first
  recs.sort((a, b) => (b.ballInCourt?.daysInHold || 0) - (a.ballInCourt?.daysInHold || 0));

  const allPostInstall = POST_INSTALL.records.filter(r => !r.icfComplete);
  const counts = {
    all: allPostInstall.length,
    no_inspection: allPostInstall.filter(r => !r.inspectionComplete).length,
    no_pto_submitted: allPostInstall.filter(r => r.inspectionComplete && !r.ptoSubmitted).length,
    no_pto: allPostInstall.filter(r => r.ptoSubmitted && !r.ptoComplete).length,
    no_icf: allPostInstall.filter(r => r.ptoComplete && !r.icfComplete).length,
  };

  const mcell = (done) => done
    ? '<div class="w-6 h-6 rounded-full flex items-center justify-center" style="background:#2F7A3E; color:white; font-size:12px;">✓</div>'
    : '<div class="w-6 h-6 rounded-full border-2 border-haven-border bg-white"></div>';

  const chip = (key, label, count) => `
    <button class="filter-chip ${postInstallMilestoneFilter === key ? 'active' : ''}" onclick="setPIFilter('${key}')">
      ${label} <span class="opacity-70 ml-1">${count}</span>
    </button>`;

  main.innerHTML = `
    <div class="p-6 max-w-[1400px]">
      <div class="mb-5">
        <h1 class="font-serif text-2xl font-bold text-haven-forest">Post-Install</h1>
        <p class="text-sm text-haven-muted mt-1">Every project that's been installed and its milestone status · ${recs.length} shown</p>
      </div>

      <div class="flex items-center gap-2 mb-4 flex-wrap">
        ${chip('all', 'All open', counts.all)}
        ${chip('no_inspection', 'No inspection', counts.no_inspection)}
        ${chip('no_pto_submitted', 'No PTO submitted', counts.no_pto_submitted)}
        ${chip('no_pto', 'No PTO', counts.no_pto)}
        ${chip('no_icf', 'No ICF', counts.no_icf)}
        <div class="flex-1"></div>
        <input type="text" id="piSearch" placeholder="Search name, city, project #…" value="${postInstallSearch}" class="px-3 py-1.5 border border-haven-border rounded-md text-sm bg-white w-64" />
      </div>

      <div class="card p-0 overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-haven-bg border-b border-haven-border">
            <tr class="text-left text-xs text-haven-muted uppercase tracking-wide">
              <th class="px-3 py-2.5">Project</th>
              <th class="px-3 py-2.5">Location</th>
              <th class="px-3 py-2.5">Utility</th>
              <th class="px-3 py-2.5">Coord</th>
              <th class="px-3 py-2.5">Installed</th>
              <th class="px-3 py-2.5 text-center">Inspection</th>
              <th class="px-3 py-2.5 text-center">PTO Sub</th>
              <th class="px-3 py-2.5 text-center">PTO Done</th>
              <th class="px-3 py-2.5 text-center">ICF</th>
              <th class="px-3 py-2.5">Waiting on</th>
              <th class="px-3 py-2.5">Days in hold</th>
            </tr>
          </thead>
          <tbody>
            ${recs.length === 0 ? '<tr><td colspan="11" class="px-4 py-8 text-center text-haven-muted">No projects match</td></tr>' : recs.slice(0, 100).map(r => {
              const bic = r.ballInCourt;
              const bicGroup = bic ? BALL_IN_COURT_GROUPS[bic.group] : null;
              const d = bic?.daysInHold || 0;
              const dayClass = d >= 30 ? 'text-haven-danger font-medium' : d >= 14 ? 'text-haven-warn font-medium' : 'text-haven-muted';
              return `
                <tr class="border-b border-haven-border hover:bg-haven-bg">
                  <td class="px-3 py-2.5">
                    <div class="font-medium text-haven-forest">${r.name}</div>
                    <div class="text-[11px] text-haven-muted">${r.projectNumber}</div>
                  </td>
                  <td class="px-3 py-2.5 text-haven-muted">${r.city}</td>

                  <td class="px-3 py-2.5">${avatar(r.coord, 18)} <span class="text-xs ml-1 align-middle">${r.coord.split(' ')[0]}</span></td>
                  <td class="px-3 py-2.5 text-xs text-haven-muted">${r.installDaysAgo}d ago</td>
                  <td class="px-3 py-2.5"><div class="flex justify-center">${mcell(r.inspectionComplete)}</div></td>
                  <td class="px-3 py-2.5"><div class="flex justify-center">${mcell(r.ptoSubmitted)}</div></td>

  `;

  const s = document.getElementById('piSearch');
  if (s) {
    s.addEventListener('input', (e) => { postInstallSearch = e.target.value; render(); setTimeout(() => { const el = document.getElementById('piSearch'); if (el) { el.focus(); el.setSelectionRange(el.value.length, el.value.length); } }, 0); });
  }
}

// ============================================================
// METRICS — cycle time + post-install + coordinator load
// ============================================================
function renderMetrics() {
  const active = PROJECTS.filter(p => p.stage !== 'completed');
  const completed = PROJECTS.filter(p => p.stage === 'completed');
  const overdue = active.filter(p => p.slaStatus === 'breached');
  const avgCycle = completed.length ? Math.round(completed.reduce((a, p) => a + (p.cycleDays || 0), 0) / completed.length) : 0;
  const atRisk = active.filter(p => p.riskLevel === 'high');
  const noAction = active.filter(p => !p.nextAction);

  // Stage averages (demo data)
  const stageAvgs = STAGE_ORDER.map(stage => {
    const durations = COMPLETED_STAGE_DURATIONS[stage] || [];
    const avg = durations.length ? Math.round(durations.reduce((a,b)=>a+b,0) / durations.length) : 0;
    const target = STAGE_TARGETS_CA[stage];
    return { stage, avg, target, variance: avg - target };
  });
  const totalCycle = stageAvgs.reduce((a, s) => a + s.avg, 0);
  const handoffSum = COMPLETED_STAGE_DURATIONS.handoff_gaps.reduce((a, b) => a + b, 0);

  // Post-install data is computed in buildPostInstallRecords() below

  // Coord health
  const coordHealth = COORDINATORS.map(c => {
    const their = active.filter(p => getCoord(p) === c);
    return {
      coord: c,
      active: their.length,
      atRisk: their.filter(p => p.riskLevel === 'high').length,
      breached: their.filter(p => p.slaStatus === 'breached').length,
      noAction: their.filter(p => !p.nextAction).length,
    };
  });

  const stat = (label, value, tone) => `
    <div class="card"><div class="text-xs text-haven-muted uppercase tracking-wide">${label}</div>
    <div class="font-serif font-bold text-2xl mt-1 ${tone === 'danger' ? 'text-haven-danger' : tone === 'ok' ? 'text-haven-ok' : 'text-haven-forest'}">${value}</div></div>`;

  main.innerHTML = `
    <div class="p-6 max-w-6xl">
      <div class="mb-6">
        <h1 class="font-serif text-2xl font-bold text-haven-forest">Metrics</h1>
        <p class="text-sm text-haven-muted mt-1">Cycle time, post-install tracking, and coordinator load</p>
      </div>

      <div class="grid grid-cols-4 gap-4 mb-6">
        ${stat('Active', active.length)}
        ${stat('At Risk', atRisk.length, atRisk.length > 0 ? 'danger' : 'ok')}
        ${stat('Past SLA', overdue.length, overdue.length > 0 ? 'danger' : undefined)}
        ${stat('Avg Cycle', avgCycle + 'd')}
      </div>

      <div class="card mb-6">
        <h2 class="font-serif font-bold text-haven-forest mb-1">Where cycle time goes</h2>
        <p class="text-xs text-haven-muted mb-4">Median time per stage across completed projects · handoff gaps shown separately</p>
        <div class="space-y-2">
          ${stageAvgs.map((s, i) => {
            const pct = (s.avg / (totalCycle + handoffSum)) * 100;
            const handoffPct = i < stageAvgs.length - 1 ? (COMPLETED_STAGE_DURATIONS.handoff_gaps[i] / (totalCycle + handoffSum)) * 100 : 0;
            const overBy = s.variance;
            const tone = overBy > 3 ? 'danger' : overBy > 0 ? 'warn' : '';
            return `
              <div>
                <div class="flex items-center gap-3 mb-1">
                  <div class="w-32 text-sm">${STAGE_LABELS[s.stage]}</div>
                  <div class="flex-1 track-bar">
                    <div class="track-bar-fill ${tone}" style="width: ${pct * 3}%"></div>
                  </div>
                  <div class="text-sm font-medium w-16 text-right">${s.avg}d</div>
                  <div class="text-xs w-20 text-right ${overBy > 0 ? 'text-haven-danger' : 'text-haven-ok'}">${overBy > 0 ? '+' : ''}${overBy}d vs SLA</div>
                </div>
                ${handoffPct > 0 ? `<div class="flex items-center gap-3 mb-3 text-haven-muted">
                  <div class="w-32 text-xs italic">&nbsp;↳ handoff</div>
                  <div class="flex-1 track-bar"><div class="track-bar-fill" style="width: ${handoffPct * 3}%; background: #C5E84A;"></div></div>
                  <div class="text-xs w-16 text-right">${COMPLETED_STAGE_DURATIONS.handoff_gaps[i]}d</div>
                  <div class="w-20"></div>
                </div>` : ''}
              </div>`;
          }).join('')}
        </div>
        <div class="mt-4 pt-4 border-t border-haven-border flex items-center justify-between">
          <div class="text-sm"><span class="text-haven-muted">Total stage time:</span> <span class="font-medium">${totalCycle}d</span> · <span class="text-haven-muted">Handoff time:</span> <span class="font-medium text-haven-warn">${handoffSum}d (${Math.round(handoffSum/(totalCycle+handoffSum)*100)}%)</span></div>
          <div class="text-xs text-haven-muted">Opportunity: reducing handoff gaps saves ~${handoffSum}d per project</div>
        </div>
      </div>

      ${renderBallInCourt()}

      ${renderInstallsByMonth()}

      <div class="card mb-6">
        <h2 class="font-serif font-bold text-haven-forest mb-4">Coordinator health</h2>
        <table class="w-full text-sm">
          <thead><tr class="text-left text-xs text-haven-muted uppercase border-b border-haven-border">
            <th class="pb-2">Coordinator</th><th class="pb-2">Active</th><th class="pb-2">At risk</th><th class="pb-2">Past SLA</th><th class="pb-2">No next action</th>
          </tr></thead>
          <tbody>
            ${coordHealth.map(c => `
              <tr class="border-b border-haven-border cursor-pointer hover:bg-haven-bg" onclick="switchToCoord('${c.coord}')">
                <td class="py-2">${avatar(c.coord, 20)} <span class="ml-2 align-middle">${c.coord}</span></td>
                <td class="py-2 font-medium">${c.active}</td>
                <td class="py-2 ${c.atRisk > 0 ? 'text-haven-danger font-medium' : 'text-haven-muted'}">${c.atRisk}</td>
                <td class="py-2 ${c.breached > 0 ? 'text-haven-danger font-medium' : 'text-haven-muted'}">${c.breached}</td>
                <td class="py-2 ${c.noAction > 0 ? 'text-haven-warn font-medium' : 'text-haven-muted'}">${c.noAction}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

          ${projectSubmittals.map(s => {
            const stats = EXTERNAL_PARTY_STATS[s.recipient];
            const statusBadge = s.status === 'overdue' ? `<span class="badge badge-danger">${s.sentDaysAgo - s.expectedResponseInDays}d overdue</span>` : s.status === 'responded' ? `<span class="badge badge-ok">responded</span>` : `<span class="badge badge-neutral">pending</span>`;
            return `<tr class="border-b border-haven-border">
              <td class="py-2">${SUBMITTAL_TYPES[s.type]}</td>
              <td class="py-2">${s.recipient}</td>
              <td class="py-2 text-xs text-haven-muted">${s.sentDaysAgo}d ago</td>
              <td class="py-2 text-xs text-haven-muted">${stats ? `~${stats.median}d` : `${s.expectedResponseInDays}d`}</td>
              <td class="py-2">${statusBadge}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  ` : '';

  document.getElementById('projectModalContent').innerHTML = `
    <div class="sticky top-0 bg-haven-bg px-6 py-4 border-b border-haven-border flex items-center justify-between z-10">
      <div class="flex items-center gap-3">
        ${viewMode === 'internal' ? `<span class="risk-dot ${p.riskLevel || 'low'}"></span>` : ''}
        <div><div class="text-xs text-haven-muted">${p.projectNumber}</div>
        <h2 class="font-serif text-xl font-bold text-haven-forest">${p.name}</h2></div>
      </div>
      <button onclick="closeModal()" class="text-haven-muted hover:text-haven-ink text-2xl leading-none">×</button>
    </div>
    <div class="p-6">
      <div class="flex items-start justify-between mb-5">
        <div class="text-sm text-haven-muted">${p.city}, ${p.state} ${p.zip}</div>
        <div class="text-right"><div class="text-xs text-haven-muted uppercase tracking-wide">Current Stage</div>
        <div class="font-serif font-bold text-lg text-haven-forest">${p.stage === 'completed' ? 'Completed' : STAGE_LABELS[p.stage]}</div>${slaBadge}</div>
      </div>
      ${healthBlock}${coordAssignmentBlock}${installerAckBlock}

      <div class="card mb-5">
        <div class="flex items-center justify-between mb-4">
          <h3 class="font-serif font-bold text-haven-forest">Pipeline</h3>
          ${p.stage !== 'completed' && currentStageIdx < STAGE_ORDER.length - 1 && viewMode === 'internal' ? `<button class="btn ${ready ? 'btn-accent' : 'btn-primary'} text-sm" onclick="openAdvanceModal('${p.id}')">${ready ? '✓' : ''} Advance to ${STAGE_LABELS[STAGE_ORDER[currentStageIdx + 1]]} →</button>` : ''}
        </div>
        <div class="flex items-center overflow-x-auto pb-2">
          ${STAGE_ORDER.map((stage, i) => {
            const isCurrent = p.stage === stage;
            const isPast = currentStageIdx > i;
            const dotClass = isCurrent ? 'bg-haven-lime border-haven-forest' : isPast ? 'bg-haven-forest border-haven-forest' : 'bg-white border-haven-border';
            const textClass = isCurrent ? 'font-semibold text-haven-forest' : 'text-haven-muted';
            const lineClass = isPast ? 'bg-haven-forest' : 'bg-haven-border';
            return `<div class="flex items-center shrink-0">
                <div class="flex flex-col items-center min-w-[90px]">
                  <div class="w-6 h-6 rounded-full border-2 ${dotClass}"></div>
                  <div class="text-[11px] mt-1.5 text-center ${textClass}">${STAGE_LABELS[stage]}</div>
                </div>
                ${i < STAGE_ORDER.length - 1 ? `<div class="h-0.5 w-8 mx-1 ${lineClass}"></div>` : ''}
              </div>`;
          }).join('')}
        </div>
      </div>

      ${parallelTracksBlock}

      <div class="grid grid-cols-3 gap-5 mb-5">
        <div class="card">
          <h3 class="font-serif font-bold text-haven-forest mb-3">Project Details</h3>
          <dl class="space-y-2 text-sm">
            <div class="flex justify-between gap-3"><dt class="text-haven-muted">System</dt><dd>${p.systemType}</dd></div>
            ${p.solar ? `<div class="flex justify-between gap-3"><dt class="text-haven-muted">Solar</dt><dd>${p.solar} kW</dd></div>` : ''}
            ${p.battery ? `<div class="flex justify-between gap-3"><dt class="text-haven-muted">Battery</dt><dd>${p.battery} kWh</dd></div>` : ''}
            <div class="flex justify-between gap-3"><dt class="text-haven-muted">Utility</dt><dd>${p.utility}</dd></div>
            <div class="flex justify-between gap-3"><dt class="text-haven-muted">AHJ</dt><dd class="text-right">${p.ahj}</dd></div>
            <div class="flex justify-between gap-3"><dt class="text-haven-muted">Coordinator</dt><dd>${coord}</dd></div>
            <div class="flex justify-between gap-3"><dt class="text-haven-muted">Installer</dt><dd class="text-right ${!inst ? 'italic text-haven-muted' : ''}">${inst || 'Unassigned'}</dd></div>
            <div class="flex justify-between gap-3"><dt class="text-haven-muted">Surveyor</dt><dd class="text-right">${p.surveyor || '—'}</dd></div>
            <div class="flex justify-between gap-3"><dt class="text-haven-muted">Kickoff</dt><dd>${p.kickoffAgo}d ago</dd></div>
          </dl>
        </div>
        <div class="card">
          <div class="flex items-center justify-between mb-3">
            <h3 class="font-serif font-bold text-haven-forest">Tasks</h3>
            <span class="text-xs text-haven-muted">${projectTasks.length}</span>
          </div>
          ${projectTasks.length === 0 ? '<div class="text-sm text-haven-muted">No tasks.</div>' : `
            <ul class="space-y-2">
              ${projectTasks.map(t => {
                const done = completedTasks.has(t.id) || t.status === 'done';
                return `<li class="text-sm border border-haven-border rounded p-2 flex items-start gap-2">
                  <div class="checkbox ${done ? 'checked' : ''}" onclick="event.stopPropagation(); toggleTask('${t.id}'); setTimeout(() => openProjectModal('${p.id}'), 50)">${done ? '✓' : ''}</div>
                  <div class="flex-1">
                    <div class="font-medium ${done ? 'line-through text-haven-muted' : ''}">${t.title}</div>
                    <div class="text-xs text-haven-muted mt-0.5">${done ? 'completed' : t.dueInDays < 0 ? `${-t.dueInDays}d overdue` : t.dueInDays === 0 ? 'due today' : `due in ${t.dueInDays}d`}${t.autoGenerated ? ' · auto' : ''}</div>
                  </div>
                </li>`;
              }).join('')}
            </ul>`}
          <button class="btn btn-secondary text-xs mt-3 w-full justify-center">+ Add task</button>
        </div>
        <div class="card">
          <div class="flex items-center justify-between mb-3">
            <h3 class="font-serif font-bold text-haven-forest">Photos</h3>
            <span class="text-xs text-haven-muted">${projectPhotos.length}</span>
          </div>
          <div class="grid grid-cols-3 gap-1">
            ${projectPhotos.slice(0, 9).map(ph => `<div class="aspect-square ${ph.gradient} rounded relative"><div class="absolute bottom-0 left-0 right-0 text-[9px] text-white/90 bg-black/30 px-1 truncate">${ph.category.replace('_', ' ')}</div></div>`).join('')}
          </div>
          <button class="btn btn-secondary text-xs mt-3 w-full justify-center">${viewMode === 'installer' ? 'Upload' : 'View all'}</button>
        </div>
      </div>

      ${submittalsBlock}

      <div class="card mb-5">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-serif font-bold text-haven-forest">Email Thread</h3>
          <div class="flex items-center gap-2">
            <span class="text-xs text-haven-muted">Synced from HubSpot · ${emails.length} messages</span>
            <button class="btn btn-accent text-xs">+ New email</button>
          </div>
        </div>
        <div class="space-y-2.5">
          ${emails.map(e => `<div class="email-bubble ${e.direction === 'outbound' ? 'outbound' : ''}">
              <div class="email-header">
                <div class="min-w-0 flex-1">
                  <div class="text-xs text-haven-muted">${e.direction === 'outbound' ? 'To: ' : 'From: '}<span class="text-haven-ink">${e.direction === 'outbound' ? e.to : e.from}</span></div>
                  <div class="text-sm font-medium mt-0.5 truncate">${e.subject}</div>
                </div>
                <span class="text-xs text-haven-muted shrink-0">${e.daysAgo === 0 ? 'today' : `${e.daysAgo}d ago`}</span>
              </div>
              <div class="text-sm text-haven-ink whitespace-pre-line mt-2 leading-relaxed">${e.body}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>
  `;
  document.getElementById('projectModal').classList.remove('hidden');
}

// ============================================================
// ADVANCE STAGE MODAL — enforces checklist
// ============================================================
function openAdvanceModal(projectId) {
  const p = PROJECTS.find(pr => pr.id === projectId);
  if (!p) return;
  const currentStageIdx = STAGE_ORDER.indexOf(p.stage);
  const nextStage = STAGE_ORDER[currentStageIdx + 1];
  const stageTasks = TASKS.filter(t => t.projectId === p.id && t.stage === p.stage && t.autoGenerated);
  const openTasks = stageTasks.filter(t => !completedTasks.has(t.id) && t.status !== 'done');
  const hasNextAction = !!p.nextAction;

  const canAdvance = openTasks.length === 0;

  document.getElementById('advanceModalContent').innerHTML = `
    <div class="p-6">
      <h2 class="font-serif text-xl font-bold text-haven-forest mb-1">Advance to ${STAGE_LABELS[nextStage]}?</h2>
      <p class="text-sm text-haven-muted mb-5">${p.name} · ${STAGE_LABELS[p.stage]} → ${STAGE_LABELS[nextStage]}</p>

      <div class="mb-4">
        <div class="text-xs uppercase tracking-wider text-haven-muted mb-2">Stage checklist</div>
        ${stageTasks.length === 0 ? '<div class="text-sm text-haven-muted">No stage checklist for this stage.</div>' : `
          <ul class="space-y-2">
            ${stageTasks.map(t => {
              const done = completedTasks.has(t.id) || t.status === 'done';
              return `<li class="flex items-center gap-3 text-sm">
                <div class="checkbox ${done ? 'checked' : ''}" onclick="toggleTask('${t.id}'); openAdvanceModal('${p.id}')">${done ? '✓' : ''}</div>
                <span class="${done ? 'line-through text-haven-muted' : ''}">${t.title}</span>
              </li>`;
            }).join('')}
          </ul>`}
      </div>

      ${nextStage ? `
        <div class="mb-4">
          <div class="text-xs uppercase tracking-wider text-haven-muted mb-2">Next stage prep</div>
          <div class="text-sm text-haven-muted mb-2">When you advance, these tasks will auto-generate for ${STAGE_LABELS[nextStage]}:</div>
          <ul class="space-y-1 text-sm text-haven-muted bg-haven-bg rounded p-3">
            ${(STAGE_TEMPLATES[nextStage] || []).map(t => `<li>· ${t.title} <span class="text-xs">(day ${t.offset})</span></li>`).join('')}
          </ul>
        </div>` : ''}

      <div class="flex items-center justify-between mt-6 pt-4 border-t border-haven-border">
        ${canAdvance ? '<span class="badge badge-ok">✓ Ready to advance</span>' : `<span class="badge badge-warn">${openTasks.length} open task${openTasks.length === 1 ? '' : 's'}</span>`}
        <div class="flex gap-2">
          <button class="btn btn-secondary" onclick="closeAdvanceModal()">Cancel</button>
          <button class="btn ${canAdvance ? 'btn-primary' : 'btn-secondary'}" ${canAdvance ? '' : 'disabled style="opacity:0.5;cursor:not-allowed"'} onclick="${canAdvance ? `confirmAdvance('${p.id}')` : ''}">${canAdvance ? 'Advance stage' : 'Complete tasks first'}</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('advanceModal').classList.remove('hidden');
}

function confirmAdvance(projectId) {
  alert('Stage advanced (demo — not persisted). New stage tasks auto-generated.');
  closeAdvanceModal();
  closeModal();
}

window.openAdvanceModal = openAdvanceModal;
window.confirmAdvance = confirmAdvance;
window.closeAdvanceModal = () => document.getElementById('advanceModal').classList.add('hidden');

// ============================================================
// SHARED
// ============================================================
function saveAssignment(projectId) {
  const val = document.getElementById('installerSelect').value;
  assignedInstallers[projectId] = val || null;
  openProjectModal(projectId); render();
}
window.saveAssignment = saveAssignment;

function saveCoordAssignment(projectId) {
  const val = document.getElementById('coordAssignSelect').value;
  assignedCoords[projectId] = val;
  openProjectModal(projectId); renderCoordSelector(); renderNav(); render();
}
window.saveCoordAssignment = saveCoordAssignment;

function closeModal() { document.getElementById('projectModal').classList.add('hidden'); }
window.closeModal = closeModal;

function attachProjectHandlers() {
  document.querySelectorAll('[data-project-id]').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('.checkbox')) return;
      if (e.target.tagName === 'BUTTON') return;
      openProjectModal(el.dataset.projectId);
    });
  });
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeModal(); closeAdvanceModal(); }
});

renderCoordSelector();
renderNav();
render();
</script>
</body>
</html>
