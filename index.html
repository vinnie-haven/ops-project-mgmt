// ============================================================
// STUCK DEALS — concentrations of projects wedged in each phase/status
// ============================================================
let stuckSort = { col: 'deals_stuck', dir: 'desc' };
let stuckPhaseFilter = null;
let stuckDrilldownStatus = null; // when set, show project list for this status instead of the aggregate table
let stuckDrilldownSort = { col: 'days_stuck', dir: 'desc' };

function computeStuckAggregates() {
  // Only active projects. Stage scope is intentionally NOT applied — this report is
  // global by design, showing concentrations across the whole pipeline.
  const active = PROJECTS.filter(p => p.stage !== 'completed');
  const byStatus = {};
  active.forEach(p => {
    const status = stuckStatusForProject(p);
    if (!status) return;
    const days = daysStuckForProject(p);
    if (!byStatus[status]) byStatus[status] = { status, phase: STUCK_STATUS_CATALOG[status]?.phase || 'Other', days: [], projects: [] };
    byStatus[status].days.push(days);
    byStatus[status].projects.push(p);
  });
  const rows = Object.values(byStatus).map(r => {
    const sorted = r.days.slice().sort((a, b) => a - b);
    const median = sorted.length > 0 ? sorted[Math.floor(sorted.length / 2)] : 0;
    const max = sorted.length > 0 ? sorted[sorted.length - 1] : 0;
    const over90 = r.days.filter(d => d > 90).length;
    return {
      phase: r.phase,
      status: r.status,
      dealsStuck: r.projects.length,
      median,
      max,
      over90,
      projects: r.projects,
    };
  });
  return rows;
}

function renderStuck() {
  if (stuckDrilldownStatus) return renderStuckDrilldown();

  const rows = computeStuckAggregates();

  // Phase-level totals for the summary strip
  const byPhase = {};
  rows.forEach(r => {
    if (!byPhase[r.phase]) byPhase[r.phase] = { phase: r.phase, deals: 0, over90: 0 };
    byPhase[r.phase].deals += r.dealsStuck;
    byPhase[r.phase].over90 += r.over90;
  });
  const phases = Object.values(byPhase).sort((a, b) => b.deals - a.deals);
  const totalStuck = rows.reduce((s, r) => s + r.dealsStuck, 0);
  const totalOver90 = rows.reduce((s, r) => s + r.over90, 0);

  // Apply phase filter
  let list = rows.slice();
  if (stuckPhaseFilter) list = list.filter(r => r.phase === stuckPhaseFilter);

  // Sort
  const acc = {
    phase: r => r.phase,
    status: r => r.status.toLowerCase(),
    deals_stuck: r => r.dealsStuck,
    median: r => r.median,
    max: r => r.max,
    over_90: r => r.over90,
  };
  const accFn = acc[stuckSort.col] || acc.deals_stuck;
  const dir = stuckSort.dir === 'asc' ? 1 : -1;
  list.sort((a, b) => {
    const av = accFn(a), bv = accFn(b);
    if (av < bv) return -1 * dir;
    if (av > bv) return 1 * dir;
    return 0;
  });

  // Mark the top 3 concentrations (by deals stuck) for bolding
  const topIds = new Set(rows.slice().sort((a, b) => b.dealsStuck - a.dealsStuck).slice(0, 3).map(r => r.status));

  const th = (key, label, opts = {}) => {
    const { align = 'left' } = opts;
    const isSorted = stuckSort.col === key;
    const icon = isSorted ? (stuckSort.dir === 'asc' ? '↑' : '↓') : '<span style="color:#C4C4C0">↕</span>';
    return `<th class="px-4 py-2.5 text-${align}"><button class="uppercase tracking-wide text-xs text-haven-muted hover:text-haven-forest flex items-center gap-1 ${align === 'right' ? 'ml-auto' : ''}" onclick="toggleStuckSort('${key}')">${label} ${icon}</button></th>`;
  };

  main.innerHTML = `
    <div class="p-6 max-w-6xl">
      <div class="mb-5">
        <h1 class="font-serif text-2xl font-bold text-haven-forest">Stuck Deals</h1>
        <p class="text-sm text-haven-muted mt-1">Concentrations of projects wedged in each phase + status · ${totalStuck} stuck · ${totalOver90} over 90 days</p>
      </div>

      <div class="grid grid-cols-4 gap-3 mb-6">
        ${phases.slice(0, 4).map(p => `
          <div class="card cursor-pointer hover:shadow-md transition-shadow ${stuckPhaseFilter === p.phase ? 'ring-2 ring-haven-forest' : ''}" onclick="setStuckPhaseFilter('${p.phase.replace(/'/g, "\\'")}')">
            <div class="text-[10px] uppercase tracking-wider text-haven-muted mb-1">${p.phase}</div>
            <div class="font-serif font-bold text-3xl text-haven-forest">${p.deals}</div>
            <div class="text-xs text-haven-muted mt-1">${p.over90 > 0 ? `<span class="text-haven-danger font-medium">${p.over90} over 90d</span>` : 'no 90d+ stuck'}</div>
          </div>
        `).join('')}
      </div>

      ${stuckPhaseFilter ? `
        <div class="mb-3 text-sm">
          <span class="text-haven-muted">Filtered by phase:</span> <span class="font-medium text-haven-forest">${stuckPhaseFilter}</span>
          <button class="text-haven-forest hover:underline ml-2 text-xs" onclick="setStuckPhaseFilter(null)">Clear</button>
        </div>
      ` : ''}

      <div class="card p-0 overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-haven-bg border-b border-haven-border">
            <tr>
              ${th('phase', 'Phase')}
              ${th('status', 'Status')}
              ${th('deals_stuck', 'Deals stuck', { align: 'right' })}
              ${th('median', 'Median days stuck', { align: 'right' })}
              ${th('max', 'Max days stuck', { align: 'right' })}
              ${th('over_90', '> 90 days', { align: 'right' })}
            </tr>
          </thead>
          <tbody>
            ${list.length === 0 ? `<tr><td colspan="6" class="px-4 py-8 text-center text-haven-muted">No stuck deals in this view</td></tr>` : list.map(r => {
              const isTop = topIds.has(r.status);
              const bold = isTop ? 'font-bold text-haven-forest' : '';
              return `
                <tr class="border-b border-haven-border hover:bg-haven-bg cursor-pointer" onclick="openStuckDrilldown('${r.status.replace(/'/g, "\\'")}')">
                  <td class="px-4 py-3 ${bold}">${r.phase}</td>
                  <td class="px-4 py-3 ${bold}">${r.status}</td>
                  <td class="px-4 py-3 text-right tabular-nums ${bold}">${r.dealsStuck}</td>
                  <td class="px-4 py-3 text-right tabular-nums ${bold}">${r.median}</td>
                  <td class="px-4 py-3 text-right tabular-nums">${r.max}</td>
                  <td class="px-4 py-3 text-right tabular-nums ${r.over90 > 0 ? 'text-haven-danger font-medium' : 'text-haven-muted'}">${r.over90}</td>
                </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>

      <div class="text-xs text-haven-muted mt-3 italic">
        Top 3 concentrations shown in bold. A project is considered stuck when days-in-stage exceeds the target threshold for its phase (e.g. 14d for Site Survey, 45d for Permitting). Click any row to see the underlying projects.
      </div>
    </div>
  `;
}

window.toggleStuckSort = (col) => {
  if (stuckSort.col === col) stuckSort.dir = stuckSort.dir === 'asc' ? 'desc' : 'asc';
  else stuckSort = { col, dir: col === 'status' || col === 'phase' ? 'asc' : 'desc' };
  render();
};
window.setStuckPhaseFilter = (phase) => {
  stuckPhaseFilter = phase;
  render();
};
window.openStuckDrilldown = (status) => {
  stuckDrilldownStatus = status;
  stuckDrilldownSort = { col: 'days_stuck', dir: 'desc' };
  render();
};
window.closeStuckDrilldown = () => {
  stuckDrilldownStatus = null;
  render();
};
window.toggleStuckDrilldownSort = (col) => {
  if (stuckDrilldownSort.col === col) stuckDrilldownSort.dir = stuckDrilldownSort.dir === 'asc' ? 'desc' : 'asc';
  else stuckDrilldownSort = { col, dir: col === 'customer' || col === 'coord' || col === 'installer' ? 'asc' : 'desc' };
  render();
};

  const total = projects.length;
  const days = projects.map(daysStuckForProject);
  const sortedDays = days.slice().sort((a, b) => a - b);
  const median = sortedDays.length > 0 ? sortedDays[Math.floor(sortedDays.length / 2)] : 0;
  const max = sortedDays.length > 0 ? sortedDays[sortedDays.length - 1] : 0;
  const over90 = days.filter(d => d > 90).length;

  const th = (key, label, align = 'left') => {

    return `<th class="px-3 py-2.5 text-${align}"><button class="uppercase tracking-wide text-xs text-haven-muted hover:text-haven-forest flex items-center gap-1 ${align === 'right' ? 'ml-auto' : ''}" onclick="toggleStuckDrilldownSort('${key}')">${label} ${icon}</button></th>`;

      </button>
      <div class="mb-5">

        <p class="text-sm text-haven-muted mt-1">${total} project${total === 1 ? '' : 's'} stuck · median ${median}d · max ${max}d${over90 > 0 ? ` · <span class="text-haven-danger font-medium">${over90} over 90 days</span>` : ''}</p>

      <div class="card p-0 overflow-hidden">

          <tbody>
            ${projects.length === 0 ? `<tr><td colspan="8" class="px-4 py-8 text-center text-haven-muted">No projects in this bucket</td></tr>` : projects.map(p => {
              const d = daysStuckForProject(p);
              const wo = p.waitingOn || 'nothing';
              const wColor = waitingColor[wo] || '#6B7568';

                <tr class="border-b border-haven-border hover:bg-haven-bg cursor-pointer" data-project-id="${p.id}">

// MONTHLY STATS — bar charts for installs/inspections/PTO/ICF
// ============================================================
function renderMonthlyStats() {
  // Take last 6 months of POST_INSTALL cohorts, most recent on the right
  const months = POST_INSTALL.months.slice(-6);

  // Per-month counts. "Installs" = cohort size. Inspections, PTO submitted, PTO approved, ICF submitted/approved derived.
  // ICF Resubmitted is synthesized — cases where a cohort's ICFs bounce back and need rework.
  const seriesData = months.map(m => {
    const cohort = POST_INSTALL.records.filter(r => r.installMonth === m.label);
    const total = cohort.length;
    const inspections = cohort.filter(r => r.inspectionComplete).length;
    const ptoSub = cohort.filter(r => r.ptoSubmitted).length;
    const ptoApproved = cohort.filter(r => r.ptoComplete).length;
    const icfSubmitted = Math.round(ptoApproved * 0.75);
    // Demo-value resubmits — higher for recent cohorts to reflect backlog
    const monthIdx = months.indexOf(m);
    const resubmitFactor = [0.1, 0.5, 0.5, 0.35, 0.4, 1.2][monthIdx] || 0.3;
    const icfResubmitted = Math.round(icfSubmitted * resubmitFactor);
    const icfApproved = cohort.filter(r => r.icfComplete).length;

    return {
      month: m.label,
      installs: total,
      inspections,
      ptoSub,
      ptoApproved,
      icfSubmitted,
      icfResubmitted,
      icfApproved,
    };
  });

  // Chart renderer — takes series data + a color + a series key and renders a light-theme bar chart
  function barChart(title, seriesKey, color) {
    const values = seriesData.map(d => d[seriesKey]);
    const max = Math.max(1, ...values);
    // Y axis: 5 tick marks, rounded up to a nice number
    const yMax = Math.ceil(max / 10) * 10 || 10;
    const yTicks = [0, yMax * 0.25, yMax * 0.5, yMax * 0.75, yMax].map(v => Math.round(v));

    return `
      <div class="card">
        <h3 class="font-serif font-bold text-lg mb-4" style="color:${color};">${title}</h3>
        <div class="flex" style="height:220px;">
          <div class="flex flex-col justify-between text-right pr-2 text-[11px] text-haven-muted tabular-nums" style="width:30px;">
            ${yTicks.slice().reverse().map(t => `<div>${t}</div>`).join('')}
          </div>
          <div class="flex-1 relative" style="border-left: 1px solid #E4E6E0; border-bottom: 1px solid #E4E6E0;">
            <!-- grid lines -->
            ${yTicks.slice(1, -1).map((t, i) => {
              const pct = 100 - ((t / yMax) * 100);
              return `<div class="absolute left-0 right-0" style="top:${pct}%; border-top: 1px dashed #EFEFE8;"></div>`;
            }).join('')}
            <!-- bars -->
            <div class="absolute inset-0 flex items-end justify-around px-2 gap-2">
              ${seriesData.map(d => {
                const v = d[seriesKey];
                const heightPct = (v / yMax) * 100;
                return `
                  <div class="flex flex-col items-center justify-end flex-1 h-full relative group">
                    <div class="absolute text-[12px] font-bold tabular-nums" style="bottom:${heightPct}%; margin-bottom:2px; color:${color};">${v}</div>
                    <div class="w-full rounded-t-sm transition-opacity hover:opacity-80" style="background:${color}; height:${heightPct}%; min-height:1px;" title="${d.month}: ${v}"></div>
                  </div>`;
              }).join('')}
            </div>
          </div>
        </div>
        <div class="flex pl-[30px] mt-2">
          <div class="flex-1 flex justify-around px-2 gap-2">
            ${seriesData.map(d => {
              // Convert "Nov 2025" -> "Nov '25"
              const [mon, yr] = d.month.split(' ');
              const shortYr = yr.slice(-2);
              return `<div class="flex-1 text-center text-[11px] text-haven-muted">${mon} '${shortYr}</div>`;
            }).join('')}
          </div>
        </div>
      </div>
    `;
  }

  main.innerHTML = `
    <div class="p-6 max-w-[1400px]">
      <div class="mb-6">
        <h1 class="font-serif text-2xl font-bold text-haven-forest">Monthly Stats</h1>
        <p class="text-sm text-haven-muted mt-1">Volume by milestone across the last ${months.length} months</p>
      </div>

      <div class="grid grid-cols-2 gap-4 mb-4">
        ${barChart('Installs', 'installs', '#2F7A3E')}
        ${barChart('Inspections', 'inspections', '#D84A7A')}
      </div>

      <div class="grid grid-cols-2 gap-4 mb-4">
        ${barChart('PTO Submitted', 'ptoSub', '#E07A3A')}
        ${barChart('PTO Approved', 'ptoApproved', '#3A8EA8')}
      </div>

      <div class="grid grid-cols-3 gap-4">
        ${barChart('ICF Submitted', 'icfSubmitted', '#3A6EA8')}
        ${barChart('ICF Resubmitted', 'icfResubmitted', '#C5843A')}
        ${barChart('ICF Approved', 'icfApproved', '#2F7A3E')}
      </div>
    </div>
  `;
}

function openProjectModal(projectId) {

      <div class="grid grid-cols-3 gap-4 text-sm">
        <div>
          <div class="text-xs text-haven-muted uppercase tracking-wide mb-1">Next action</div>
          ${p.nextAction ? `<div class="font-medium">${p.nextAction}</div>
            <div class="text-xs text-haven-muted mt-0.5">${p.nextActionOwner} · ${p.nextActionDueInDays < 0 ? `<span class="text-haven-danger font-medium">${-p.nextActionDueInDays}d overdue</span>` : p.nextActionDueInDays === 0 ? '<span class="text-haven-warn font-medium">Due today</span>' : `due in ${p.nextActionDueInDays}d`}</div>` : `<div class="text-haven-danger font-medium">— not set —</div>`}

        </div>
      </div>
    </div>
  ` : '';

  const coordAssignmentBlock = viewMode === 'internal' ? `

  const installerAckBlock = viewMode === 'installer' ? (() => {

        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <div class="text-xs text-haven-muted uppercase tracking-wide mb-2">Install</div>
            ${d.installCompletedAt ? `
              <div class="text-sm mb-2">Completed ${new Date(d.installCompletedAt).toLocaleDateString()}</div>

                <button class="btn btn-primary text-sm" onclick="markInstallComplete('${p.id}')">Mark install complete</button>

          <div>
            <div class="text-xs text-haven-muted uppercase tracking-wide mb-2">Inspection</div>
            ${d.inspectionResult === 'passed' ? `
              <div class="text-sm mb-2"><span class="badge badge-ok">Passed</span> on ${new Date(d.inspectionResultAt).toLocaleDateString()}</div>
            ` : d.inspectionResult === 'failed' ? `

              <button class="btn btn-primary text-sm" onclick="setInspectionDate('${p.id}')">Set inspection date</button>

        ${pay ? `

              <span class="ml-3">${pay.inspectionPaid ? `<span class="text-haven-ok">✓ Inspection 50% paid</span>` : `<span class="text-haven-muted">Inspection 50% ${d.inspectionResult === 'passed' ? 'due' : 'pending'}</span>`}</span>

  // Dispatch work order block (internal only, shown when no accepted WO exists yet

  const dispatchStageEligible = !['completed','site_survey'].includes(p.stage);
  const dispatchBlock = viewMode === 'internal' && dispatchStageEligible && !acceptedWO ? `

  const approvedAdders = projectAdders.filter(a => a.status === 'approved');
  const rejectedAdders = projectAdders.filter(a => a.status === 'rejected');
  // Only show adders block for projects where an installer is accepted or completed
  const showAddersBlock = (acceptedWO || p.stage === 'completed');

  const adderRow = (a, canReview) => {

  const addersBlock = showAddersBlock ? `

  const notesBlock = `
    <div class="card mb-5">
      <div class="flex items-center justify-between mb-3">
        <h3 class="font-serif font-bold text-haven-forest">Notes</h3>
        <span class="text-xs text-haven-muted">${projectNotes.length} note${projectNotes.length === 1 ? '' : 's'}</span>
      </div>
      ${projectNotes.length === 0 ? '<div class="text-sm text-haven-muted mb-3">No notes yet. Leave a note so everyone on this job stays in the loop.</div>' : `
        <div class="space-y-3 mb-4">

                <span class="badge badge-${n.role === 'installer' ? 'info' : 'neutral'}">${n.role === 'installer' ? 'Installer' : 'Coordinator'}</span>
                <span class="text-xs text-haven-muted">${timeAgo(n.createdAt)}</span>

        <textarea id="newNote-${p.id}" rows="2" class="w-full px-3 py-2 border border-haven-border rounded-md text-sm bg-white" placeholder="Add a note..."></textarea>

          <button class="btn btn-primary text-sm" onclick="addNote('${p.id}')">Post note</button>

      <h3 class="font-serif font-bold text-haven-forest mb-3">Parallel tracks</h3>

          return `
            <div class="flex items-center gap-3">
              <div class="text-sm w-60">${label}</div>
              <div class="flex-1"></div>
              <span class="badge badge-${color}">${TRACK_STATUS_LABELS[status]}</span>
            </div>`;
        }).join('')}
      </div>
    </div>
  ` : '';

  // Submittals for this project
  const submittalsBlock = viewMode === 'internal' && projectSubmittals.length > 0 ? `
    <div class="card mb-5">
      <h3 class="font-serif font-bold text-haven-forest mb-3">Submittals</h3>
      <table class="w-full text-sm">
        <thead><tr class="text-left text-xs text-haven-muted uppercase border-b border-haven-border">
          <th class="pb-2">Type</th><th class="pb-2">Recipient</th><th class="pb-2">Sent</th><th class="pb-2">Expected</th><th class="pb-2">Status</th>
        </tr></thead>
        <tbody>
          ${projectSubmittals.map(s => {
            const stats = EXTERNAL_PARTY_STATS[s.recipient];
            const statusBadge = s.status === 'overdue' ? `<span class="badge badge-danger">${s.sentDaysAgo - s.expectedResponseInDays}d overdue</span>` : s.status === 'responded' ? `<span class="badge badge-ok">responded</span>` : `<span class="badge badge-neutral">pending</span>`;
            return `<tr class="border-b border-haven-border">
              <td class="py-2">${SUBMITTAL_TYPES[s.type]}</td>
              <td class="py-2">${s.recipient}</td>
              <td class="py-2 text-xs text-haven-muted">${s.sentDaysAgo}d ago</td>

              <td class="py-2">${statusBadge}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  ` : '';

  // Blockers block — visible to internal users; shows open blockers + quick-add

function openAdvanceModal(projectId) {
  const p = PROJECTS.find(pr => pr.id === projectId);
  if (!p) return;
  const currentStageIdx = STAGE_ORDER.indexOf(p.stage);
  const nextStage = STAGE_ORDER[currentStageIdx + 1];
  const stageTasks = TASKS.filter(t => t.projectId === p.id && t.stage === p.stage && t.autoGenerated);
  const openTasks = stageTasks.filter(t => !completedTasks.has(t.id) && t.status !== 'done');
  const hasNextAction = !!p.nextAction;

  const canAdvance = openTasks.length === 0;

  document.getElementById('advanceModalContent').innerHTML = `
    <div class="p-6">
      <h2 class="font-serif text-xl font-bold text-haven-forest mb-1">Advance to ${STAGE_LABELS[nextStage]}?</h2>
      <p class="text-sm text-haven-muted mb-5">${p.name} · ${STAGE_LABELS[p.stage]} → ${STAGE_LABELS[nextStage]}</p>

      <div class="mb-4">
        <div class="text-xs uppercase tracking-wider text-haven-muted mb-2">Stage checklist</div>
        ${stageTasks.length === 0 ? '<div class="text-sm text-haven-muted">No stage checklist for this stage.</div>' : `
          <ul class="space-y-2">
            ${stageTasks.map(t => {
              const done = completedTasks.has(t.id) || t.status === 'done';
              return `<li class="flex items-center gap-3 text-sm">
                <div class="checkbox ${done ? 'checked' : ''}" onclick="toggleTask('${t.id}'); openAdvanceModal('${p.id}')">${done ? '✓' : ''}</div>
                <span class="${done ? 'line-through text-haven-muted' : ''}">${t.title}</span>
              </li>`;
            }).join('')}
          </ul>`}
      </div>

      ${nextStage ? `
        <div class="mb-4">
          <div class="text-xs uppercase tracking-wider text-haven-muted mb-2">Next stage prep</div>
          <div class="text-sm text-haven-muted mb-2">When you advance, these tasks will auto-generate for ${STAGE_LABELS[nextStage]}:</div>
          <ul class="space-y-1 text-sm text-haven-muted bg-haven-bg rounded p-3">
            ${(STAGE_TEMPLATES[nextStage] || []).map(t => `<li>· ${t.title} <span class="text-xs">(day ${t.offset})</span></li>`).join('')}
          </ul>
        </div>` : ''}

      <div class="flex items-center justify-between mt-6 pt-4 border-t border-haven-border">
        ${canAdvance ? '<span class="badge badge-ok">✓ Ready to advance</span>' : `<span class="badge badge-warn">${openTasks.length} open task${openTasks.length === 1 ? '' : 's'}</span>`}
        <div class="flex gap-2">
          <button class="btn btn-secondary" onclick="closeAdvanceModal()">Cancel</button>
          <button class="btn ${canAdvance ? 'btn-primary' : 'btn-secondary'}" ${canAdvance ? '' : 'disabled style="opacity:0.5;cursor:not-allowed"'} onclick="${canAdvance ? `confirmAdvance('${p.id}')` : ''}">${canAdvance ? 'Advance stage' : 'Complete tasks first'}</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('advanceModal').classList.remove('hidden');
}

function confirmAdvance(projectId) {
  const p = PROJECTS.find(pr => pr.id === projectId);
  if (!p) { closeAdvanceModal(); return; }
  const currentStageIdx = STAGE_ORDER.indexOf(p.stage);
  const nextStage = STAGE_ORDER[currentStageIdx + 1];
  if (!nextStage) { closeAdvanceModal(); return; }
  moveProjectStage(projectId, nextStage, null);
  closeAdvanceModal();
  closeModal();
  render();
}

// Backward move or skip-forward: confirm with optional reason
function openStageMoveModal(projectId, newStage, direction) {
  const p = PROJECTS.find(pr => pr.id === projectId);
  if (!p) return;
  const isBackward = direction === 'backward';
  const title = isBackward ? 'Move stage backward?' : 'Skip ahead?';
  const bodyText = isBackward
    ? `Moving ${p.name} back from ${STAGE_LABELS[p.stage]} to ${STAGE_LABELS[newStage]}. This usually means rework. Add a reason so the team knows why.`
    : `Moving ${p.name} from ${STAGE_LABELS[p.stage]} directly to ${STAGE_LABELS[newStage]}, skipping ${STAGE_ORDER.indexOf(newStage) - STAGE_ORDER.indexOf(p.stage) - 1} stage(s). Add a reason so the team knows why.`;

  document.getElementById('advanceModalContent').innerHTML = `
    <div class="p-6">
      <h2 class="font-serif text-xl font-bold text-haven-forest mb-1">${title}</h2>
      <p class="text-sm text-haven-muted mb-4">${p.name} · ${STAGE_LABELS[p.stage]} → ${STAGE_LABELS[newStage]}</p>
      <div class="card mb-4" style="background:#FAFAF7;">
        <div class="text-sm">${bodyText}</div>
      </div>
      <div class="mb-4">
        <label class="text-xs uppercase tracking-wider text-haven-muted block mb-2">Reason (optional)</label>
        <textarea id="stageMoveReason" rows="3" class="w-full px-3 py-2 border border-haven-border rounded-md text-sm bg-white" placeholder="${isBackward ? 'e.g. AHJ rejected permit, design revision needed' : 'e.g. interconnection approved early'}"></textarea>
      </div>
      <div class="flex items-center justify-between mt-5 pt-4 border-t border-haven-border">
        <span class="badge ${isBackward ? 'badge-warn' : 'badge-info'}">${isBackward ? 'Backward move' : 'Skip forward'}</span>
        <div class="flex gap-2">
          <button class="btn btn-secondary" onclick="closeAdvanceModal()">Cancel</button>
          <button class="btn btn-primary" onclick="confirmStageMove('${p.id}', '${newStage}')">Move project</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('advanceModal').classList.remove('hidden');
  setTimeout(() => { const t = document.getElementById('stageMoveReason'); if (t) t.focus(); }, 50);
}

function confirmStageMove(projectId, newStage) {
  const reasonEl = document.getElementById('stageMoveReason');
  const reason = reasonEl ? reasonEl.value.trim() || null : null;
  moveProjectStage(projectId, newStage, reason);
  closeAdvanceModal();
  closeModal();
  render();
}

function onMoveStageSelect(projectId, newStage) {
  if (!newStage) return;
  const p = PROJECTS.find(pr => pr.id === projectId);
  if (!p) return;
  // Reset the select so reopening starts fresh
  const sel = document.getElementById('moveStageSelect');
  if (sel) sel.value = '';
  handleStageMove(p, newStage);
}

function renderStageHistoryBlock(p) {
  const history = stageHistory[p.id] || [];
  if (history.length === 0) return '';
  const fmt = (ms) => {
    const d = new Date(ms);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) + ' · ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  };
  return `
    <div class="card mb-5">
      <h3 class="font-serif font-bold text-haven-forest mb-3">Stage history</h3>
      <ol class="space-y-2">
        ${history.slice().reverse().map(h => {
          const fromIdx = STAGE_ORDER.indexOf(h.from);
          const toIdx = STAGE_ORDER.indexOf(h.to);
          const isBack = toIdx < fromIdx;
          const isSkip = toIdx > fromIdx + 1;
          const arrowColor = isBack ? '#C44545' : isSkip ? '#3A6EA8' : '#2F7A3E';
          const label = isBack ? 'Moved backward' : isSkip ? 'Skipped ahead' : 'Advanced';
          return `
            <li class="flex items-start gap-3 pb-2 border-b border-haven-border last:border-b-0 last:pb-0">
              <div class="mt-0.5 shrink-0" style="color:${arrowColor}">${isBack ? '↺' : '→'}</div>
              <div class="flex-1 min-w-0">
                <div class="text-sm">
                  <span class="font-medium">${label}</span>:
                  <span class="text-haven-muted">${STAGE_LABELS[h.from]}</span>
                  <span class="text-haven-muted">→</span>
                  <span class="font-medium text-haven-forest">${STAGE_LABELS[h.to]}</span>
                </div>
                <div class="text-xs text-haven-muted mt-0.5">
                  ${fmt(h.movedAt)} · ${h.movedBy} · spent ${h.daysInPriorStage}d in prior stage
                </div>
                ${h.reason ? `<div class="text-xs mt-1 italic" style="color:#4a5048;">"${h.reason}"</div>` : ''}
              </div>
            </li>`;
        }).join('')}
      </ol>
    </div>
  `;
}

// Utility
function timeAgo(ms) {
  const s = Math.floor((Date.now() - ms) / 1000);
  if (s < 60) return 'just now';
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  const d = Math.floor(h / 24);
  if (d < 30) return `${d}d ago`;
  return new Date(ms).toLocaleDateString();
}
function escapeHtml(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function addNote(projectId) {
  const ta = document.getElementById('newNote-' + projectId);
  if (!ta) return;
  const body = ta.value.trim();

    author: viewMode === 'installer' ? 'Jorge Martinez' : currentActor(),
    role: viewMode === 'installer' ? 'installer' : 'coord',
    body,
    createdAt: Date.now(),
  });
  openProjectModal(projectId);
}

// Installer workflow actions
function setInstallDate(projectId) {
  const existing = (INSTALLER_PROJECT_DATA[projectId] || {}).installConfirmedDate || '';
  const val = prompt('Confirm install date (YYYY-MM-DD):', existing || new Date(Date.now() + 7 * 86400000).toISOString().slice(0, 10));
  if (!val) return;
  if (!INSTALLER_PROJECT_DATA[projectId]) INSTALLER_PROJECT_DATA[projectId] = {};
  INSTALLER_PROJECT_DATA[projectId].installConfirmedDate = val;
  openProjectModal(projectId); render();
}
window.setInstallDate = setInstallDate;

function markInstallComplete(projectId) {
  if (!confirm('Mark install complete? This will trigger the first 50% payment review.')) return;
  if (!INSTALLER_PROJECT_DATA[projectId]) INSTALLER_PROJECT_DATA[projectId] = {};
  INSTALLER_PROJECT_DATA[projectId].installCompletedAt = Date.now();
  // Auto-advance project to inspection stage if currently at installation
  const p = PROJECTS.find(pr => pr.id === projectId);
  if (p && p.stage === 'installation') {
    moveProjectStage(projectId, 'inspection', 'Install complete, confirmed by installer');
  }
  openProjectModal(projectId); render();
}
window.markInstallComplete = markInstallComplete;

function setInspectionDate(projectId) {
  const existing = (INSTALLER_PROJECT_DATA[projectId] || {}).inspectionConfirmedDate || '';
  const val = prompt('Confirm inspection date (YYYY-MM-DD):', existing || new Date(Date.now() + 5 * 86400000).toISOString().slice(0, 10));
  if (!val) return;
  if (!INSTALLER_PROJECT_DATA[projectId]) INSTALLER_PROJECT_DATA[projectId] = {};
  INSTALLER_PROJECT_DATA[projectId].inspectionConfirmedDate = val;
  // Clear any prior result if we're rescheduling
  INSTALLER_PROJECT_DATA[projectId].inspectionResult = null;
  INSTALLER_PROJECT_DATA[projectId].inspectionResultAt = null;
  openProjectModal(projectId); render();
}
window.setInspectionDate = setInspectionDate;

function markInspectionPassed(projectId) {
  if (!confirm('Mark inspection as passed? This will trigger the second 50% payment review.')) return;
  if (!INSTALLER_PROJECT_DATA[projectId]) INSTALLER_PROJECT_DATA[projectId] = {};
  INSTALLER_PROJECT_DATA[projectId].inspectionResult = 'passed';
  INSTALLER_PROJECT_DATA[projectId].inspectionResultAt = Date.now();
  const p = PROJECTS.find(pr => pr.id === projectId);
  if (p && p.stage === 'inspection') {
    moveProjectStage(projectId, 'interconnection', 'Inspection passed');
  }
  openProjectModal(projectId); render();
}
window.markInspectionPassed = markInspectionPassed;

function markInspectionFailed(projectId) {
  const reason = prompt('Reason for failure:', '');
  if (reason === null) return;
  if (!INSTALLER_PROJECT_DATA[projectId]) INSTALLER_PROJECT_DATA[projectId] = {};
  INSTALLER_PROJECT_DATA[projectId].inspectionResult = 'failed';
  INSTALLER_PROJECT_DATA[projectId].inspectionResultAt = Date.now();
  if (reason) {
    if (!NOTES[projectId]) NOTES[projectId] = [];
    NOTES[projectId].push({
      id: `n${projectId}-${NOTES[projectId].length + 1}`,
      author: 'Jorge Martinez', role: 'installer',
      body: `Inspection failed: ${reason}`,
      createdAt: Date.now(),
    });
  }
  openProjectModal(projectId); render();
}

window.closeModal = closeModal;

function attachProjectHandlers() {
  document.querySelectorAll('[data-project-id]').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('.checkbox')) return;
      if (e.target.tagName === 'BUTTON') return;
      openProjectModal(el.dataset.projectId);
    });
  });
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeModal(); closeAdvanceModal(); }
});

renderCoordSelector();
renderNav();
render();
</script>
</body>
</html>
